<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理员自举 - 求职小助</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 560px;
    margin: 60px auto;
    padding: 0 24px;
    color: #1a1a1a;
    line-height: 1.6;
  }
  h1 { font-size: 22px; margin-bottom: 8px; }
  .subtitle { color: #666; margin-bottom: 32px; }
  .card {
    background: #f7f8fa;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .step { font-weight: 600; margin-bottom: 8px; }
  input, button {
    font-family: inherit;
    font-size: 14px;
    padding: 10px 14px;
    border-radius: 6px;
    border: 1px solid #d1d5db;
    box-sizing: border-box;
  }
  input { width: 100%; margin-bottom: 12px; }
  button {
    background: #2563eb;
    color: white;
    border: none;
    cursor: pointer;
    width: 100%;
  }
  button:hover { background: #1d4ed8; }
  button:disabled { background: #9ca3af; cursor: not-allowed; }
  pre {
    background: #111;
    color: #10b981;
    padding: 12px;
    border-radius: 6px;
    overflow-x: auto;
    font-size: 12px;
    margin-top: 12px;
  }
  .warn { color: #b45309; background: #fffbeb; border: 1px solid #fde68a; padding: 12px; border-radius: 6px; margin-bottom: 16px; }
  .ok { color: #047857; background: #ecfdf5; border: 1px solid #a7f3d0; padding: 12px; border-radius: 6px; }
  .err { color: #b91c1c; background: #fef2f2; border: 1px solid #fecaca; padding: 12px; border-radius: 6px; }
  .muted { color: #6b7280; font-size: 12px; }
</style>
</head>
<body>

<h1>🛡️ 管理员自举工具</h1>
<p class="subtitle">这个页面只在"数据库里没有任何管理员"时有效。用完一次就失效。</p>

<div class="warn">
  ⚠️ 这个页面不要发给任何人。使用完毕后建议从 GitHub 仓库里删掉。
</div>

<div class="card">
  <div class="step">第 1 步：先用正常入口注册一个账号并绑定邮箱</div>
  <p class="muted">访问 <a href="/" target="_blank">首页</a> 登录 → 进入设置页 → 绑定邮箱（收验证码确认）</p>
</div>

<div class="card">
  <div class="step">第 2 步：用邮箱登录当前页面（为了知道你是谁）</div>
  <p class="muted">输入你绑定的邮箱，收验证码：</p>
  <input id="email" type="email" placeholder="your_email@qq.com" />
  <button id="sendBtn" onclick="sendCode()">发送验证码</button>
  <div id="sendResult"></div>
</div>

<div class="card" id="verifyCard" style="display:none;">
  <div class="step">第 3 步：填入验证码</div>
  <input id="code" type="text" placeholder="6位验证码" maxlength="6" />
  <button onclick="verifyAndBootstrap()">验证并设为管理员</button>
  <div id="verifyResult"></div>
</div>

<script>
  const API = location.origin;

  // 先取或创建指纹
  function getFingerprint() {
    let fp = localStorage.getItem('fingerprint');
    if (!fp) {
      fp = 'fp_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
      localStorage.setItem('fingerprint', fp);
    }
    return fp;
  }

  async function sendCode() {
    const email = document.getElementById('email').value.trim();
    const btn = document.getElementById('sendBtn');
    const result = document.getElementById('sendResult');
    if (!email) { result.innerHTML = '<div class="err">请输入邮箱</div>'; return; }

    btn.disabled = true;
    btn.textContent = '发送中...';

    try {
      const resp = await fetch(`${API}/api/auth/recover-send`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      const data = await resp.json();
      if (data.ok) {
        result.innerHTML = '<div class="ok">✅ 验证码已发送到邮箱（10 分钟内有效）</div>';
        if (data.dev_code) {
          result.innerHTML += `<pre>开发模式验证码：${data.dev_code}</pre>`;
        }
        document.getElementById('verifyCard').style.display = 'block';
      } else {
        result.innerHTML = `<div class="err">❌ ${data.error || data.message || '发送失败'}</div>`;
      }
    } catch (e) {
      result.innerHTML = `<div class="err">❌ ${e.message}</div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = '发送验证码';
    }
  }

  async function verifyAndBootstrap() {
    const email = document.getElementById('email').value.trim();
    const code = document.getElementById('code').value.trim();
    const result = document.getElementById('verifyResult');
    if (!email || !code) { result.innerHTML = '<div class="err">请填完整</div>'; return; }

    try {
      // 1) 恢复登录
      const recoverResp = await fetch(`${API}/api/auth/recover-by-email`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, code, fingerprint: getFingerprint() }),
      });
      const recoverData = await recoverResp.json();
      if (!recoverData.ok) {
        result.innerHTML = `<div class="err">❌ ${recoverData.error || '验证失败'}</div>`;
        return;
      }

      const userId = recoverData.user.id;

      // 2) 调 bootstrap
      const bootResp = await fetch(`${API}/api/admin/bootstrap`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: userId }),
      });
      const bootData = await bootResp.json();

      if (bootData.ok) {
        localStorage.setItem('token', recoverData.token);
        result.innerHTML = `
          <div class="ok">
            🎉 成功！<br>
            你的账号 <code>${userId}</code> 已设为管理员。<br><br>
            token 已保存到本浏览器 localStorage。<br>
            <a href="/">回到首页</a>
          </div>
        `;
      } else {
        result.innerHTML = `<div class="err">❌ ${bootData.error || '自举失败'}（可能已经有管理员了）</div>`;
      }
    } catch (e) {
      result.innerHTML = `<div class="err">❌ ${e.message}</div>`;
    }
  }
</script>

</body>
</html>

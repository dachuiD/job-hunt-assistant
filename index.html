      <PageHeader
        title="JD 库"
        desc="粘贴岗位 JD · 自动色块评估 · 支持深度匹配分析"
        action={
          <Button variant="primary" onClick={() => setEditor({})}>
            <Icon.Plus className="w-4 h-4 mr-1" /> 粘贴新 JD
          </Button>
        }
      />
      <div className="mb-4">
        <input
          className="w-full max-w-sm px-3 py-2 rounded-lg border border-gray-300 text-sm bg-white"
          placeholder="搜索公司/岗位名..."
          value={q} onChange={e => setQ(e.target.value)} />
      </div>
      {loading ? (
        <Card className="p-8 text-center text-gray-400 text-sm">加载中...</Card>
      ) : list.length === 0 ? (
        <Card className="p-0">
          <EmptyState
            icon="💼"
            title={q ? '没有匹配的 JD' : '还没有 JD'}
            desc={q ? '试试别的关键词' : '粘贴 JD 文本，AI 会在后台自动解析并评估匹配度'}
            action={!q && <Button variant="primary" onClick={() => setEditor({})}>粘贴第一个 JD</Button>}
          />
        </Card>
      ) : (
        <div className="space-y-2">
          {list.map(j => {
            const quick = j.match_quick ? (typeof j.match_quick === 'string' ? JSON.parse(j.match_quick) : j.match_quick) : null;
            const processing = j.parse_status === 'processing';
            const failed = j.parse_status === 'failed';
            return (
              <Card key={j.id} clickable={!processing} onClick={() => !processing && navigate('jds/' + j.id)} className="p-4">
                <div className="flex items-center gap-3">
                  {processing ? (
                    <div className="w-1.5 h-8 rounded-full bg-gradient-to-b from-brand-400 to-brand-600 animate-pulse" />
                  ) : (
                    <MatchBand score={j.match_score} band={quick?.band || 'unknown'} size="md" />
                  )}
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap">
                      <span className="font-semibold text-gray-900 truncate">
                        {j.company || <span className="text-gray-400 italic">未填公司名</span>}
                      </span>
                      {j.position_title && <span className="text-gray-500 truncate">· {j.position_title}</span>}
                      {j.job_type && <span className="text-[10px] text-gray-400 uppercase">{j.job_type}</span>}
                      {processing && <span className="text-[10px] text-brand-600 bg-brand-50 px-1.5 py-0.5 rounded animate-pulse">AI 分析中...</span>}
                      {failed && <span className="text-[10px] text-rose-600 bg-rose-50 px-1.5 py-0.5 rounded">解析失败</span>}
                    </div>
                    <div className="text-xs text-gray-500 mt-0.5 line-clamp-1">
                      {j.city && <span className="mr-2">📍 {j.city}</span>}
                      {quick?.summary && <span>{quick.summary}</span>}
                      {processing && <span className="text-gray-400">后台跑中，稍等片刻自动刷新</span>}
                    </div>
                  </div>
                  {j.has_deep_match === 1 && (
                    <span className="px-1.5 py-0.5 text-[10px] rounded bg-accent-500/10 text-accent-600 font-semibold">已深度</span>
                  )}
                </div>

                {/* 快捷按钮行（非 processing 状态）*/}
                {!processing && (
                  <div className="mt-3 pt-3 border-t border-gray-100 flex items-center gap-1 flex-wrap">
                    {j.position_id ? (
                      <Button size="sm" variant="ghost" onClick={(e) => { e.stopPropagation(); navigate('positions/' + j.position_id); }} className="text-emerald-600 hover:bg-emerald-50">
                        ✅ 已在看板 · 查看
                      </Button>
                    ) : (
                      <Button size="sm" variant="ghost" onClick={(e) => { e.stopPropagation(); setBindingJd(j); }}>
                        📌 加入看板
                      </Button>
                    )}
                    {j.has_deep_match !== 1 && (
                      <Button size="sm" variant="ghost" onClick={(e) => runDeepMatch(j.id, e)}>
                        🔍 深度分析
                      </Button>
                    )}
                    <Button size="sm" variant="ghost" onClick={(e) => { e.stopPropagation(); navigate('jds/' + j.id); }}>
                      📄 查看
                    </Button>
                    <div className="flex-1" />
                    <Button size="sm" variant="ghost" onClick={e => del(j.id, e)} className="text-rose-600 hover:bg-rose-50">
                      删除
                    </Button>
                  </div>
                )}
              </Card>
            );
          })}
        </div>
      )}
      {editor && <JDEditor onClose={() => setEditor(null)} onSaved={() => { setEditor(null); load(q); }} />}
      {bindingJd && <BindToPositionModal jd={bindingJd} onClose={() => setBindingJd(null)} onDone={() => setBindingJd(null)} />}
    </div>
  );
}

function JDEditor({ onClose, onSaved }) {
  const { toast } = useApp();
  const [rawText, setRawText] = useState('');
  const [company, setCompany] = useState('');
  const [positionTitle, setPositionTitle] = useState('');
  const [createPosition, setCreatePosition] = useState(false);
  const [positionStatus, setPositionStatus] = useState('pending');
  const [submitting, setSubmitting] = useState(false);

  const submit = async () => {
    if (rawText.trim().length < 20) return toast('JD 太短', 'error');
    setSubmitting(true);
    try {
      const body = {
        raw_text: rawText,
        company: company.trim() || undefined,
        position_title: positionTitle.trim() || undefined,
        create_position: createPosition,
        position_status: createPosition ? positionStatus : undefined,
      };
      const r = await apiCall('/api/jds', { method: 'POST', body: JSON.stringify(body) });
      if (r.error) {
        toast(r.error, 'error');
      } else {
        toast('JD 已保存，AI 正在后台分析', 'success');
        onSaved();
      }
    } catch (e) { handleApiError(e, toast); }
    setSubmitting(false);
  };

  return (
    <Modal open onClose={onClose} title="粘贴新 JD" maxWidth="max-w-2xl">
      <div className="space-y-3">
        {/* 预填 */}
        <div className="grid grid-cols-2 gap-2">
          <div>
            <label className="text-xs font-medium text-gray-700 mb-1 block">公司名（选填）</label>
            <input className="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm"
              placeholder="如：字节跳动（不填 AI 自动识别）"
              value={company} onChange={e => setCompany(e.target.value)} />
          </div>
          <div>
            <label className="text-xs font-medium text-gray-700 mb-1 block">岗位名（选填）</label>
            <input className="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm"
              placeholder="如：AI产品经理实习生"
              value={positionTitle} onChange={e => setPositionTitle(e.target.value)} />
          </div>
        </div>

        <div>
          <label className="text-xs font-medium text-gray-700 mb-1 block">JD 文本</label>
          <textarea className="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm leading-relaxed" rows={7}
            placeholder="从招聘网站/邮件/公众号复制岗位 JD 全文..."
            value={rawText} onChange={e => setRawText(e.target.value)} />
          <div className="text-xs text-gray-400 mt-1">{rawText.length} 字</div>
        </div>

        {/* 同步到岗位看板 */}
        <div className="rounded-lg border border-gray-200 p-3 bg-gray-50/50">
          <label className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
            <input type="checkbox" checked={createPosition} onChange={e => setCreatePosition(e.target.checked)} className="w-4 h-4 rounded accent-brand-600" />
            同步到岗位看板
          </label>
          {createPosition && (
            <div className="mt-2 pl-6">
              <label className="text-xs font-medium text-gray-700 mb-1 block">投递状态</label>
              <select className="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm bg-white"
                value={positionStatus} onChange={e => setPositionStatus(e.target.value)}>
                {Object.entries(STATUS_LABELS).map(([k, v]) => <option key={k} value={k}>{v}</option>)}
              </select>
            </div>
          )}
        </div>

        <div className="flex gap-2 justify-end">
          <Button variant="secondary" onClick={onClose}>取消</Button>
          <Button variant="primary" onClick={submit} disabled={submitting}>
            {submitting ? '保存中...' : '保存（AI 后台分析）'}
          </Button>
        </div>
      </div>
    </Modal>
  );
}

// ==================== JD 详情页 ====================
function JDDetailPage() {
  const { route, navigate, toast } = useApp();
  const id = route.split('/')[1];
  const [jd, setJd] = useState(null);
  const [loading, setLoading] = useState(true);
  const [deepLoading, setDeepLoading] = useState(false);
  const [bindOpen, setBindOpen] = useState(false);
  const [editOpen, setEditOpen] = useState(false);

  const load = async () => {
    try {
      const r = await apiCall('/api/jds/' + id);
      setJd(r.jd);
    } catch (e) { toast(e.message, 'error'); }
    setLoading(false);
  };
  useEffect(() => { setLoading(true); load(); }, [id]);

  // 轮询：processing 状态时每 3 秒自动刷新
  useEffect(() => {
    if (jd?.parse_status !== 'processing') return;
    const t = setInterval(load, 3000);
    return () => clearInterval(t);
  }, [jd?.parse_status]);

  const runDeep = async () => {
    setDeepLoading(true);
    try {
      await apiCall('/api/jds/' + id + '/match', { method: 'POST', body: JSON.stringify({}) });
      toast('深度分析完成', 'success');
      load();
    } catch (e) { handleApiError(e, toast); }
    setDeepLoading(false);
  };

  const rerunQuick = async () => {
    try {
      await apiCall('/api/jds/' + id + '/quick-match', { method: 'POST', body: JSON.stringify({}) });
      toast('粗匹配已更新', 'success');
      load();
    } catch (e) { handleApiError(e, toast); }
  };

  if (loading || !jd) return <Card className="p-8 text-center text-gray-400 text-sm">加载中...</Card>;

  const quick = jd.match_quick;
  const deep = jd.match_detail;

  return (
    <div className="animate-slide-up space-y-5">
      <button onClick={() => navigate('jds')} className="text-sm text-gray-500 hover:text-gray-900 transition">← 返回 JD 库</button>

      <Card className="p-5">
        <div className="flex items-start gap-3 flex-wrap">
          {quick && <MatchBand score={jd.match_score} band={quick.band} size="lg" showScore showLabel />}
          <div className="flex-1 min-w-0">
            <h1 className="text-xl md:text-2xl font-semibold text-gray-900">{jd.company || '未知公司'}</h1>
            <div className="text-sm text-gray-600 mt-0.5">
              {jd.position_title || '未知岗位'}
              {jd.city && <span className="ml-2 text-gray-400">📍 {jd.city}</span>}
            </div>
          </div>
          <div className="flex gap-2 flex-wrap">
            <Button size="sm" variant="secondary" onClick={() => setEditOpen(true)}>编辑</Button>
            <Button size="sm" variant="secondary" onClick={rerunQuick}>重算粗匹配</Button>
            <Button size="sm" variant="accent" onClick={() => setBindOpen(true)}>加入岗位看板</Button>
          </div>
        </div>
      </Card>

      {quick && (
        <Card className="p-5">
          <div className="flex items-center justify-between mb-3">
            <h3 className="font-semibold text-gray-900">快速评估</h3>
            <span className="text-xs text-gray-500">{quick.summary}</span>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
            <div>
              <div className="text-xs text-emerald-700 font-semibold mb-1">✓ 匹配关键词</div>
              {quick.matched_keywords?.length > 0 ? (
                <div className="flex gap-1 flex-wrap">
                  {quick.matched_keywords.map((k, i) => <span key={i} className="px-2 py-0.5 rounded bg-emerald-50 text-emerald-700 text-xs">{k}</span>)}
                </div>
              ) : <div className="text-xs text-gray-400">无</div>}
            </div>
            <div>
              <div className="text-xs text-amber-700 font-semibold mb-1">✗ 缺失关键词</div>
              {quick.missing_keywords?.length > 0 ? (
                <div className="flex gap-1 flex-wrap">
                  {quick.missing_keywords.map((k, i) => <span key={i} className="px-2 py-0.5 rounded bg-amber-50 text-amber-700 text-xs">{k}</span>)}
                </div>
              ) : <div className="text-xs text-gray-400">无</div>}
            </div>
          </div>
        </Card>
      )}

      <Card className="p-5">
        <div className="flex items-center justify-between mb-3">
          <h3 className="font-semibold text-gray-900">深度匹配分析</h3>
          <span className="text-xs text-gray-500">Pro · 消耗 1 次深度配额</span>
        </div>
        {!deep ? (
          <div className="py-6 text-center">
            <div className="text-sm text-gray-500 mb-3">AI 结合简历原文做证据级分析</div>
            <Button variant="primary" onClick={runDeep} disabled={deepLoading}>
              {deepLoading ? 'AI 分析中（约 20 秒）...' : '生成深度分析'}
            </Button>
          </div>
        ) : (
          <div className="space-y-4 text-sm">
            <div className="p-3 rounded-lg bg-gray-50 text-gray-800 italic">{deep.summary}</div>
            {deep.matched?.length > 0 && (
              <div>
                <div className="text-xs font-semibold text-emerald-700 mb-2">✓ 匹配点（{deep.matched.length}）</div>
                <div className="space-y-2">
                  {deep.matched.map((m, i) => (
                    <div key={i} className="border-l-2 border-emerald-400 pl-3 text-xs">
                      <div className="font-medium text-gray-900">{typeof m === 'string' ? m : m.point}</div>
                      {m.resume_evidence && <div className="text-gray-500 mt-0.5">📄 {m.resume_evidence}</div>}
                      {m.jd_evidence && <div className="text-gray-500">💼 {m.jd_evidence}</div>}
                    </div>
                  ))}
                </div>
              </div>
            )}
            {deep.missing?.length > 0 && (
              <div>
                <div className="text-xs font-semibold text-amber-700 mb-2">✗ 缺失能力（{deep.missing.length}）</div>
                <div className="space-y-2">
                  {deep.missing.map((m, i) => (
                    <div key={i} className="border-l-2 border-amber-400 pl-3 text-xs">
                      <div className="font-medium text-gray-900 flex items-center gap-2 flex-wrap">
                        {typeof m === 'string' ? m : m.gap}
                        {m.severity && (
                          <span className={
                            'px-1.5 py-0.5 rounded text-[10px] ' +
                            (m.severity === 'critical' ? 'bg-rose-100 text-rose-700' :
                             m.severity === 'major' ? 'bg-amber-100 text-amber-700' : 'bg-gray-100 text-gray-600')
                          }>
                            {m.severity === 'critical' ? '严重' : m.severity === 'major' ? '主要' : '次要'}
                          </span>
                        )}
                      </div>
                      {m.jd_requirement && <div className="text-gray-500 mt-0.5">JD 要求：{m.jd_requirement}</div>}
                    </div>
                  ))}
                </div>
              </div>
            )}
            {deep.red_flags?.length > 0 && (
              <div>
                <div className="text-xs font-semibold text-rose-700 mb-2">⚠️ 风险点</div>
                <ul className="text-xs text-gray-700 ml-4 list-disc space-y-1">
                  {deep.red_flags.map((r, i) => <li key={i}>{r}</li>)}
                </ul>
              </div>
            )}
            {deep.suggestions?.length > 0 && (
              <div>
                <div className="text-xs font-semibold text-brand-700 mb-2">💡 改进建议</div>
                <ul className="text-xs text-gray-700 ml-4 list-disc space-y-1">
                  {deep.suggestions.map((s, i) => <li key={i}>{s}</li>)}
                </ul>
              </div>
            )}
            <div className="pt-2 border-t border-gray-100">
              <Button size="sm" variant="ghost" onClick={runDeep} disabled={deepLoading}>
                {deepLoading ? '重新分析中...' : '重新分析'}
              </Button>
            </div>
          </div>
        )}
      </Card>

      <Card className="p-5">
        <div className="flex items-center justify-between mb-3">
          <h3 className="font-semibold text-gray-900">JD 详情</h3>
        </div>
        {jd.parsed ? (
          <div className="space-y-3 text-sm">
            {jd.parsed.responsibilities?.length > 0 && (
              <Section title="岗位职责">
                <ul className="text-xs text-gray-700 ml-4 list-disc space-y-0.5">
                  {jd.parsed.responsibilities.map((r, i) => <li key={i}>{r}</li>)}
                </ul>
              </Section>
            )}
            {jd.parsed.requirements?.length > 0 && (
              <Section title="任职要求">
                <ul className="text-xs text-gray-700 ml-4 list-disc space-y-0.5">
                  {jd.parsed.requirements.map((r, i) => <li key={i}>{r}</li>)}
                </ul>
              </Section>
            )}
            {jd.parsed.preferred?.length > 0 && (
              <Section title="加分项">
                <ul className="text-xs text-gray-700 ml-4 list-disc space-y-0.5">
                  {jd.parsed.preferred.map((r, i) => <li key={i}>{r}</li>)}
                </ul>
              </Section>
            )}
            {jd.parsed.tech_stack?.length > 0 && (
              <Section title="技术栈">
                <div className="flex gap-1 flex-wrap">
                  {jd.parsed.tech_stack.map((t, i) => <span key={i} className="px-2 py-0.5 rounded bg-brand-50 text-brand-700 text-xs">{t}</span>)}
                </div>
              </Section>
            )}
            <div className="grid grid-cols-3 gap-2 text-xs pt-2 border-t border-gray-100">
              {jd.parsed.salary && <div><span className="text-gray-400">薪资：</span>{jd.parsed.salary}</div>}
              {jd.parsed.duration && <div><span className="text-gray-400">时长：</span>{jd.parsed.duration}</div>}
              {jd.parsed.working_days && <div><span className="text-gray-400">到岗：</span>{jd.parsed.working_days}</div>}
            </div>
          </div>
        ) : (
          <pre className="text-xs text-gray-700 bg-gray-50 p-3 rounded whitespace-pre-wrap leading-relaxed">{jd.raw_text}</pre>
        )}
      </Card>

      {bindOpen && <BindToPositionModal jd={jd} onClose={() => setBindOpen(false)} onDone={() => setBindOpen(false)} />}
      {editOpen && <JDEditModal jd={jd} onClose={() => setEditOpen(false)} onSaved={() => { setEditOpen(false); load(); }} />}
    </div>
  );
}

function JDEditModal({ jd, onClose, onSaved }) {
  const { toast } = useApp();
  const [company, setCompany] = useState(jd.company || '');
  const [positionTitle, setPositionTitle] = useState(jd.position_title || '');
  const [rawText, setRawText] = useState(jd.raw_text || '');
  const [submitting, setSubmitting] = useState(false);

  const submit = async () => {
    setSubmitting(true);
    try {
      const body = {};
      if (company !== (jd.company || '')) body.company = company;
      if (positionTitle !== (jd.position_title || '')) body.position_title = positionTitle;
      if (rawText !== jd.raw_text) body.raw_text = rawText;

      if (Object.keys(body).length === 0) {
        toast('没有改动', 'info');
        onClose(); return;
      }
      const r = await apiCall('/api/jds/' + jd.id, { method: 'PUT', body: JSON.stringify(body) });
      if (r.reparsing) toast('已保存，AI 正在重新分析', 'success');
      else toast('已更新', 'success');
      onSaved();
    } catch (e) { handleApiError(e, toast); }
    setSubmitting(false);
  };

  return (
    <Modal open onClose={onClose} title="编辑 JD" maxWidth="max-w-2xl">
      <div className="space-y-3">
        <div className="grid grid-cols-2 gap-2">
          <div>
            <label className="text-xs font-medium text-gray-700 mb-1 block">公司名</label>
            <input className="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm"
              value={company} onChange={e => setCompany(e.target.value)} />
          </div>
          <div>
            <label className="text-xs font-medium text-gray-700 mb-1 block">岗位名</label>
            <input className="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm"
              value={positionTitle} onChange={e => setPositionTitle(e.target.value)} />
          </div>
        </div>
        <div>
          <label className="text-xs font-medium text-gray-700 mb-1 block">JD 原文（修改会触发 AI 重新分析）</label>
          <textarea rows={7} className="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm leading-relaxed"
            value={rawText} onChange={e => setRawText(e.target.value)} />
          <div className="text-xs text-gray-400 mt-1">{rawText.length} 字</div>
        </div>
        <div className="flex gap-2 justify-end">
          <Button variant="secondary" onClick={onClose}>取消</Button>
          <Button variant="primary" onClick={submit} disabled={submitting}>
            {submitting ? '保存中...' : '保存'}
          </Button>
        </div>
      </div>
    </Modal>
  );
}

function BindToPositionModal({ jd, onClose, onDone }) {
  const { toast, navigate } = useApp();
  const [status, setStatus] = useState('pending');
  const [submitting, setSubmitting] = useState(false);

  const submit = async () => {
    setSubmitting(true);
    try {
      const r = await apiCall('/api/positions', {
        method: 'POST',
        body: JSON.stringify({
          jd_id: jd.id, company: jd.company, position_title: jd.position_title, status,
        }),
      });
      toast('已加入岗位看板', 'success');
      navigate('positions/' + r.id);
      onDone();
    } catch (e) {
      if (e.status === 409 && e.data?.position_id) {
        toast('这个岗位已经在看板里啦', 'info');
        navigate('positions/' + e.data.position_id);
        onDone();
      } else {
        handleApiError(e, toast);
      }
    }
    setSubmitting(false);
  };

  return (
    <Modal open onClose={onClose} title="加入岗位看板">
      <div className="space-y-3">
        <div className="text-sm text-gray-700">
          将 <b>{jd.company} · {jd.position_title}</b> 加入岗位看板
        </div>
        <div>
          <label className="text-xs font-medium text-gray-700 mb-1 block">初始状态</label>
          <select className="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm bg-white"
            value={status} onChange={e => setStatus(e.target.value)}>
            <option value="pending">待投递</option>
            <option value="applied">已投递</option>
            <option value="written_test">笔试中</option>
            <option value="interview_1">一面</option>
          </select>
        </div>
        <div className="flex gap-2 justify-end">
          <Button variant="secondary" onClick={onClose}>取消</Button>
          <Button variant="primary" onClick={submit} disabled={submitting}>加入</Button>
        </div>
      </div>
    </Modal>
  );
}

// ==================== 页面：岗位看板 ====================
const POSITION_LANES = [
  { key: 'pending', label: '待投递', statuses: ['pending'] },
  { key: 'applied', label: '已投递', statuses: ['applied'] },
  { key: 'test', label: '笔试/面试', statuses: ['written_test', 'interview_1', 'interview_2', 'interview_3plus'] },
  { key: 'offer', label: 'Offer/入职', statuses: ['offer', 'onboard'] },
  { key: 'closed', label: '已结束', statuses: ['rejected', 'withdrawn'] },
];

function PositionsPage() {
  const { toast, navigate } = useApp();
  const [list, setList] = useState([]);
  const [loading, setLoading] = useState(true);
  const [newModal, setNewModal] = useState(false);

  const load = async () => {
    setLoading(true);
    try {
      const r = await apiCall('/api/positions');
      setList(r.positions || []);
    } catch (e) { toast(e.message, 'error'); }
    setLoading(false);
  };
  useEffect(() => { load(); }, []);

  const groups = useMemo(() => {
    const m = {};
    for (const lane of POSITION_LANES) m[lane.key] = [];
    for (const p of list) {
      for (const lane of POSITION_LANES) {
        if (lane.statuses.includes(p.status)) { m[lane.key].push(p); break; }
      }
    }
    return m;
  }, [list]);

  return (
    <div className="animate-slide-up">
      <PageHeader
        title="岗位看板"
        desc={list.length + ' 个岗位 · 点击进入详情'}
        action={
          <Button variant="primary" onClick={() => setNewModal(true)}>
            <Icon.Plus className="w-4 h-4 mr-1" /> 手动添加
          </Button>
        }
      />
      {loading ? (
        <Card className="p-8 text-center text-gray-400 text-sm">加载中...</Card>
      ) : list.length === 0 ? (
        <Card className="p-0">
          <EmptyState
            icon="📌" title="还没有岗位"
            desc="从 JD 库选「加入看板」，或手动添加一个你正在准备的岗位"
            action={
              <div className="flex gap-2 justify-center">
                <Button variant="secondary" onClick={() => navigate('jds')}>去 JD 库</Button>
                <Button variant="primary" onClick={() => setNewModal(true)}>手动添加</Button>
              </div>
            }
          />
        </Card>
      ) : (
        <div className="grid grid-cols-1 md:grid-cols-5 gap-3">
          {POSITION_LANES.map(lane => (
            <div key={lane.key} className="min-w-0">
              <div className="flex items-center justify-between mb-2 px-1">
                <span className="text-sm font-semibold text-gray-700">{lane.label}</span>
                <span className="text-xs text-gray-400">{groups[lane.key].length}</span>
              </div>
              <div className="space-y-2">
                {groups[lane.key].map(p => (
                  <Card key={p.id} clickable onClick={() => navigate('positions/' + p.id)} className="p-3">
                    <div className="font-medium text-sm text-gray-900 truncate">{p.company}</div>
                    <div className="text-xs text-gray-500 truncate">{p.position_title}</div>
                    <div className="mt-2 flex items-center gap-2">
                      <StatusBadge status={p.status} />
                      {p.review_count > 0 && <span className="text-[10px] text-gray-400">📝 {p.review_count}</span>}
                    </div>
                  </Card>
                ))}
                {groups[lane.key].length === 0 && (
                  <div className="text-xs text-gray-300 text-center py-3">—</div>
                )}
              </div>
            </div>
          ))}
        </div>
      )}
      {newModal && <PositionCreateModal onClose={() => setNewModal(false)} onDone={() => { setNewModal(false); load(); }} />}
    </div>
  );
}

function PositionCreateModal({ onClose, onDone }) {
  const { toast } = useApp();
  const [form, setForm] = useState({ company: '', position_title: '', status: 'pending' });
  const [submitting, setSubmitting] = useState(false);

  const submit = async () => {
    if (!form.company || !form.position_title) return toast('公司和岗位名必填', 'error');
    setSubmitting(true);
    try {
      await apiCall('/api/positions', { method: 'POST', body: JSON.stringify(form) });
      toast('已添加', 'success'); onDone();
    } catch (e) { toast(e.message, 'error'); }
    setSubmitting(false);
  };

  return (
    <Modal open onClose={onClose} title="手动添加岗位">
      <div className="space-y-3">
        <div>
          <label className="text-xs font-medium text-gray-700 mb-1 block">公司</label>
          <input className="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm"
            value={form.company} onChange={e => setForm({...form, company: e.target.value})} />
        </div>
        <div>
          <label className="text-xs font-medium text-gray-700 mb-1 block">岗位名</label>
          <input className="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm"
            value={form.position_title} onChange={e => setForm({...form, position_title: e.target.value})} />
        </div>
        <div>
          <label className="text-xs font-medium text-gray-700 mb-1 block">初始状态</label>
          <select className="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm bg-white"
            value={form.status} onChange={e => setForm({...form, status: e.target.value})}>
            {Object.entries(STATUS_LABELS).map(([k, v]) => <option key={k} value={k}>{v}</option>)}
          </select>
        </div>
        <div className="flex gap-2 justify-end">
          <Button variant="secondary" onClick={onClose}>取消</Button>
          <Button variant="primary" onClick={submit} disabled={submitting}>添加</Button>
        </div>
      </div>
    </Modal>
  );
}

// ==================== 岗位详情 ====================
function PositionDetailPage() {
  const { route, navigate, toast } = useApp();
  const id = route.split('/')[1];
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [statusModal, setStatusModal] = useState(false);
  const [roundModal, setRoundModal] = useState(null);
  const [reviewModal, setReviewModal] = useState(null);
  const [reviewViewing, setReviewViewing] = useState(null);

  const load = async () => {
    setLoading(true);
    try {
      const r = await apiCall('/api/positions/' + id);
      setData(r);
    } catch (e) { toast(e.message, 'error'); }
    setLoading(false);
  };
  useEffect(() => { load(); }, [id]);

  const del = async () => {
    if (!confirm('删除这个岗位？所有关联的面试轮次和复盘也会一并删除')) return;
    try {
      await apiCall('/api/positions/' + id, { method: 'DELETE' });
      toast('已删除', 'success'); navigate('positions');
    } catch (e) { toast(e.message, 'error'); }
  };

  const updateStatus = async (newStatus) => {
    try {
      await apiCall('/api/positions/' + id, { method: 'PUT', body: JSON.stringify({ status: newStatus }) });
      toast('状态已更新', 'success'); setStatusModal(false); load();
    } catch (e) { toast(e.message, 'error'); }
  };

  if (loading || !data) return <Card className="p-8 text-center text-gray-400 text-sm">加载中...</Card>;

  const p = data.position;
  return (
    <div className="animate-slide-up space-y-5">
      <button onClick={() => navigate('positions')} className="text-sm text-gray-500 hover:text-gray-900 transition">← 返回岗位看板</button>

      <Card className="p-5">
        <div className="flex items-start gap-3 flex-wrap">
          <div className="flex-1 min-w-0">
            <h1 className="text-xl md:text-2xl font-semibold text-gray-900">{p.company}</h1>
            <div className="text-sm text-gray-600 mt-0.5">{p.position_title}</div>
            <div className="mt-3 flex items-center gap-2 flex-wrap">
              <StatusBadge status={p.status} />
              {p.applied_at && <span className="text-xs text-gray-500">投递于 {new Date(p.applied_at).toLocaleDateString('zh-CN')}</span>}
            </div>
          </div>
          <div className="flex gap-2 flex-wrap">
            <Button size="sm" variant="secondary" onClick={() => setStatusModal(true)}>更新状态</Button>
            <Button size="sm" variant="ghost" onClick={del} className="text-rose-600 hover:bg-rose-50">删除</Button>
          </div>
        </div>
        {p.notes && <div className="mt-4 pt-4 border-t border-gray-100 text-xs text-gray-600 italic">{p.notes}</div>}
      </Card>

      {data.jd && (
        <Card clickable onClick={() => navigate('jds/' + data.jd.id)} className="p-4 flex items-center gap-3">
          <MatchBand score={data.jd.match_score} band={scoreToBand(data.jd.match_score)} size="md" />
          <div className="flex-1 text-sm">
            <div className="text-gray-500 text-xs">关联 JD</div>
            <div className="font-medium text-gray-900">{data.jd.company || '未填公司名'} · {data.jd.position_title || '未填岗位'}</div>
          </div>
          <Button size="sm" variant="ghost" onClick={(e) => { e.stopPropagation(); navigate('jds/' + data.jd.id); }}>编辑 JD →</Button>
        </Card>
      )}

      <Card className="p-5">
        <div className="flex items-center justify-between mb-3">
          <h3 className="font-semibold text-gray-900">面试轮次</h3>
          <Button size="sm" variant="secondary" onClick={() => setRoundModal({})}>
            <Icon.Plus className="w-3.5 h-3.5 mr-1" /> 添加
          </Button>
        </div>
        {data.rounds.length === 0 ? (
          <div className="text-sm text-gray-400 py-3">还没有面试记录</div>
        ) : (
          <div className="space-y-2">
            {data.rounds.map(r => (
              <div key={r.id} className="flex items-center gap-3 p-3 rounded-lg border border-gray-100 hover:bg-gray-50 transition">
                <div className="w-9 h-9 rounded-full bg-purple-50 text-purple-700 font-bold text-sm flex items-center justify-center">{r.round_number}</div>
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-medium text-gray-900">
                    第 {r.round_number} 轮{r.round_type && <span className="ml-2 text-xs text-gray-500">{r.round_type}</span>}
                  </div>
                  <div className="text-xs text-gray-500">
                    {r.scheduled_at ? new Date(r.scheduled_at).toLocaleString('zh-CN') : '未安排时间'}
                    {r.result && r.result !== 'pending' && <span className="ml-2">· {r.result}</span>}
                  </div>
                </div>
                <div className="flex gap-1 flex-wrap">
                  <Button size="sm" variant="ghost" onClick={() => setReviewModal({ roundId: r.id })}>📝 复盘</Button>
                  <Button size="sm" variant="ghost" onClick={() => setRoundModal({ data: r })}>编辑</Button>
                </div>
              </div>
            ))}
          </div>
        )}
      </Card>

      <Card className="p-5">
        <div className="flex items-center justify-between mb-3">
          <h3 className="font-semibold text-gray-900">复盘记录</h3>
          <Button size="sm" variant="secondary" onClick={() => setReviewModal({})}>
            <Icon.Plus className="w-3.5 h-3.5 mr-1" /> 粘贴复盘
          </Button>
        </div>
        {data.reviews.length === 0 ? (
          <div className="text-sm text-gray-400 py-3">还没有复盘。面试结束后粘贴回忆文本，AI 帮你分析</div>
        ) : (
          <div className="space-y-2">
            {data.reviews.map(r => (
              <div key={r.id} onClick={() => setReviewViewing(r.id)}
                className="card-apple clickable p-3 rounded-lg border border-gray-100 hover:bg-gray-50 cursor-pointer">
                <div className="flex items-center gap-2 mb-1 flex-wrap">
                  <span className="text-xs font-medium text-gray-900">{relTime(r.created_at)}</span>
                  {r.round_id && <span className="text-[10px] text-purple-600 bg-purple-50 px-1 rounded">关联轮次</span>}
                  {r.parse_status === 'failed' && <span className="text-[10px] text-rose-500">解析失败</span>}
                  {r.parse_status === 'processing' && <span className="text-[10px] text-gray-400">解析中</span>}
                </div>
                <div className="text-xs text-gray-600 line-clamp-2">{r.preview}</div>
              </div>
            ))}
          </div>
        )}
      </Card>

      {statusModal && <StatusUpdateModal current={p.status} onClose={() => setStatusModal(false)} onUpdate={updateStatus} />}
      {roundModal && <RoundEditorModal positionId={id} data={roundModal.data} onClose={() => setRoundModal(null)} onDone={() => { setRoundModal(null); load(); }} />}
      {reviewModal && <ReviewEditorModal positionId={id} defaultRoundId={reviewModal.roundId} rounds={data.rounds} onClose={() => setReviewModal(null)} onDone={() => { setReviewModal(null); load(); }} />}
      {reviewViewing && <ReviewViewer reviewId={reviewViewing} onClose={() => setReviewViewing(null)} />}
    </div>
  );
}

function StatusUpdateModal({ current, onClose, onUpdate }) {
  const [status, setStatus] = useState(current);
  // v3.2: 基于当前状态推荐合理下一步
  const RECOMMENDED_NEXT = {
    pending: 'applied',
    applied: 'written_test',
    written_test: 'interview_1',
    interview_1: 'interview_2',
    interview_2: 'interview_3plus',
    interview_3plus: 'offer',
    offer: 'onboard',
  };
  return (
    <Modal open onClose={onClose} title="更新岗位状态">
      <div className="space-y-3">
        <select className="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm bg-white"
          value={status} onChange={e => setStatus(e.target.value)}>
          {Object.entries(STATUS_LABELS).map(([k, v]) => (
            <option key={k} value={k}>{v}{RECOMMENDED_NEXT[current] === k ? ' (推荐)' : ''}</option>
          ))}
        </select>
        {RECOMMENDED_NEXT[current] && (
          <div className="text-xs text-gray-400 leading-relaxed">
            💡 当前状态通常下一步是 <strong className="text-brand-600">{STATUS_LABELS[RECOMMENDED_NEXT[current]]}</strong>，也可以手动切换。
          </div>
        )}
        <div className="flex gap-2 justify-end">
          <Button variant="secondary" onClick={onClose}>取消</Button>
          <Button variant="primary" onClick={() => onUpdate(status)}>更新</Button>
        </div>
      </div>
    </Modal>
  );
}

function RoundEditorModal({ positionId, data, onClose, onDone }) {
  const { toast } = useApp();
  const [form, setForm] = useState(data || { round_number: null, round_type: '', scheduled_at: '', result: 'pending', notes: '' });
  const [submitting, setSubmitting] = useState(false);

  const submit = async () => {
    setSubmitting(true);
    try {
      const payload = { ...form };
      if (payload.scheduled_at && !payload.scheduled_at.endsWith(':00')) payload.scheduled_at += ':00';
      if (data?.id) await apiCall('/api/rounds/' + data.id, { method: 'PUT', body: JSON.stringify(payload) });
      else await apiCall('/api/positions/' + positionId + '/rounds', { method: 'POST', body: JSON.stringify(payload) });
      toast(data?.id ? '已更新' : '已添加', 'success'); onDone();
    } catch (e) { toast(e.message, 'error'); }
    setSubmitting(false);
  };

  const del = async () => {
    if (!confirm('删除这轮面试？')) return;
    try {
      await apiCall('/api/rounds/' + data.id, { method: 'DELETE' });
      toast('已删除', 'success'); onDone();
    } catch (e) { toast(e.message, 'error'); }
  };

  return (
    <Modal open onClose={onClose} title={data?.id ? '编辑面试轮次' : '新增面试轮次'}>
      <div className="space-y-3">
        <div className="grid grid-cols-2 gap-3">
          <div>
            <label className="text-xs font-medium text-gray-700 mb-1 block">第几轮</label>
            <input type="number" min="1" className="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm"
              placeholder="不填自动递增"
              value={form.round_number || ''} onChange={e => setForm({...form, round_number: e.target.value ? Number(e.target.value) : null})} />
          </div>
          <div>
            <label className="text-xs font-medium text-gray-700 mb-1 block">形式</label>
            <select className="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm bg-white"
              value={form.round_type || ''} onChange={e => setForm({...form, round_type: e.target.value})}>
              <option value="">未指定</option>
              <option value="phone">电话面</option>
              <option value="video">视频面</option>
              <option value="onsite">现场面</option>
              <option value="group">群面</option>
              <option value="hr">HR 面</option>
            </select>
          </div>
        </div>
        <div>
          <label className="text-xs font-medium text-gray-700 mb-1 block">时间</label>
          <input type="datetime-local" className="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm"
            value={form.scheduled_at?.slice(0, 16) || ''}
            onChange={e => setForm({...form, scheduled_at: e.target.value || null})} />
        </div>
        <div>
          <label className="text-xs font-medium text-gray-700 mb-1 block">结果</label>
          <select className="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm bg-white"
            value={form.result || 'pending'} onChange={e => setForm({...form, result: e.target.value})}>
            <option value="pending">待面试</option>
            <option value="pending_feedback">已面试，等反馈</option>
            <option value="passed">通过</option>
            <option value="failed">未通过</option>
          </select>
        </div>
        <div>
          <label className="text-xs font-medium text-gray-700 mb-1 block">备注</label>
          <textarea rows={3} className="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm"
            value={form.notes || ''} onChange={e => setForm({...form, notes: e.target.value})} />
        </div>
        <div className="flex gap-2 justify-end pt-2">
          {data?.id && <Button variant="ghost" onClick={del} className="text-rose-600 hover:bg-rose-50">删除</Button>}
          <div className="flex-1" />
          <Button variant="secondary" onClick={onClose}>取消</Button>
          <Button variant="primary" onClick={submit} disabled={submitting}>{submitting ? '保存中...' : '保存'}</Button>
        </div>
      </div>
    </Modal>
  );
}

function ReviewEditorModal({ positionId, defaultRoundId, rounds, onClose, onDone }) {
  const { toast } = useApp();
  const [roundId, setRoundId] = useState(defaultRoundId || '');
  const [rawText, setRawText] = useState('');
  const [submitting, setSubmitting] = useState(false);

  const submit = async () => {
    if (rawText.trim().length < 30) return toast('复盘内容至少 30 字', 'error');
    setSubmitting(true);
    try {
      const r = await apiCall('/api/reviews', {
        method: 'POST',
        body: JSON.stringify({ position_id: positionId, round_id: roundId || null, raw_text: rawText }),
      });
      if (r.error) { toast(r.error, 'error'); }
      else { toast('AI 复盘分析完成', 'success'); onDone(); }
    } catch (e) { handleApiError(e, toast); }
    setSubmitting(false);
  };

  return (
    <Modal open onClose={onClose} title="粘贴复盘文本" maxWidth="max-w-2xl">
      <div className="space-y-3">
        <div>
          <label className="text-xs font-medium text-gray-700 mb-1 block">关联轮次（选填）</label>
          <select className="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm bg-white"
            value={roundId} onChange={e => setRoundId(e.target.value)}>
            <option value="">不关联特定轮次</option>
            {rounds.map(r => (
              <option key={r.id} value={r.id}>第 {r.round_number} 轮{r.round_type ? ' · ' + r.round_type : ''}</option>
            ))}
          </select>
        </div>
        <div>
          <label className="text-xs font-medium text-gray-700 mb-1 block">复盘文本（问答、感觉、印象）</label>
          <textarea rows={7} className="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm leading-relaxed"
            placeholder={"粘贴面试的完整回忆，越详细越好。示例：\n面试官问：你为什么选择产品方向？\n我答：因为我觉得..."}
            value={rawText} onChange={e => setRawText(e.target.value)} />
          <div className="text-xs text-gray-400 mt-1">{rawText.length} 字 · 建议 300 字以上</div>
        </div>
        <div className="flex gap-2 justify-end pt-2">
          <Button variant="secondary" onClick={onClose}>取消</Button>
          <Button variant="primary" onClick={submit} disabled={submitting}>
            {submitting ? 'AI 分析中（约 30 秒）...' : '生成分析'}
          </Button>
        </div>
      </div>
    </Modal>
  );
}

function ReviewViewer({ reviewId, onClose }) {
  const [review, setReview] = useState(null);
  const [error, setError] = useState(false);
  useEffect(() => { apiCall('/api/reviews/' + reviewId).then(r => setReview(r.review)).catch(() => setError(true)); }, [reviewId]);

  if (error) {
    return <Modal open onClose={onClose} title="复盘分析" maxWidth="max-w-2xl">
      <div className="text-sm text-red-500 py-4 text-center">加载失败，请重试</div>
    </Modal>;
  }

  if (!review) {
    return <Modal open onClose={onClose} title="复盘分析" maxWidth="max-w-2xl">
      <div className="text-sm text-gray-400 py-4 text-center">加载中...</div>
    </Modal>;
  }

  const parsed = review.parsed;
  const insights = review.insights;

  return (
    <Modal open onClose={onClose} title="复盘分析" maxWidth="max-w-3xl">
      <div className="space-y-5 text-sm">
        {parsed?.overall_self_rating != null && (
          <div className="p-3 rounded-lg bg-brand-50 flex items-center gap-3 flex-wrap">
            <div className="text-2xl font-bold text-brand-700">{parsed.overall_self_rating}</div>
            <div className="text-xs text-brand-700">/10 总体自评</div>
            {parsed.interviewer_style && <div className="text-xs text-gray-600 ml-auto">面试官风格：{parsed.interviewer_style}</div>}
          </div>
        )}
        {insights?.key_findings?.length > 0 && (
          <Section title="🎯 关键观察">
            <ul className="text-xs text-gray-700 ml-4 list-disc space-y-1">
              {insights.key_findings.map((f, i) => <li key={i}>{f}</li>)}
            </ul>
          </Section>
        )}
        {insights?.patterns_vs_history && (
          <Section title="🔁 跨次模式">
            <div className="text-xs text-gray-700 bg-amber-50 rounded p-3 border border-amber-100">
              {insights.patterns_vs_history}
            </div>
          </Section>
        )}
        {insights?.strengths?.length > 0 && (
          <Section title="✓ 做得好的地方">
            <ul className="text-xs text-gray-700 ml-4 list-disc space-y-1">
              {insights.strengths.map((s, i) => <li key={i}>{s}</li>)}
            </ul>
          </Section>
        )}
        {insights?.weaknesses?.length > 0 && (
          <Section title="✗ 暴露的短板">
            <ul className="text-xs text-gray-700 ml-4 list-disc space-y-1">
              {insights.weaknesses.map((s, i) => <li key={i}>{s}</li>)}
            </ul>
          </Section>
        )}
        {insights?.next_actions?.length > 0 && (
          <Section title="💡 下一步改进">
            <ul className="text-xs text-gray-700 ml-4 list-disc space-y-1">
              {insights.next_actions.map((s, i) => <li key={i}>{s}</li>)}
            </ul>
          </Section>
        )}
        {parsed?.qa_pairs?.length > 0 && (
          <Section title={"📋 问答回顾（" + parsed.qa_pairs.length + " 题）"}>
            <div className="space-y-3">
              {parsed.qa_pairs.map((qa, i) => (
                <div key={i} className="border-l-2 border-brand-300 pl-3">
                  <div className="text-xs font-medium text-gray-900">Q{i+1}: {qa.question}</div>
                  {qa.category && <div className="text-[10px] text-gray-400 mt-0.5">分类：{qa.category}</div>}
                  <div className="text-xs text-gray-600 mt-1">A: {qa.user_answer}</div>
                </div>
              ))}
            </div>
          </Section>
        )}
      </div>
    </Modal>
  );
}

// ==================== 画像池 ====================
const LAYER_META = {
  stable:   { label: '稳定事实', desc: '几乎不变的身份/教育信息', color: 'bg-brand-50 border-brand-200 text-brand-700' },
  skill:    { label: '技能标签', desc: '半年级别，从简历/项目里抽', color: 'bg-emerald-50 border-emerald-200 text-emerald-700' },
  behavior: { label: '行为画像', desc: '月级别，从偏好/经历里推断', color: 'bg-purple-50 border-purple-200 text-purple-700' },
  dynamic:  { label: '临时洞察', desc: '周级别，候选或待验证', color: 'bg-amber-50 border-amber-200 text-amber-700' },
};

function ProfilePage() {
  const { toast } = useApp();
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [auditing, setAuditing] = useState(false);

  const load = async () => {
    try {
      const r = await apiCall('/api/profile');
      setData(r);
    } catch (e) { toast(e.message, 'error'); }
    setLoading(false);
  };
  useEffect(() => { load(); }, []);

  const runAudit = async () => {
    if (!confirm('画像自审会调用 1 次深度 AI（约 20 秒）检查画像矛盾和陈旧标签，确定继续吗？')) return;
    setAuditing(true);
    try {
      const r = await apiCall('/api/profile/audit', { method: 'POST' });
      const msg = `自审完成 · 归档 ${r.tags_archived} 条陈旧 · 发现 ${r.conflicts?.length || 0} 处可疑`;
      toast(msg, 'success', 5000);
      load();
    } catch (e) { handleApiError(e, toast); }
    setAuditing(false);
  };

  const rejectTag = async (id) => {
    if (!confirm('把这条画像标签删除？（后续不再引用）')) return;
    try {
      await apiCall('/api/profile/tags/' + id, { method: 'DELETE' });
      toast('已删除', 'success');
      load();
    } catch (e) { toast(e.message, 'error'); }
  };

  if (loading) return <Card className="p-8 text-center text-gray-400 text-sm">加载中...</Card>;

  const layers = data?.layers || { stable: [], skill: [], behavior: [], dynamic: [] };
  const total = data?.total || 0;

  return (
    <div className="animate-slide-up space-y-5">
      <PageHeader
        title="我的画像"
        desc={total + ' 条活跃标签 · AI 基于简历/JD/复盘累积学习'}
        action={
          <Button variant="secondary" onClick={runAudit} disabled={auditing}>
            {auditing ? '自审中...' : '🔍 画像自审'}
          </Button>
        }
      />

      {total === 0 ? (
        <div className="space-y-4 animate-page-enter">
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div className="bg-white rounded-xl border border-gray-200 p-5 text-center shadow-soft stagger-cards">
              <div className="w-10 h-10 rounded-full bg-brand-50 text-brand-600 flex items-center justify-center mx-auto mb-3 text-lg font-bold">1</div>
              <div className="text-sm font-semibold text-gray-900 mb-1">粘贴简历</div>
              <div className="text-xs text-gray-500 leading-relaxed">AI 从你的学历、技能、项目经历中提取初始标签，建立画像地基。</div>
            </div>
            <div className="bg-white rounded-xl border border-gray-200 p-5 text-center shadow-soft stagger-cards">
              <div className="w-10 h-10 rounded-full bg-emerald-50 text-emerald-600 flex items-center justify-center mx-auto mb-3 text-lg font-bold">2</div>
              <div className="text-sm font-semibold text-gray-900 mb-1">粘贴目标 JD</div>
              <div className="text-xs text-gray-500 leading-relaxed">AI 分析你偏好的岗位方向和技能要求，补充求职倾向标签。</div>
            </div>
            <div className="bg-white rounded-xl border border-gray-200 p-5 text-center shadow-soft stagger-cards">
              <div className="w-10 h-10 rounded-full bg-purple-50 text-purple-600 flex items-center justify-center mx-auto mb-3 text-lg font-bold">3</div>
              <div className="text-sm font-semibold text-gray-900 mb-1">完成一次复盘</div>
              <div className="text-xs text-gray-500 leading-relaxed">AI 从你的面试表现推断行为特质和薄弱点，画像开始真正"认识"你。</div>
            </div>
          </div>
          <div className="text-center text-xs text-gray-400">每次使用都会让 AI 更懂你，<span className="text-brand-600 cursor-pointer hover:underline" onClick={() => navigate('resumes')}>从粘贴简历开始 →</span></div>
        </div>
      ) : (
        <div className="space-y-5">
          {/* 四层展开 */}
          {Object.entries(LAYER_META).map(([key, meta]) => {
            const tags = layers[key] || [];
            if (tags.length === 0) return null;
            return (
              <Card key={key} className="p-5">
                <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
                  <div>
                    <h3 className="font-semibold text-gray-900 flex items-center gap-2">
                      <span className={'inline-block w-2 h-2 rounded-full ' + (key === 'stable' ? 'bg-brand-500' : key === 'skill' ? 'bg-emerald-500' : key === 'behavior' ? 'bg-purple-500' : 'bg-amber-500')} />
                      {meta.label}
                      <span className="text-xs font-normal text-gray-400">· {tags.length}</span>
                    </h3>
                    <div className="text-xs text-gray-500 mt-0.5">{meta.desc}</div>
                  </div>
                </div>
                <div className="space-y-2">
                  {tags.map(t => (
                    <ProfileTagCard key={t.id} tag={t} onReject={() => rejectTag(t.id)} />
                  ))}
                </div>
              </Card>
            );
          })}

          {/* 自审历史 + 疑点明细 */}
          {data?.last_audit && (() => {
            let report = null;
            try { report = JSON.parse(data.last_audit.report || '{}'); } catch (_) {}
            const conflicts = report?.conflicts || [];
            // 把 tag_keys 映射回完整 tag（方便点删）
            const allTags = [].concat(layers.stable || [], layers.skill || [], layers.behavior || [], layers.dynamic || []);
            const findTag = (k) => allTags.find(t => t.key === k);

            return (
              <Card className="p-5 bg-amber-50/40 border-amber-200/60">
                <div className="flex items-start justify-between flex-wrap gap-2 mb-3">
                  <div>
                    <h3 className="font-semibold text-gray-900 flex items-center gap-2">
                      🔎 画像自审报告
                    </h3>
                    <div className="text-xs text-gray-500 mt-1">
                      {new Date(data.last_audit.created_at).toLocaleString('zh-CN')}
                      · 归档陈旧标签 <b>{data.last_audit.tags_archived}</b> 条
                      · 发现可疑 <b className="text-amber-700">{data.last_audit.conflicts_found}</b> 处
                    </div>
                  </div>
                </div>

                {conflicts.length === 0 ? (
                  <div className="text-sm text-gray-500">✨ AI 没发现明显矛盾，画像健康</div>
                ) : (
                  <div className="space-y-3">
                    <div className="text-xs text-gray-600 leading-relaxed bg-white/60 rounded p-2.5 border border-amber-100">
                      💡 <b>怎么处理疑点？</b>看 AI 指出的原因和建议，如果你认为 AI 说得对 → 点下方涉及标签右侧的"删除"按钮移除错的那条；如果 AI 判断错了 → 不用管它，下次自审如果还在可以忽略。
                    </div>
                    {conflicts.map((c, idx) => (
                      <div key={idx} className="rounded-lg bg-white border border-amber-200 p-3.5">
                        <div className="flex items-start gap-2 mb-2">
                          <span className="text-amber-500 text-sm">⚠️</span>
                          <div className="flex-1">
                            <div className="text-sm text-gray-900 font-medium">疑点 {idx + 1}：{c.reason || '（未给出原因）'}</div>
                            {c.suggestion && (
                              <div className="text-xs text-gray-600 mt-1 leading-relaxed">
                                <b className="text-brand-600">AI 建议：</b>{c.suggestion}
                              </div>
                            )}
                          </div>
                        </div>
                        {c.tag_keys && c.tag_keys.length > 0 && (
                          <div className="mt-2 pt-2 border-t border-gray-100 space-y-1.5">
                            <div className="text-[11px] text-gray-400">涉及标签（点右侧删除可一键移除）：</div>
                            {c.tag_keys.map((k, i) => {
                              const t = findTag(k);
                              return (
                                <div key={i} className="flex items-center justify-between gap-2 text-xs bg-gray-50 rounded px-2.5 py-1.5">
                                  <div className="flex-1 min-w-0">
                                    <span className="font-medium text-gray-800">{k}</span>
                                    {t?.value && <span className="text-gray-500"> · {t.value}</span>}
                                    {t ? (
                                      <span className="ml-2 text-[10px] text-gray-400">[{LAYER_META[t.layer]?.label || t.layer} · 置信度 {Math.round((t.confidence || 0) * 100)}%]</span>
                                    ) : (
                                      <span className="ml-2 text-[10px] text-gray-400">[标签可能已被删除]</span>
                                    )}
                                  </div>
                                  {t && (
                                    <button
                                      onClick={() => rejectTag(t.id)}
                                      className="text-rose-600 hover:bg-rose-50 px-2 py-0.5 rounded text-[11px] font-medium shrink-0"
                                    >
                                      删除这条
                                    </button>
                                  )}
                                </div>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                )}
              </Card>
            );
          })()}
        </div>
      )}
    </div>
  );
}

function ProfileTagCard({ tag, onReject }) {
  const [expanded, setExpanded] = useState(false);
  const confPercent = Math.round((tag.confidence || 0) * 100);

  return (
    <div className="rounded-lg border border-gray-100 hover:border-gray-200 transition p-3 animate-tag-pop">
      <div className="flex items-center gap-3">
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="font-medium text-sm text-gray-900">{tag.key}</span>
            {tag.value && <span className="text-xs text-gray-500">· {tag.value}</span>}
            <span className="text-[10px] text-gray-400">
              置信度
              <span className={'ml-0.5 font-semibold ' + (confPercent >= 80 ? 'text-emerald-600' : confPercent >= 60 ? 'text-brand-600' : 'text-gray-500')}>
                {confPercent}%
              </span>
            </span>
          </div>
          <div className="text-[10px] text-gray-400 mt-0.5">
            {tag.category} · 更新于 {relTime(tag.last_updated_at)}
            {tag.evidences?.length > 0 && <> · {tag.evidences.length} 条证据</>}
          </div>
        </div>
        <div className="flex gap-1">
          {tag.evidences?.length > 0 && (
            <button onClick={() => setExpanded(!expanded)} className="text-xs text-gray-500 hover:text-gray-900 px-2 py-1 rounded hover:bg-gray-100 transition">
              {expanded ? '收起' : '证据 →'}
            </button>
          )}
          <button onClick={onReject} className="text-xs text-gray-400 hover:text-rose-600 px-2 py-1 rounded hover:bg-rose-50 transition" title="删除">
            <Icon.X className="w-3.5 h-3.5" />
          </button>
        </div>
      </div>
      {expanded && tag.evidences?.length > 0 && (
        <div className="mt-2 pt-2 border-t border-gray-100 space-y-1">
          {tag.evidences.map(ev => (
            <div key={ev.id} className="text-xs text-gray-600 pl-2 border-l-2 border-gray-200">
              <span className="text-[10px] text-gray-400 mr-1">[{ev.source_type}]</span>
              "{ev.quote}"
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ==================== 陪练题 ====================
function PracticePage() {
  const { toast } = useApp();
  const [list, setList] = useState([]);
  const [positions, setPositions] = useState([]);
  const [filterPos, setFilterPos] = useState('');
  const [loading, setLoading] = useState(true);
  const [genModal, setGenModal] = useState(false);
  const [pasteModal, setPasteModal] = useState(false);

  const load = async () => {
    try {
      const url = '/api/practice' + (filterPos ? '?position_id=' + filterPos : '');
      const r = await apiCall(url);
      setList(r.questions || []);
    } catch (e) { toast(e.message, 'error'); }
    setLoading(false);
  };
  const loadPositions = async () => {
    try {
      const r = await apiCall('/api/positions');
      setPositions(r.positions || []);
    } catch {}
  };
  useEffect(() => { load(); loadPositions(); }, []);
  useEffect(() => { load(); }, [filterPos]);

  const del = async (id) => {
    if (!confirm('删除这道题？')) return;
    try {
      await apiCall('/api/practice/' + id, { method: 'DELETE' });
      toast('已删除', 'success');
      load();
    } catch (e) { toast(e.message, 'error'); }
  };

  const sourceLabel = (s) => ({
    llm_resume_dig: '🎯 简历深挖',
    web_search: '🔎 真实面经',
    user_pasted: '✏️ 粘贴',
  }[s] || s);

  return (
    <div className="animate-slide-up">
      <PageHeader
        title="陪练题"
        desc="AI 深挖简历 + Tavily 真实面经 + 你粘贴的题"
        action={
          <div className="flex gap-2">
            <Button variant="secondary" onClick={() => setPasteModal(true)}>粘贴题目</Button>
            <Button variant="primary" onClick={() => setGenModal(true)}>
              <Icon.Plus className="w-4 h-4 mr-1" /> AI 生成
            </Button>
          </div>
        }
      />

      {positions.length > 0 && (
        <div className="mb-4">
          <select className="max-w-xs px-3 py-2 rounded-lg border border-gray-300 text-sm bg-white"
            value={filterPos} onChange={e => setFilterPos(e.target.value)}>
            <option value="">全部岗位</option>
            {positions.map(p => <option key={p.id} value={p.id}>{p.company} · {p.position_title}</option>)}
          </select>
        </div>
      )}

      {loading ? (
        <Card className="p-8 text-center text-gray-400 text-sm">加载中...</Card>
      ) : list.length === 0 ? (
        <Card className="p-0">
          <EmptyState
            icon="🎓"
            title="还没有陪练题"
            desc="AI 可以基于你的简历和目标岗位生成深挖题 + 从网上搜真实面经"
            action={<Button variant="primary" onClick={() => setGenModal(true)}>生成第一批</Button>}
          />
        </Card>
      ) : (
        <div className="space-y-2">
          {list.map(q => {
            const detail = q.source_detail ? (typeof q.source_detail === 'string' ? JSON.parse(q.source_detail) : q.source_detail) : null;
            return <PracticeCard key={q.id} q={q} detail={detail} sourceLabel={sourceLabel} onDel={() => del(q.id)} />;
          })}
        </div>
      )}

      {genModal && <GeneratePracticeModal positions={positions} onClose={() => setGenModal(false)} onDone={() => { setGenModal(false); load(); }} />}
      {pasteModal && <PastePracticeModal positions={positions} onClose={() => setPasteModal(false)} onDone={() => { setPasteModal(false); load(); }} />}
    </div>
  );
}

function PracticeCard({ q, detail, sourceLabel, onDel }) {
  const [expanded, setExpanded] = useState(false);
  return (
    <Card className="p-4">
      <div className="flex items-start gap-3">
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 flex-wrap mb-1">
            <span className="text-[10px] px-1.5 py-0.5 rounded bg-gray-100 text-gray-600">{sourceLabel(q.source)}</span>
            {detail?.category && <span className="text-[10px] px-1.5 py-0.5 rounded bg-brand-50 text-brand-700">{detail.category}</span>}
            {detail?.difficulty && <span className="text-[10px] text-gray-400">难度 {detail.difficulty}/5</span>}
          </div>
          <div className="text-sm font-medium text-gray-900">{q.question}</div>
          {expanded && (
            <div className="mt-2 pt-2 border-t border-gray-100 space-y-2">
              {q.reference_answer && (
                <div>
                  <div className="text-[10px] text-gray-400 mb-0.5">参考答题要点</div>
                  <div className="text-xs text-gray-700 leading-relaxed whitespace-pre-wrap">{q.reference_answer}</div>
                </div>
              )}
              {q.user_note && (
                <div>
                  <div className="text-[10px] text-gray-400 mb-0.5">我的笔记</div>
                  <div className="text-xs text-gray-700 leading-relaxed whitespace-pre-wrap">{q.user_note}</div>
                </div>
              )}
              {detail?.source_url && (
                <a href={detail.source_url} target="_blank" rel="noopener noreferrer" className="text-xs text-brand-600 hover:underline">
                  🔗 来源链接
                </a>
              )}
            </div>
          )}
        </div>
        <div className="flex gap-1">
          <Button size="sm" variant="ghost" onClick={() => setExpanded(!expanded)}>
            {expanded ? '收起' : '展开'}
          </Button>
          <Button size="sm" variant="ghost" onClick={onDel} className="text-rose-600 hover:bg-rose-50">
            <Icon.X className="w-3.5 h-3.5" />
          </Button>
        </div>
      </div>
    </Card>
  );
}

function GeneratePracticeModal({ positions, onClose, onDone }) {
  const { toast } = useApp();
  const [positionId, setPositionId] = useState(positions[0]?.id || '');
  const [count, setCount] = useState(8);
  const [sources, setSources] = useState({ resume_dig: true, web_search: true });
  const [submitting, setSubmitting] = useState(false);

  const submit = async () => {
    if (!positionId) return toast('选择一个岗位', 'error');
    const srcArr = [];
    if (sources.resume_dig) srcArr.push('resume_dig');
    if (sources.web_search) srcArr.push('web_search');
    if (srcArr.length === 0) return toast('至少选一个来源', 'error');
    setSubmitting(true);
    try {
      const r = await apiCall('/api/practice/generate', {
        method: 'POST',
        body: JSON.stringify({ position_id: positionId, count, sources: srcArr }),
      });
      toast(`已生成 ${r.count} 道题`, 'success');
      onDone();
    } catch (e) { handleApiError(e, toast); }
    setSubmitting(false);
  };

  return (
    <Modal open onClose={onClose} title="AI 生成陪练题">
      <div className="space-y-3">
        {positions.length === 0 ? (
          <div className="text-sm text-amber-700 bg-amber-50 border border-amber-200 rounded p-3">
            需要先在岗位看板添加一个岗位才能生成陪练题
          </div>
        ) : (
          <>
            <div>
              <label className="text-xs font-medium text-gray-700 mb-1 block">目标岗位</label>
              <select className="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm bg-white"
                value={positionId} onChange={e => setPositionId(e.target.value)}>
                {positions.map(p => <option key={p.id} value={p.id}>{p.company} · {p.position_title}</option>)}
              </select>
            </div>
            <div>
              <label className="text-xs font-medium text-gray-700 mb-1 block">题目数量（{count}）</label>
              <input type="range" min="3" max="15" value={count} onChange={e => setCount(Number(e.target.value))}
                className="w-full accent-brand-600" />
            </div>
            <div>
              <label className="text-xs font-medium text-gray-700 mb-2 block">题目来源</label>
              <label className="flex items-center gap-2 text-sm text-gray-700 mb-1 cursor-pointer">
                <input type="checkbox" checked={sources.resume_dig} onChange={e => setSources({...sources, resume_dig: e.target.checked})} className="w-4 h-4 rounded accent-brand-600" />
                🎯 AI 简历深挖（Flash 配额，深挖简历细节）
              </label>
              <label className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
                <input type="checkbox" checked={sources.web_search} onChange={e => setSources({...sources, web_search: e.target.checked})} className="w-4 h-4 rounded accent-brand-600" />
                🔎 百度真实面经搜索（百度千帆 API）
              </label>
            </div>
          </>
        )}
        <div className="flex gap-2 justify-end">
          <Button variant="secondary" onClick={onClose}>取消</Button>
          <Button variant="primary" onClick={submit} disabled={submitting || positions.length === 0}>
            {submitting ? 'AI 生成中（约 20 秒）...' : '开始生成'}
          </Button>
        </div>
      </div>
    </Modal>
  );
}

function PastePracticeModal({ positions, onClose, onDone }) {
  const { toast } = useApp();
  const [positionId, setPositionId] = useState('');
  const [question, setQuestion] = useState('');
  const [referenceAnswer, setReferenceAnswer] = useState('');
  const [userNote, setUserNote] = useState('');
  const [submitting, setSubmitting] = useState(false);

  const submit = async () => {
    if (question.trim().length < 5) return toast('题目太短', 'error');
    setSubmitting(true);
    try {
      await apiCall('/api/practice/user-paste', {
        method: 'POST',
        body: JSON.stringify({
          position_id: positionId || null,
          question, reference_answer: referenceAnswer || null,
          user_note: userNote || null,
        }),
      });
      toast('已保存', 'success');
      onDone();
    } catch (e) { toast(e.message, 'error'); }
    setSubmitting(false);
  };

  return (
    <Modal open onClose={onClose} title="粘贴面试题（个人面经库）" maxWidth="max-w-2xl">

          </select>
        </div>
        <div>
          <label className="text-xs font-medium text-gray-700 mb-1 block">题目</label>
          <textarea rows={2} className="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm"
            placeholder="如：请讲一个你做过的最有挑战的项目..."
            value={question} onChange={e => setQuestion(e.target.value)} />
        </div>
        <div>
          <label className="text-xs font-medium text-gray-700 mb-1 block">参考答案/要点（选填）</label>
          <textarea rows={4} className="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm"
            value={referenceAnswer} onChange={e => setReferenceAnswer(e.target.value)} />

        <div>
          <label className="text-xs font-medium text-gray-700 mb-1 block">我的笔记（选填）</label>

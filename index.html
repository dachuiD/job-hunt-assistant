function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState;
    const parsed = JSON.parse(raw);
    return {
      ...defaultState, ...parsed,
      profile: { ...defaultState.profile, ...(parsed.profile || {}) },
      preferencePriority: { ...defaultState.preferencePriority, ...(parsed.preferencePriority || {}) },

  } catch (e) { console.error(e); return defaultState; }
}

// =============== AI 服务层 ===============
// 简化：用户自配模型只需要填 endpoint + apiKey + model（OpenAI 兼容格式）
// 优先用后端免费额度，超额或失败时回退到用户自配 Key

// 生成浏览器指纹（用于免费额度限流）
function getUserId() {
  let id = localStorage.getItem('user_fingerprint');
  if (!id) {
    // 随机 16 字节 hex
    const arr = new Uint8Array(16);
    crypto.getRandomValues(arr);
    id = Array.from(arr).map(b => b.toString(16).padStart(2, '0')).join('');
    localStorage.setItem('user_fingerprint', id);
  }
  return id;
}

// 调用后端免费 AI 代理
async function callFreeAI(messages, { json = false, temperature = 0.5 } = {}) {
  const userId = getUserId();
  const res = await fetch('/api/ai/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages, json, temperature, user_id: userId }),
  });
  const data = await res.json();
  if (!res.ok) {
    const err = new Error(data.message || data.error || `API ${res.status}`);
    err.code = data.error;
    err.quota = data;
    throw err;
  }
  return { content: data.content, quota: data.quota };
}

// 调用用户自配的 OpenAI 兼容 API
async function callCustomAI(state, messages, { json = false, temperature = 0.5 } = {}) {
  const { ai } = state;
  if (!ai.apiKey) throw new Error('请先在「AI 设置」配置 API Key');
  const endpoint = ai.endpoint || 'https://api.deepseek.com/chat/completions';
  const model = ai.model || 'deepseek-chat';
  const body = { model, messages, temperature };
  if (json) body.response_format = { type: 'json_object' };
  const res = await fetch(endpoint, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${ai.apiKey}` },
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    const text = await res.text();
    throw new Error(`AI 请求失败 (${res.status}): ${text.slice(0, 200)}`);
  }
  const data = await res.json();
  return { content: data.choices?.[0]?.message?.content || '', quota: null };
}

// 统一入口：优先免费，超额后回退自配
async function callAI(state, messages, opts = {}) {
  const preferCustom = state.ai?.preferCustom && state.ai?.apiKey;
  if (preferCustom) {
    // 用户选择了优先用自己的 Key
    const r = await callCustomAI(state, messages, opts);
    return r.content;
  }
  try {
    const r = await callFreeAI(messages, opts);
    return r.content;
  } catch (e) {
    if (e.code === 'quota_exceeded' && state.ai?.apiKey) {
      // 配额用完自动回退自配
      const r = await callCustomAI(state, messages, opts);
      return r.content;
    }
    throw e;
  }
}

// 获取当前剩余额度
async function fetchQuota() {
  try {
    const res = await fetch(`/api/ai/quota?user_id=${getUserId()}`);
    if (!res.ok) return null;
    return await res.json();
  } catch { return null; }
}

// =============== 后端 API 层 (v2.2) ===============
const API_BASE = '/api';  // 同源代理，不走 workers.dev

async function fetchAPI(path, options = {}) {
  const url = `${API_BASE}${path}`;
  try {
    const res = await fetch(url, {
      ...options,
      headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
    });
    if (!res.ok) {
      const text = await res.text().catch(() => '');
      throw new Error(`API ${res.status}: ${text.slice(0, 200)}`);
    }
    return await res.json();
  } catch (err) {
    if (err.message.startsWith('API ')) throw err;
    throw new Error(`网络错误: ${err.message}`);
  }
}

async function fetchBackendJobs(params = {}) {
  const qs = new URLSearchParams();
  if (params.limit) qs.set('limit', params.limit);
  if (params.since) qs.set('since', params.since);
  if (params.city) qs.set('city', params.city);
  if (params.internType) qs.set('intern_type', params.internType);
  const query = qs.toString();
  return fetchAPI(`/jobs${query ? '?' + query : ''}`);
}

// =============== 工具函数 ===============
function uuid() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = (Math.random() * 16) | 0;
    const v = c === 'x' ? r : (r & 0x3) | 0x8;
    return v.toString(16);
  });
}
function formatDate(d = new Date()) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}
function extractJSON(text) {
  if (!text) return null;
  try { return JSON.parse(text); } catch {}
  const block = text.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (block) { try { return JSON.parse(block[1]); } catch {} }
  const starts = ['{', '['].map(c => text.indexOf(c)).filter(i => i >= 0);
  if (!starts.length) return null;
  const start = Math.min(...starts);
  const end = Math.max(text.lastIndexOf('}'), text.lastIndexOf(']'));
  if (end < start) return null;
  try { return JSON.parse(text.slice(start, end + 1)); } catch { return null; }
}

function Toast({ message, type, onClose }) {
  useEffect(() => {
    if (!message) return;
    const timer = setTimeout(onClose, 3000);
    return () => clearTimeout(timer);
  }, [message]);
  if (!message) return null;
  const colors = { success: 'bg-emerald-600', error: 'bg-red-600', info: 'bg-slate-800' };
  return (
    <div className={`fixed top-6 right-6 z-[100] px-4 py-3 rounded-lg text-white shadow-lg fade-in ${colors[type] || colors.info}`}>
      {message}
    </div>
  );
}

  };
  const addLiked = () => {
    const t = draft.likedInput.trim();
    if (!t || draft.liked.includes(t)) { setDraft(d => ({ ...d, likedInput: '' })); return; }
    setDraft(d => ({ ...d, liked: [...d.liked, t], likedInput: '' }));
  };
  const addDisliked = () => {
    const t = draft.dislikedInput.trim();
    if (!t || draft.disliked.includes(t)) { setDraft(d => ({ ...d, dislikedInput: '' })); return; }
    setDraft(d => ({ ...d, disliked: [...d.disliked, t], dislikedInput: '' }));
  };

  const finish = () => {
    setState({
      ...state,
      onboarded: true,
      profile: { ...state.profile, name: draft.name },
      target: {
        ...state.target,
        jobTitle: draft.jobTitle,
        keywords: draft.keywords.split(/[、,，]/).map(s => s.trim()).filter(Boolean).map((t, i, arr) => ({
          text: t, weight: Math.round(100 / arr.length),
        })),
        cities: draft.cities.split(/[、,，]/).map(s => s.trim()).filter(Boolean).map((t, i, arr) => ({
          text: t, weight: Math.round(100 / arr.length),
        })),
      },
      company: { liked: draft.liked, disliked: draft.disliked },
    });
    onDone && onDone();
  };

  const steps = [
    {
      title: '你的 AI 求职 Copilot ⚽',

        <div className="space-y-4">
          <p className="text-slate-600 leading-relaxed">不用你自己找岗位——<b>AI 帮你从几百个岗位里，挑出为你量身定制的那几个。</b></p>
          <div className="grid grid-cols-2 gap-3">
            {[
              { icon: '🌐', title: '真实岗位库', desc: 'AI 每 2 小时自动聚合公众号真实岗位' },
              { icon: '🎯', title: 'AI 精准匹配', desc: '基于你的偏好给每个岗位打分排序' },
              { icon: '📝', title: '真实面经题库', desc: '大厂面试真题带思考大纲（不代替你思考）' },
              { icon: '📋', title: '投递全流程', desc: '从发现岗位到拿 Offer 全程追踪' },
            ].map((f, i) => (
              <div key={i} className="p-3 bg-slate-50 rounded-lg">
                <div className="text-2xl mb-1">{f.icon}</div>
                <div className="font-semibold text-sm">{f.title}</div>
                <div className="text-xs text-slate-500 mt-0.5">{f.desc}</div>
              </div>
            ))}
          </div>
          <div className="text-xs text-slate-500 bg-emerald-50 p-3 rounded-lg border border-emerald-100">
            ✨ <b>AI 额度免费送</b>：每天 20 次免费调用，不用配 API 也能体验。超出后可配自己的 Key。
          </div>
        </div>
      ),
    },
    {
      title: '怎么称呼你？',
      content: (
        <div className="space-y-3">
          <label className="text-sm text-slate-600">你的昵称</label>
          <input autoFocus value={draft.name} onChange={e => setDraft({ ...draft, name: e.target.value })}
            placeholder="比如：小运"
            className="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          <p className="text-xs text-slate-500">Agent 会用这个称呼你，随时可改。</p>

    {

              <li>投递后在「投递管理」看板追踪进度</li>
            </ol>
          </div>
        </div>
      ),
    },
  ];

  const current = steps[step];
  const isLast = step === steps.length - 1;
  const canNext = step === 1 ? draft.name.trim() : true;

  return (
    <div className="fixed inset-0 z-40 flex items-center justify-center p-6 bg-gradient-to-br from-indigo-50 via-white to-purple-50">
      <div className="w-full max-w-xl bg-white rounded-2xl shadow-xl border border-slate-100 fade-in">
        <div className="px-7 py-5 border-b border-slate-100 flex items-center justify-between">
          <h2 className="text-xl font-bold gradient-text">{current.title}</h2>
          <div className="text-xs text-slate-400">{step + 1} / {steps.length}</div>
        </div>
        <div className="px-7 py-6 min-h-[280px]">{current.content}</div>
        <div className="px-7 py-4 border-t border-slate-100 flex items-center justify-between">
          <div className="flex gap-1.5">
            {steps.map((_, i) => (
              <div key={i} className={`h-1.5 rounded-full transition-all ${i === step ? 'w-8 bg-indigo-600' : i < step ? 'w-1.5 bg-indigo-300' : 'w-1.5 bg-slate-200'}`} />
            ))}
          </div>
          <div className="flex gap-2">
            {step > 0 && <Button variant="ghost" onClick={() => setStep(step - 1)}>上一步</Button>}
            {isLast
              ? <Button onClick={finish}>开始使用 →</Button>
              : <Button onClick={() => setStep(step + 1)} disabled={!canNext}>下一步</Button>}
          </div>
        </div>
      </div>
    </div>
  );
}

// =============== 岗位行 ===============
function JobRow({ job, state, setState, toast }) {
  const [open, setOpen] = useState(false);
  const [showSearchMenu, setShowSearchMenu] = useState(false);
  const application = state.applications.find(a => a.jobId === job.id);

  const markApplied = () => {
    if (application) {
      setState({ ...state, applications: state.applications.filter(a => a.jobId !== job.id) });
      toast('已取消投递标记', 'info');
    } else {
      setState({
        ...state,
        applications: [...state.applications, {
          id: uuid(), jobId: job.id, status: 'applied',
          appliedAt: new Date().toISOString(), notes: '',
          history: [{ status: 'applied', at: new Date().toISOString() }],
        }],
      });
      toast('已标记为已投递', 'success');
    }
  };

  const removeJob = () => {
    if (!confirm(`确定删除岗位「${job.title} @ ${job.company}」？`)) return;
    setState({
      ...state,
      jobs: state.jobs.filter(j => j.id !== job.id),
      applications: state.applications.filter(a => a.jobId !== job.id),
    });
    toast('已删除', 'info');
  };

  const score = job.matchScore || 0;
  const scoreColor = score >= 85 ? 'text-emerald-600' : score >= 70 ? 'text-indigo-600' : 'text-slate-500';

  return (
    <>
      <div className="px-5 py-4 hover:bg-slate-50 transition-colors cursor-pointer" onClick={() => setOpen(true)}>
        <div className="flex items-start gap-4">
          <div className="flex-1 min-w-0">
            <div className="flex items-center gap-2 flex-wrap">
              <span className="font-semibold text-slate-900">{job.title}</span>
              <span className="text-slate-400">·</span>
              <span className="text-slate-700">{job.company}</span>
              {job.department && <span className="text-xs text-slate-500">({job.department})</span>}
              {job.internType === 'summer' ? <Tag variant="rose">🌞 暑期</Tag> : <Tag variant="indigo">📅 日常</Tag>}
              {job.source === 'backend' && <Tag variant="emerald">🌐 真实</Tag>}
              {job.source === 'manual' && <Tag variant="amber">📋 手动</Tag>}
              {application && <Tag variant="amber">已投递</Tag>}
              {job.isNew && <Tag variant="emerald">新</Tag>}
            </div>
            <div className="flex items-center gap-3 mt-1.5 text-xs text-slate-500 flex-wrap">
              {job.city && <span>📍 {job.city}</span>}
              {job.salary && <span>💰 {job.salary}</span>}
              {job.duration && <span>⏱️ {job.duration}</span>}
              {job.workingDays && <span>📅 {job.workingDays}</span>}
              {job.publishedAt && <span>🕐 {job.publishedAt}</span>}
            </div>
            {job.matchReason && <div className="text-xs text-slate-600 mt-1.5 line-clamp-1">💡 {job.matchReason}</div>}
          </div>
          <div className="text-right">
            <div className={`text-lg font-bold ${scoreColor}`}>{score}%</div>
            <div className="text-xs text-slate-400">匹配度</div>
          </div>
        </div>
      </div>

      <Modal open={open} onClose={() => { setOpen(false); setShowSearchMenu(false); }} title={`${job.title} @ ${job.company}`} size="lg"
        footer={<>
          <Button variant="ghost" onClick={removeJob}>
            <span className="flex items-center gap-1 text-red-500"><Icon name="trash" className="w-4 h-4" />删除</span>
          </Button>
          <div className="relative">
            <Button variant="secondary" onClick={() => setShowSearchMenu(!showSearchMenu)}>
              <span className="flex items-center gap-1"><Icon name="search" className="w-4 h-4" />去招聘平台搜 ▾</span>
            </Button>
            {showSearchMenu && (
              <div className="absolute bottom-full mb-2 right-0 bg-white border border-slate-200 rounded-lg shadow-lg py-1 w-40 z-10">
                {buildSearchLinks(job).map(link => (
                  <button key={link.name}
                    onClick={() => { window.open(link.url, '_blank'); setShowSearchMenu(false); }}
                    className="w-full text-left px-3 py-2 text-sm hover:bg-slate-50 flex items-center gap-2">
                    <span>{link.icon}</span><span>{link.name}</span>
                  </button>
                ))}
              </div>
            )}
          </div>
          <Button onClick={markApplied} variant={application ? 'secondary' : 'primary'}>
            {application ? '取消已投递' : '✓ 标记已投递'}
          </Button>
        </>}>
        <div className="space-y-4">
          <div className="flex items-center gap-2 flex-wrap">
            {job.internType === 'summer' ? <Tag variant="rose">🌞 暑期实习</Tag> : <Tag variant="indigo">📅 日常实习</Tag>}
            {job.department && <Tag>{job.department}</Tag>}
            {job.city && <Tag variant="indigo">📍 {job.city}</Tag>}
            {job.salary && <Tag variant="amber">💰 {job.salary}</Tag>}
            {job.duration && <Tag>⏱️ {job.duration}</Tag>}
            <Tag variant="emerald">匹配度 {score}%</Tag>
          </div>
          {job.matchReason && (
            <div className="p-3 bg-indigo-50 border border-indigo-100 rounded-lg">
              <div className="text-xs font-semibold text-indigo-700 mb-1">💡 匹配分析</div>
              <div className="text-sm text-indigo-900">{job.matchReason}</div>
            </div>
          )}
          <div className="p-3 bg-amber-50 border border-amber-100 rounded-lg text-xs text-amber-800">
            {job.source === 'backend'
              ? <>✅ <b>真实岗位</b>：来自搜狗微信公众号文章的自动爬取，信息可能不完整，建议点右下角「去招聘平台搜」确认详情。</>
              : job.source === 'manual'
                ? <>📋 <b>手动导入</b>：你从招聘平台粘贴的真实 JD。</>
                : <>⚠️ <b>注意</b>：AI 生成的是"岗位参考线索"，不是今天实时发布的岗位。点击右下角「去招聘平台搜」可在实习僧/Boss/牛客等平台查找该公司的真实在招岗位。</>
            }
          </div>
          <div>
            <div className="flex items-center justify-between mb-2">
              <div className="text-sm font-semibold text-slate-700">JD 详情</div>
              <div className="text-xs text-slate-400">{(job.jd || '').length} 字</div>
            </div>
            <div className="text-sm text-slate-700 whitespace-pre-wrap leading-relaxed bg-slate-50 p-4 rounded-lg border border-slate-100 max-h-[400px] overflow-y-auto scrollbar-thin">
              {job.jd || job.summary || '（无详细 JD）'}
            </div>
          </div>
        </div>
      </Modal>
    </>
  );
}

// =============== 后端岗位卡片（带跳转） ===============
function BackendJobCard({ job, state, setState, toast }) {
  const [open, setOpen] = useState(false);
  const [showSearchMenu, setShowSearchMenu] = useState(false);

  // 构造搜索跳转链接（使用本地工具函数）
  const searchLinks = buildSearchLinks({
    title: job.title,
    company: job.company,
    city: job.city,
  });

  // 微信公众号搜索链接（后端没拿到原文 URL 时用）
  const weixinSearchUrl = job.source_account
    ? `https://weixin.sogou.com/weixin?type=1&query=${encodeURIComponent(job.source_account)}`
    : null;
  const weixinArticleSearchUrl = `https://weixin.sogou.com/weixin?type=2&query=${encodeURIComponent(job.title + ' ' + job.company)}`;

  // 一键导入到本地岗位库
  const importToLocal = () => {
    const existing = state.jobs.find(j => j.title === job.title && j.company === job.company);
    if (existing) { toast('已在本地岗位库', 'info'); return; }
    const newJob = {
      id: uuid(),
      title: job.title || '未知岗位',
      company: job.company || '未知公司',
      department: job.department || '',
      city: job.city || '',
      salary: job.salary || '',
      duration: job.duration || '',
      workingDays: job.working_days || '',
      internType: job.intern_type === 'summer' ? 'summer' : 'daily',
      publishedAt: job.published_at || '',
      url: job.source_url || '',
      jd: job.jd || '',
      summary: job.jd ? job.jd.slice(0, 80) + '…' : '',
      matchScore: 0,

// =============== 本地匹配打分算法 ===============
// 在前端对后端岗位做快速打分，不消耗 AI 额度
function scoreBackendJob(job, prefs) {
  const { target, company } = prefs;
  const keywords = target.keywords || [];
  const cities = target.cities || [];
  const liked = company.liked || [];
  const disliked = company.disliked || [];

  // 拉黑公司直接 0 分
  if (disliked.some(d => (job.company || '').includes(d) || d.includes(job.company || ''))) {
    return { score: 0, reasons: ['❌ 公司在你的拉黑列表'] };
  }

  let score = 40; // 基础分
  const reasons = [];

  // 1. 关键词匹配（最高 30 分）
  const fullText = `${job.title || ''} ${job.category || ''} ${job.jd || ''} ${(job.tags || '[]')}`.toLowerCase();
  let kwScore = 0;
  for (const k of keywords) {
    const kw = (k.text || '').toLowerCase();
    if (!kw) continue;
    if (fullText.includes(kw)) {
      kwScore += (k.weight || 0) * 0.3;
      reasons.push(`✓ 匹配关键词「${k.text}」`);
    }
  }
  score += Math.min(30, kwScore);

  // 2. 城市匹配（最高 20 分）
  if (job.city) {
    for (const c of cities) {
      if ((job.city || '').includes(c.text)) {
        score += (c.weight || 0) * 0.2;
        reasons.push(`✓ 城市「${c.text}」`);
        break;
      }
    }
  }

  // 3. 偏好公司加分（最高 15 分）
  for (const l of liked) {
    if ((job.company || '').includes(l) || l.includes(job.company || '')) {
      score += 15;
      reasons.push(`✓ 偏好公司「${l}」`);
      break;
    }
  }

  // 4. 实习类型（5 分）
  const wantType = target.internType || 'all';
  if (wantType === 'all' || wantType === job.intern_type) {
    score += 5;
  } else {
    score -= 10;
    reasons.push(`⚠️ ${job.intern_type === 'summer' ? '暑期' : '日常'}实习，与偏好不符`);
  }

  // 5. 分类匹配（岗位方向）
  const jobTitle = (target.jobTitle || '').toLowerCase();
  const cat = (job.category || '').toLowerCase();
  if (jobTitle && cat && (jobTitle.includes(cat) || cat.includes(jobTitle.slice(0, 2)))) {
    score += 10;
    reasons.push(`✓ 岗位方向「${job.category}」`);
  }

  score = Math.max(0, Math.min(100, Math.round(score)));
  if (reasons.length === 0) reasons.push('基础匹配');
  return { score, reasons };
}

// =============== 今日推荐页 ===============
function Dashboard({ state, setState, toast, onNav }) {
  const today = formatDate();
  const todayJobs = state.jobs.filter(j => j.discoveredDate === today);

  // 后端真实数据
  const [backendOnline, setBackendOnline] = useState(null);
  const [backendStats, setBackendStats] = useState(null);
  const [backendJobs, setBackendJobs] = useState([]);
  const [loadingBackend, setLoadingBackend] = useState(false);
  const [aiRanking, setAiRanking] = useState(false);
  const [aiRankMap, setAiRankMap] = useState({}); // { jobId: { score, reason } }

  // 启动时检测后端并拉数据
  useEffect(() => {
    let cancelled = false;
    (async () => {
      setLoadingBackend(true);
      try {
        const online = await checkBackendHealth();
        if (cancelled) return;
        setBackendOnline(online);
        if (online) {
          const [statsData, jobsData] = await Promise.all([
            fetchBackendStats().catch(() => null),
            fetchBackendJobs({ limit: 200 }).catch(() => ({ jobs: [] })),
          ]);
          if (cancelled) return;
          setBackendStats(statsData);
          setBackendJobs(jobsData.jobs || []);
        }
      } catch { if (!cancelled) setBackendOnline(false); }
      finally { if (!cancelled) setLoadingBackend(false); }
    })();
    return () => { cancelled = true; };
  }, []);

  // 本地快速打分：给所有后端岗位排序
  const scoredJobs = useMemo(() => {
    return backendJobs.map(job => {
      const local = scoreBackendJob(job, state);
      const ai = aiRankMap[job.id];
      // 如果有 AI 排序分，用 AI 分覆盖
      return {
        ...job,
        _localScore: local.score,
        _localReasons: local.reasons,
        _aiScore: ai?.score ?? null,
        _aiReason: ai?.reason ?? null,
        _finalScore: ai?.score ?? local.score,
        _reason: ai?.reason || local.reasons.join('，'),
      };
    }).sort((a, b) => b._finalScore - a._finalScore);
  }, [backendJobs, state, aiRankMap]);

  const top10 = scoredJobs.slice(0, 10);
  const highMatch = scoredJobs.filter(j => j._finalScore >= 70).length;

  // AI 深度排序 Top 10
  const runAIRank = async () => {
    if (aiRanking) return;
    if (top10.length === 0) { toast('还没有岗位可以排序', 'info'); return; }
    setAiRanking(true);
    try {
      const userId = getUserId();
      const preference = {
        jobTitle: state.target.jobTitle,
        keywords: state.target.keywords,
        cities: state.target.cities,
        liked: state.company.liked,
        disliked: state.company.disliked,
        internType: state.target.internType,
      };
      const res = await fetch('/api/jobs/rank', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          user_id: userId,
          preference,
          jobs: top10,
          top: 10,
        }),
      });
      const data = await res.json();
      if (!res.ok) {
        if (data.error === 'quota_exceeded') {
          toast(`❌ 今日免费 AI 额度已用完，请在「AI 设置」配置自己的 Key`, 'error');
        } else {
          toast(`❌ AI 排序失败：${data.message || data.error}`, 'error');
        }
        return;
      }
      // 把 ranked 结果映射回 job id
      const map = {};
      for (const item of (data.ranked || [])) {
        const job = top10[item.idx];
        if (job) map[job.id] = { score: item.score, reason: item.reason };
      }
      setAiRankMap(map);
      toast(`✅ AI 深度排序完成（今日剩余 ${data.quota?.remaining}/${data.quota?.limit}）`, 'success');
    } catch (e) {
      toast(`❌ AI 排序失败：${e.message}`, 'error');
    } finally {
      setAiRanking(false);
    }
  };

  // 把单个后端岗位导入本地
  const importOne = (job) => {
    const existing = state.jobs.find(j => j.title === job.title && j.company === job.company);
    if (existing) { toast('已在本地岗位库', 'info'); return; }
    const newJob = {
      id: uuid(),
      title: job.title || '未知岗位',
      company: job.company || '未知公司',
      department: job.department || '',
      city: job.city || '',
      salary: job.salary || '',
      duration: job.duration || '',
      workingDays: job.working_days || '',
      internType: job.intern_type === 'summer' ? 'summer' : 'daily',
      publishedAt: job.published_at || '',
      url: job.source_url || '',
      jd: job.jd || '',
      summary: job.jd ? job.jd.slice(0, 80) + '…' : '',
      matchScore: job._finalScore || 0,
      matchReason: job._reason || '',
      discoveredDate: today,
      isNew: true,
      source: 'backend',
      sourceAccount: job.source_account || '',
      applyContact: job.apply_contact || '',
      requirements: job.requirements || '',
      category: job.category || '',
    };
    setState({
      ...state,
      jobs: [newJob, ...state.jobs.map(j => ({ ...j, isNew: false }))],
      stats: { ...state.stats, totalJobs: state.stats.totalJobs + 1 },
    });
    toast(`✅ 已导入：${job.title}`, 'success');
  };

  // 批量导入 Top 10
  const importTop10 = () => {
    const existing = new Set(state.jobs.map(j => `${j.title}__${j.company}`));
    const newJobs = [];
    for (const job of top10) {
      const key = `${job.title}__${job.company}`;
      if (existing.has(key)) continue;
      existing.add(key);
      newJobs.push({
        id: uuid(),
        title: job.title, company: job.company, department: job.department || '',
        city: job.city || '', salary: job.salary || '', duration: job.duration || '',
        workingDays: job.working_days || '', internType: job.intern_type === 'summer' ? 'summer' : 'daily',
        publishedAt: job.published_at || '', url: job.source_url || '',
        jd: job.jd || '', summary: job.jd ? job.jd.slice(0, 80) + '…' : '',
        matchScore: job._finalScore || 0, matchReason: job._reason || '',
        discoveredDate: today, isNew: true, source: 'backend',
        sourceAccount: job.source_account || '', applyContact: job.apply_contact || '',
        requirements: job.requirements || '', category: job.category || '',
      });
    }
    if (!newJobs.length) { toast('所有推荐已在本地', 'info'); return; }
    setState({
      ...state,
      jobs: [...newJobs, ...state.jobs.map(j => ({ ...j, isNew: false }))],
      stats: { ...state.stats, totalJobs: state.stats.totalJobs + newJobs.length },
    });
    toast(`✅ 导入了 ${newJobs.length} 个高匹配岗位`, 'success');
  };

  const StatusDot = () => {
    if (backendOnline === null) return <span className="inline-block w-2 h-2 rounded-full bg-slate-300 animate-pulse" />;
    if (backendOnline) return <span className="inline-block w-2 h-2 rounded-full bg-emerald-500" />;
    return <span className="inline-block w-2 h-2 rounded-full bg-red-400" />;
  };

  return (
    <div className="p-8 max-w-6xl mx-auto fade-in">
      <div className="flex items-start justify-between mb-6">
        <div>
          <div className="text-sm text-slate-500 mb-1 flex items-center gap-2">
            {today} · {state.profile.name || '同学'}，今天也要加油 ⚽
            <StatusDot />
            <span className="text-xs">{backendOnline === true ? '数据源在线' : backendOnline === false ? '数据源离线' : '检测中…'}</span>
          </div>
          <h1 className="text-3xl font-bold">今日推荐 <span className="text-base font-normal text-slate-400 ml-2">AI 为你挑选</span></h1>
          {backendStats && (
            <p className="text-sm text-slate-500 mt-1">
              从 <b>{backendStats.jobs}</b> 个真实岗位中为你筛出 <b className="text-emerald-600">{highMatch}</b> 个高匹配
            </p>
          )}
        </div>
        <div className="flex gap-2 flex-wrap">
          <Button variant="secondary" onClick={runAIRank} disabled={aiRanking || top10.length === 0}>
            <span className="flex items-center gap-1.5">
              <Icon name="sparkles" className="w-4 h-4" />
              {aiRanking ? 'AI 分析中…' : '✨ AI 深度排序'}
            </span>
          </Button>
          {top10.length > 0 && (
            <Button variant="success" onClick={importTop10}>
              <span className="flex items-center gap-1.5">📥 批量导入 Top {top10.length}</span>
            </Button>
          )}
        </div>
      </div>

      {/* 核心统计 */}
      <div className="grid grid-cols-5 gap-4 mb-6">
        {[
          { label: '真实岗位库', value: backendStats?.jobs || 0, color: 'emerald', hint: '后端自动抓取' },
          { label: '高匹配岗位', value: highMatch, color: 'indigo', hint: '≥70 分' },
          { label: '已投递', value: state.applications.filter(a => a.status === 'applied').length, color: 'amber' },
          { label: '面试中', value: state.applications.filter(a => a.status === 'interview').length, color: 'purple' },
          { label: 'Offer', value: state.applications.filter(a => a.status === 'offer').length, color: 'rose' },
        ].map(s => (
          <Card key={s.label} className="p-4">
            <div className="text-xs text-slate-500">{s.label}</div>
            <div className={`text-2xl font-bold mt-1 text-${s.color}-600`}>{s.value}</div>
            {s.hint && <div className="text-[10px] text-slate-400 mt-0.5">{s.hint}</div>}
          </Card>
        ))}
      </div>

      {loadingBackend && (
        <Card className="mb-6 p-6 text-center">
          <div className="text-slate-500 text-sm">⏳ 正在连接后端数据源…</div>
        </Card>
      )}

      {!loadingBackend && !backendOnline && (
        <Card className="mb-6 p-6 text-center bg-amber-50 border-amber-200">
          <div className="text-4xl mb-2">🔌</div>
          <div className="text-sm text-amber-800">后端数据源暂时无法连接，刷新试试</div>
        </Card>
      )}

      {/* 为你精选 Top 10 */}
      {top10.length > 0 && (
        <Card className="mb-6">
          <div className="px-5 py-4 border-b border-slate-100">
            <div className="flex items-center justify-between">
              <div>
                <h2 className="font-semibold text-lg">⭐ 为你精选的 {top10.length} 个岗位</h2>
                <p className="text-xs text-slate-500 mt-0.5">
                  {Object.keys(aiRankMap).length > 0
                    ? '✨ AI 深度排序 · 匹配理由基于你的偏好定制'
                    : '📊 基于关键词/城市/公司偏好本地快速打分，点右上角「AI 深度排序」获得更精准推荐'}
                </p>
              </div>
            </div>
          </div>
          <div className="divide-y divide-slate-100">
            {top10.map((job, idx) => (
              <div key={job.id} className="px-5 py-4 hover:bg-slate-50 flex items-start gap-4">
                <div className="flex-shrink-0 w-10 text-center">
                  <div className="text-xs text-slate-400">#{idx + 1}</div>
                  <div className={`text-xl font-bold mt-0.5 ${
                    job._finalScore >= 85 ? 'text-emerald-600' :
                    job._finalScore >= 70 ? 'text-indigo-600' :
                    job._finalScore >= 50 ? 'text-slate-600' : 'text-slate-400'
                  }`}>{job._finalScore}</div>
                </div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 flex-wrap">
                    <span className="font-semibold text-slate-900">{job.title}</span>
                    <span className="text-slate-400">·</span>
                    <span className="text-slate-700">{job.company}</span>
                    {job.category && job.category !== '其他' && <Tag variant="indigo">{job.category}</Tag>}
                    {job.intern_type === 'summer' ? <Tag variant="rose">🌞 暑期</Tag> : <Tag variant="indigo">📅 日常</Tag>}
                    {job._aiScore != null && <Tag variant="emerald">✨ AI 精排</Tag>}
                  </div>
                  <div className="flex items-center gap-3 mt-1.5 text-xs text-slate-500 flex-wrap">

                    {job.salary && <span>💰 {job.salary}</span>}

                  <div className={`text-xs mt-1.5 ${job._aiScore != null ? 'text-emerald-700' : 'text-slate-600'}`}>

      {/* 本地已导入的岗位 */}
      {state.jobs.length > 0 && (
        <Card>
          <div className="px-5 py-4 border-b border-slate-100">

// =============== AI 搜岗 ===============
function SearchPage({ state, setState, toast }) {
  const [loading, setLoading] = useState(false);
  const [rawResult, setRawResult] = useState('');
  const [showPrompt, setShowPrompt] = useState(false);
  const [manualInput, setManualInput] = useState('');
  const [manualMode, setManualMode] = useState(false);
  const [progress, setProgress] = useState('');

  const buildPrompt = () => {
    const { target, company, filters, output } = state;
    const keywords = target.keywords.map(k => `${k.text}(${k.weight}%)`).join('、');
    const cities = target.cities.map(c => `${c.text}(${c.weight}%)`).join('、');
    const excludeCities = target.excludeCities.join('、') || '无';
    const liked = company.liked.join('、') || '无';
    const disliked = company.disliked.join('、') || '无';
    const internTypeFilter = target.internType || 'all';
    const internTypeDesc = internTypeFilter === 'daily' ? '只要日常实习（在校期间长期的）'
      : internTypeFilter === 'summer' ? '只要暑期实习（7-9月集中的短期实习）'
      : '日常实习和暑期实习都可以';
    const jdMode = output.jdDisplayMode === 'summary' ? 'summary' : 'full_text';

    return `你是一个专业的求职助手。请帮我整理符合以下条件的**实习岗位线索**，并返回 JSON 格式数据。

## 我的求职条件
**主岗位**：${target.jobTitle}
**搜索关键词（按权重）**：${keywords}
**目标城市（按权重）**：${cities}
**排除城市**：${excludeCities}
**偏好公司**：${liked}
**拉黑公司**：${disliked}
**实习类型要求**：${internTypeDesc}
**实习时长上限**：${filters.maxDurationMonths} 个月
**每周最少到岗**：${filters.minWorkingDays} 天
**薪资下限**：${filters.minSalary || '不限'} 元/天

## 重要说明（必读）
1. 你是离线的，无法访问实时招聘网站，因此**不要编造发布时间、也不要编造具体的岗位 URL 链接**
2. 你的任务是基于训练数据中的公司和岗位信息，输出"这些公司往年/通常会招的实习方向"作为**求职参考线索**
3. **publishedAt 字段必须留空字符串 ""**，不要写"1天前"这种假时间
4. **url 字段必须留空字符串 ""**，不要编造链接（网站会自动生成"去各平台搜索该岗位"的真实链接）
5. JD 内容要详细写出"岗位职责"和"任职要求"两部分，尽量贴近真实大厂 JD 风格${jdMode === 'full_text' ? '，**至少 200 字**，包含职责点 4-6 条、要求点 4-6 条' : '，可以简洁（1-2 句话概括核心职责）'}

## 输出要求
1. 过滤掉被拉黑的公司，优先展示偏好公司
2. 过滤掉实习时长超过 ${filters.maxDurationMonths} 个月的岗位
3. 严格返回 JSON，每个岗位包含以下字段：
   - title: 岗位名称
   - company: 公司名
   - department: 部门（如 AI Lab / 商业化中心，可选）
   - city: 城市
   - salary: 薪资区间（如 "250-300/天"）
   - duration: 实习时长（如 "至少4个月"）
   - workingDays: 每周到岗（如 "每周4天"）
   - internType: **必填**，只能是 "daily"（日常实习）或 "summer"（暑期实习）
   - publishedAt: ""（必须留空）
   - url: ""（必须留空，不要编链接）
   - jd: ${jdMode === 'full_text' ? 'JD 完整内容，至少 200 字，包含"岗位职责"和"任职要求"两部分' : '一句话概括核心职责（summary 模式）'}
   - matchScore: 0-100 整数
   - matchReason: 一句话说明匹配/不匹配原因
4. 至少返回 ${output.minCount} 个岗位，按 matchScore 从高到低排序
5. **只返回 JSON 对象 {"jobs":[...]}，不要任何解释文字、不要 markdown 代码块标记**

## 输出格式示例
{
  "jobs": [
    {
      "title": "AI产品经理实习",
      "company": "字节跳动",
      "department": "AI Lab",
      "city": "上海",
      "salary": "250-300/天",
      "duration": "至少4个月",
      "workingDays": "每周4天",
      "internType": "daily",
      "publishedAt": "",
      "url": "",
      "jd": "岗位职责：\\n1. 参与 AI 产品从 0 到 1 的需求分析、功能设计与产品迭代\\n2. 跟进大模型能力在业务场景的落地，包括但不限于智能对话、内容生成、个性化推荐等\\n3. 负责产品数据指标的定义与监控，输出数据洞察驱动决策\\n4. 跨部门协作，推动算法、工程、设计团队高效落地产品需求\\n\\n任职要求：\\n1. 2025/2026 届本科及以上在读，专业不限\\n2. 对 AI/大模型技术有浓厚兴趣，关注行业动态\\n3. 有产品实习经验或完整项目经历者优先\\n4. 实习时间不少于 4 个月，每周至少 4 天",
      "matchScore": 92,
      "matchReason": "AI产品方向+上海+偏好公司，综合匹配最高"
    }
  ]
}`;
  };

  const copyPrompt = () => {
    navigator.clipboard.writeText(buildPrompt());
    toast('Prompt 已复制，去 AI 里粘贴即可', 'success');
  };

  const importFromText = (text) => {
    const parsed = extractJSON(text);
    if (!parsed) { toast('无法解析返回内容', 'error'); return; }
    const jobList = Array.isArray(parsed) ? parsed : parsed.jobs || parsed.data || [];
    if (!jobList.length) { toast('未找到岗位数据', 'error'); return; }

    const existing = new Set(state.jobs.map(j => `${j.title}__${j.company}__${j.department || ''}`));
    const newJobs = [];
    const today = formatDate();
    for (const j of jobList) {
      const key = `${j.title}__${j.company}__${j.department || ''}`;
      if (existing.has(key)) continue;
      existing.add(key);
      newJobs.push({
        id: uuid(),
        title: j.title || '未知岗位',
        company: j.company || '未知公司',
        department: j.department || '',
        city: j.city || '',
        salary: j.salary || '',
        duration: j.duration || '',
        workingDays: j.workingDays || '',
        internType: j.internType === 'summer' ? 'summer' : 'daily',
        publishedAt: j.publishedAt || '',
        url: j.url || '',
        jd: j.jd || j.summary || '',
        summary: j.summary || (j.jd ? j.jd.slice(0, 80) + '…' : ''),
        matchScore: Math.round(j.matchScore || 70),
        matchReason: j.matchReason || '',
        discoveredDate: today,
        isNew: true,
      });
    }
    if (!newJobs.length) { toast('所有岗位已存在', 'info'); return; }
    setState({
      ...state,
      jobs: [...newJobs, ...state.jobs.map(j => ({ ...j, isNew: false }))],
      stats: { ...state.stats, totalJobs: state.stats.totalJobs + newJobs.length },
    });
    toast(`成功导入 ${newJobs.length} 个新岗位 🎉`, 'success');
  };

  const runAI = async () => {
    setLoading(true); setRawResult(''); setProgress('正在请求 AI…');
    try {
      const content = await callAI(state, [
        { role: 'system', content: '你是一个专业的求职助手。严格返回 JSON 格式 {"jobs":[...]}，不要任何解释文字。' },
        { role: 'user', content: buildPrompt() },
      ], { json: true, temperature: 0.5 });
      setRawResult(content);
      setProgress('解析中…');
      importFromText(content);
    } catch (e) {
      toast(`AI 调用失败: ${e.message}`, 'error');
    } finally {
      setLoading(false); setProgress('');
    }
  };

  // 手动粘贴真实 JD 让 AI 结构化 + 匹配打分
  const [pasteJD, setPasteJD] = useState('');
  const [pasteURL, setPasteURL] = useState('');
  const [pasting, setPasting] = useState(false);
  const [pasteMode, setPasteMode] = useState(false);

  const parsePastedJD = async () => {
    if (!pasteJD.trim()) { toast('请先粘贴 JD 原文', 'error'); return; }
    setPasting(true);
    try {
      const { target, company, filters } = state;
      const prompt = `以下是从招聘网站复制的一份**真实**岗位 JD 原文，请帮我结构化并按我的偏好打分。

## 我的求职偏好
- 主岗位：${target.jobTitle}
- 关键词（按权重）：${target.keywords.map(k => `${k.text}(${k.weight}%)`).join('、')}
- 目标城市（按权重）：${target.cities.map(c => `${c.text}(${c.weight}%)`).join('、')}
- 偏好公司：${company.liked.join('、') || '无'}
- 拉黑公司：${company.disliked.join('、') || '无'}
- 实习时长上限：${filters.maxDurationMonths} 个月
- 实习类型偏好：${target.internType || 'all'}

## JD 原文
${pasteJD}

## 任务
请严格返回 JSON：
{
  "title": "岗位名称（从 JD 中提取）",
  "company": "公司名（从 JD 中提取）",
  "department": "部门（如能识别）",
  "city": "工作城市",
  "salary": "薪资（如 250-300/天）",
  "duration": "实习时长",
  "workingDays": "每周到岗",
  "internType": "daily 或 summer（根据 JD 判断，暑期集中短期实习为 summer，其他为 daily）",
  "jd": "把 JD 原文完整保留，不要删减，如有格式混乱可轻度整理但内容一个字都不能丢",
  "matchScore": 0-100 的整数,
  "matchReason": "结合我的偏好说明为何是这个分数"
}
只返回 JSON 对象，不要任何其他文字。`;

      const content = await callAI(state, [
        { role: 'system', content: '你是专业的 JD 结构化助手，严格返回 JSON。保留 JD 原文内容。' },
        { role: 'user', content: prompt },
      ], { json: true, temperature: 0.3 });

      const parsed = extractJSON(content);
      if (!parsed || !parsed.title) throw new Error('AI 无法识别 JD 内容');

      // 直接塞入 jobs

        j.title === parsed.title && j.company === parsed.company && (j.department || '') === (parsed.department || '')
      );
      if (existing) { toast('这个岗位已经在你的库里了', 'info'); return; }

      const newJob = {

        title: parsed.title,
        company: parsed.company || '未知公司',
        department: parsed.department || '',
        city: parsed.city || '',
        salary: parsed.salary || '',
        duration: parsed.duration || '',
        workingDays: parsed.workingDays || '',
        internType: parsed.internType === 'summer' ? 'summer' : 'daily',
        publishedAt: '',
        url: pasteURL.trim() || '',
        jd: parsed.jd || pasteJD,  // 兜底：AI 没返回 jd 就用用户粘贴的原文
        summary: '',
        matchScore: Math.round(parsed.matchScore || 70),
        matchReason: parsed.matchReason || '',
        discoveredDate: formatDate(),
        isNew: true,
        source: 'manual',  // 标记来源，真实 JD
      };

      setState({
        ...state,
        jobs: [newJob, ...state.jobs.map(j => ({ ...j, isNew: false }))],
        stats: { ...state.stats, totalJobs: state.stats.totalJobs + 1 },
      });
      toast(`✅ 已导入：${parsed.title} @ ${parsed.company}`, 'success');
      setPasteJD('');
      setPasteURL('');
    } catch (e) {
      toast(`解析失败：${e.message}`, 'error');
    } finally {
      setPasting(false);
    }
  };

  const hasAI = true; // 默认有免费额度，调用时失败/超额再提示

  return (

            <div className="text-2xl">⚠️</div>

              <div className="font-semibold text-amber-900">AI 尚未配置</div>
              <div className="text-sm text-amber-800 mt-1">

              </div>
            </div>
          </div>
        </Card>
      )}

                  ? <Tag variant="rose">🌞 暑期实习</Tag>

          <textarea value={manualInput} onChange={e => setManualInput(e.target.value)}

          <div className="mt-3 flex justify-end">

              导入岗位
            </Button>
          </div>
        </Card>
      )}

      {!pasteMode && rawResult && (
        <Card className="p-5">
          <div className="text-sm font-semibold mb-2 text-slate-700">AI 原始返回</div>
          <pre className="text-xs text-slate-600 bg-slate-50 p-3 rounded-lg max-h-60 overflow-y-auto scrollbar-thin whitespace-pre-wrap">{rawResult}</pre>
        </Card>
      )}

      <Modal open={showPrompt} onClose={() => setShowPrompt(false)} title="搜索 Prompt 预览" size="lg"
        footer={<>
          <Button variant="secondary" onClick={() => setShowPrompt(false)}>关闭</Button>
          <Button onClick={() => { copyPrompt(); setShowPrompt(false); }}>复制 Prompt</Button>
        </>}>
        <pre className="text-xs text-slate-700 whitespace-pre-wrap bg-slate-50 p-4 rounded-lg">{buildPrompt()}</pre>
      </Modal>
    </div>
  );
}

        (j.city || '').toLowerCase().includes(s)
      );
    }
    if (typeFilter !== 'all') {
      list = list.filter(j => (j.internType || 'daily') === typeFilter);
    }
    if (filter !== 'all') {
      list = list.filter(j => {
        const app = state.applications.find(a => a.jobId === j.id);
        if (filter === 'new') return !app && j.isNew;
        if (filter === 'pending') return !app;
        if (filter === 'applied') return app && app.status === 'applied';
        return true;
      });
    }
    if (sortBy === 'score') list.sort((a, b) => (b.matchScore || 0) - (a.matchScore || 0));
    else if (sortBy === 'date') list.sort((a, b) => (b.discoveredDate || '').localeCompare(a.discoveredDate || ''));
    return list;
  }, [state, filter, typeFilter, search, sortBy]);

  const filters = [
    { id: 'all', label: '全部', count: state.jobs.length },
    { id: 'new', label: '🆕 新发现', count: state.jobs.filter(j => j.isNew && !state.applications.find(a => a.jobId === j.id)).length },
    { id: 'pending', label: '待处理', count: state.jobs.filter(j => !state.applications.find(a => a.jobId === j.id)).length },
    { id: 'applied', label: '已投递', count: state.applications.filter(a => a.status === 'applied').length },
  ];

  const clearAll = () => {
    if (!confirm('确定清空所有岗位？（不会删除投递记录）')) return;
    setState({ ...state, jobs: [] });
    toast('已清空岗位库', 'info');
  };

  return (
    <div className="p-8 max-w-6xl mx-auto fade-in">
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-3xl font-bold mb-1">岗位看板</h1>
          <p className="text-slate-500">{state.jobs.length} 个岗位总览</p>
        </div>
        <Button variant="danger" size="sm" onClick={clearAll} disabled={!state.jobs.length}>清空岗位</Button>
      </div>

      <div className="flex items-center gap-3 mb-4 flex-wrap">
        <div className="flex-1 relative min-w-[240px]">
          <Icon name="search" className="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
          <input value={search} onChange={e => setSearch(e.target.value)}
            placeholder="搜索岗位/公司/城市…"
            className="w-full pl-9 pr-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        </div>
        <select value={sortBy} onChange={e => setSortBy(e.target.value)}
          className="px-3 py-2 border border-slate-200 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500">
          <option value="score">按匹配度</option>
          <option value="date">按发现日期</option>
        </select>
      </div>

      <div className="flex items-center gap-2 mb-3 flex-wrap">
        <span className="text-xs text-slate-500 mr-1">类型：</span>
        {[
          { id: 'all', label: '全部' },
          { id: 'daily', label: '📅 日常', count: state.jobs.filter(j => (j.internType || 'daily') === 'daily').length },
          { id: 'summer', label: '🌞 暑期', count: state.jobs.filter(j => j.internType === 'summer').length },
        ].map(f => (
          <button key={f.id} onClick={() => setTypeFilter(f.id)}
            className={`px-3 py-1 rounded-md text-xs font-medium transition-colors ${
              typeFilter === f.id ? 'bg-slate-900 text-white' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50'
            }`}>
            {f.label}{f.count != null && <span className="opacity-70"> ({f.count})</span>}
          </button>
        ))}
      </div>

      <div className="flex items-center gap-2 mb-4 flex-wrap">
        {filters.map(f => (
          <button key={f.id} onClick={() => setFilter(f.id)}
            className={`px-3 py-1.5 rounded-lg text-sm font-medium transition-colors ${
              filter === f.id ? 'bg-indigo-600 text-white' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50'
            }`}>
            {f.label} <span className="opacity-70">({f.count})</span>
          </button>
        ))}
      </div>

      <Card>
        {filtered.length === 0 ? (
          <div className="p-12 text-center text-slate-500">
            <div className="text-5xl mb-3">📭</div>
            <div>没有符合条件的岗位</div>
          </div>
        ) : (
          <div className="divide-y divide-slate-100">
            {filtered.map(job => <JobRow key={job.id} job={job} state={state} setState={setState} toast={toast} />)}
          </div>
        )}
      </Card>
    </div>
  );
}
// =============== 投递管理 ===============
function TrackerPage({ state, setState, toast }) {
  const COLS = [
    { id: 'applied', label: '📮 已投递', color: 'amber' },
    { id: 'interview', label: '🎤 面试中', color: 'purple' },
    { id: 'offer', label: '🎉 Offer', color: 'emerald' },
    { id: 'rejected', label: '❌ 已拒', color: 'rose' },
  ];

  const updateStatus = (appId, newStatus) => {
    setState({
      ...state,
      applications: state.applications.map(a =>
        a.id === appId
          ? { ...a, status: newStatus, history: [...(a.history || []), { status: newStatus, at: new Date().toISOString() }] }
          : a
      ),
    });
    toast(`已更新为「${COLS.find(c => c.id === newStatus)?.label}」`, 'success');
  };

  const deleteApp = (appId) => {
    if (!confirm('确定删除这条投递记录？')) return;
    setState({ ...state, applications: state.applications.filter(a => a.id !== appId) });
    toast('已删除', 'info');
  };

  const getJob = (jobId) => state.jobs.find(j => j.id === jobId);

  return (
    <div className="p-8 max-w-7xl mx-auto fade-in">
      <div className="mb-6">
        <h1 className="text-3xl font-bold mb-1">投递管理</h1>
        <p className="text-slate-500">看板式追踪每一次投递进度</p>
      </div>

      <div className="grid grid-cols-4 gap-4">
        {COLS.map(col => {
          const items = state.applications.filter(a => a.status === col.id);
          return (
            <Card key={col.id} className="flex flex-col max-h-[calc(100vh-200px)]">
              <div className={`px-4 py-3 border-b border-slate-100 bg-${col.color}-50 rounded-t-xl`}>
                <div className="font-semibold text-sm">{col.label}</div>
                <div className="text-xs text-slate-500 mt-0.5">{items.length} 个</div>
              </div>
              <div className="flex-1 overflow-y-auto p-3 space-y-2 scrollbar-thin">
                {items.length === 0
                  ? <div className="text-xs text-slate-400 text-center py-6">暂无</div>
                  : items.map(app => {
                      const job = getJob(app.jobId);
                      if (!job) return null;
                      return (
                        <div key={app.id} className="p-3 bg-slate-50 rounded-lg border border-slate-100 hover:border-slate-300 transition-colors">
                          <div className="text-sm font-semibold text-slate-900">{job.title}</div>
                          <div className="text-xs text-slate-600 mt-0.5">{job.company}</div>
                          <div className="text-xs text-slate-400 mt-1">{new Date(app.appliedAt).toLocaleDateString()}</div>
                          <div className="flex items-center gap-1 mt-2">
                            <select value={app.status} onChange={e => updateStatus(app.id, e.target.value)}
                              className="flex-1 text-xs px-2 py-1 border border-slate-200 rounded bg-white focus:outline-none focus:ring-1 focus:ring-indigo-500">
                              {COLS.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}
                            </select>
                            <button onClick={() => deleteApp(app.id)} className="p-1 text-slate-400 hover:text-red-500">
                              <Icon name="trash" className="w-3.5 h-3.5" />
                            </button>
                          </div>
                        </div>
                      );
                    })}
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );
}

// =============== 面试备战 ===============
function InterviewPage({ state, setState, toast }) {
  const [current, setCurrent] = useState(null);
  const [answer, setAnswer] = useState('');
  const [grading, setGrading] = useState(false);
  const [loading, setLoading] = useState(false);
  const [showMistakes, setShowMistakes] = useState(false);
  const hasAI = true; // 默认有免费额度

  const generateQuestion = async () => {
    if (!hasAI) { toast('请先在「AI 设置」中配置 API Key', 'error'); return; }
    setLoading(true);
    try {
      const recentTitles = state.interview.history.slice(-10).map(q => q.title).join('、');
      const prompt = `你是一个互联网大厂产品经理面试官。请出 1 道适合「${state.target.jobTitle}」应届生的面试题。

题目类型从以下随机选一：产品思维题 / 数据分析题 / 经历深挖题 / 行业认知题 / 业务场景题。
${recentTitles ? `\n注意：不要和这些最近出过的题重复：${recentTitles}` : ''}

严格返回 JSON：{"title":"题目标题","type":"类型","question":"完整题目描述","hint":"思考提示（不给答案，2-3句话点到即止）"}`;

      const content = await callAI(state, [
        { role: 'system', content: '你是资深产品面试官。严格返回 JSON。' },
        { role: 'user', content: prompt },
      ], { json: true });

      const q = extractJSON(content);
      if (!q || !q.question) throw new Error('解析题目失败');

      const newQ = { id: uuid(), ...q, createdAt: new Date().toISOString() };
      setCurrent(newQ);
      setAnswer('');
      setState({
        ...state,
        interview: { ...state.interview, history: [...state.interview.history, newQ] },
      });
    } catch (e) {
      toast(`出题失败: ${e.message}`, 'error');
    } finally {
      setLoading(false);
    }
  };

  const gradeAnswer = async () => {
    if (!current || !answer.trim()) return;
    setGrading(true);
    try {
      const prompt = `以下是一道产品面试题和候选人的回答，请以大厂面试官的视角给出点评。

【题目】${current.question}
【候选人回答】${answer}

严格返回 JSON：{"score":1-10的整数,"pros":"答得好的点（2-3条）","cons":"可改进的点（2-3条）","reference":"参考思路大纲：用要点而非完整答案，3-5 个思考角度的关键词/短句，不要代替候选人思考"}`;

      const content = await callAI(state, [
        { role: 'system', content: '你是资深产品面试官，点评犀利但建设性。严格返回 JSON。' },
        { role: 'user', content: prompt },
      ], { json: true });

      const grade = extractJSON(content);
      if (!grade) throw new Error('解析批改失败');

      const graded = { ...current, answer, grade, gradedAt: new Date().toISOString() };
      setCurrent(graded);
      setState({
        ...state,
        interview: {
          ...state.interview,
          history: state.interview.history.map(q => q.id === current.id ? graded : q),
          mistakes: grade.score < 6
            ? [...state.interview.mistakes.filter(m => m.id !== current.id), graded]
            : state.interview.mistakes,
        },
      });
    } catch (e) {
      toast(`批改失败: ${e.message}`, 'error');
    } finally {
      setGrading(false);
    }
  };

  // 面试题库模式
  const [mode, setMode] = useState('bank'); // 'bank' = 真题库, 'trainer' = AI 陪练
  const [bankQuestions, setBankQuestions] = useState([]);
  const [bankLoading, setBankLoading] = useState(false);
  const [bankFilter, setBankFilter] = useState({ company: '', category: '', round: '' });
  const [selectedQ, setSelectedQ] = useState(null);

  useEffect(() => {
    if (mode !== 'bank') return;
    setBankLoading(true);
    const qs = new URLSearchParams();
    if (bankFilter.company) qs.set('company', bankFilter.company);
    if (bankFilter.category) qs.set('category', bankFilter.category);
    if (bankFilter.round) qs.set('round', bankFilter.round);
    qs.set('limit', '200');
    fetch(`/api/interview-questions?${qs}`)
      .then(r => r.json())
      .then(data => setBankQuestions(data.questions || []))
      .catch(() => setBankQuestions([]))
      .finally(() => setBankLoading(false));
  }, [mode, bankFilter]);

  // 从题库挑一题加入练习（把真题 push 进 history 并 setCurrent）
  const practiceFromBank = (q) => {
    const newQ = {
      id: uuid(),
      title: `${q.company || '大厂'} · ${q.position || '岗位'} · ${q.round || ''}`.replace(/\s+·\s+/g, ' · '),
      type: q.category || '真题',
      question: q.question,
      hint: (() => { try { return JSON.parse(q.thinking_points || '[]').map((t, i) => `${i+1}. ${t}`).join('\n'); } catch { return ''; } })(),
      createdAt: new Date().toISOString(),
      sourceBank: true,
    };
    setCurrent(newQ);
    setAnswer('');
    setMode('trainer');
    setState({
      ...state,
      interview: { ...state.interview, history: [...state.interview.history, newQ] },
    });
  };

  return (
    <div className="p-8 max-w-5xl mx-auto fade-in">
      <div className="flex items-start justify-between mb-6">
        <div>
          <h1 className="text-3xl font-bold mb-1">面试题库 <span className="text-base font-normal text-slate-400 ml-2">真题 + AI 陪练</span></h1>
          <p className="text-slate-500">大厂真实面经题（带思考大纲） · AI 出题陪练 · 即时批改 · 错题本</p>
        </div>
        <div className="flex gap-2">
          <Button variant="secondary" onClick={() => setShowMistakes(true)}>
            错题本 ({state.interview.mistakes.length})
          </Button>
        </div>
      </div>

      {/* Tab 切换 */}
      <div className="flex gap-2 mb-5">
        <button onClick={() => setMode('bank')}
          className={`flex-1 px-4 py-3 rounded-xl border-2 text-left transition-all ${
            mode === 'bank' ? 'border-indigo-500 bg-indigo-50' : 'border-slate-200 bg-white hover:border-slate-300'
          }`}>
          <div className="font-semibold text-sm">📚 真题题库</div>
          <div className="text-xs text-slate-500 mt-1">大厂真实面经题 · 带 AI 思考大纲（不代替你思考）</div>
        </button>
        <button onClick={() => setMode('trainer')}
          className={`flex-1 px-4 py-3 rounded-xl border-2 text-left transition-all ${
            mode === 'trainer' ? 'border-indigo-500 bg-indigo-50' : 'border-slate-200 bg-white hover:border-slate-300'
          }`}>
          <div className="font-semibold text-sm">💪 AI 陪练</div>
          <div className="text-xs text-slate-500 mt-1">AI 根据你的目标岗位出题，回答后即时批改</div>
        </button>
      </div>

      {/* 真题题库 */}
      {mode === 'bank' && (
        <>
          {/* 筛选 */}
          <div className="flex items-center gap-2 mb-4 flex-wrap">
            <input value={bankFilter.company} onChange={e => setBankFilter({ ...bankFilter, company: e.target.value })}
              placeholder="公司（如：字节）"
              className="px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
            <select value={bankFilter.category} onChange={e => setBankFilter({ ...bankFilter, category: e.target.value })}
              className="px-3 py-2 border border-slate-200 rounded-lg text-sm bg-white">
              <option value="">全部类型</option>
              <option value="产品思维">产品思维</option>
              <option value="数据分析">数据分析</option>
              <option value="经历深挖">经历深挖</option>
              <option value="行业认知">行业认知</option>
              <option value="业务场景">业务场景</option>
              <option value="算法题">算法题</option>
              <option value="基础知识">基础知识</option>
              <option value="开放题">开放题</option>
            </select>
            <select value={bankFilter.round} onChange={e => setBankFilter({ ...bankFilter, round: e.target.value })}
              className="px-3 py-2 border border-slate-200 rounded-lg text-sm bg-white">
              <option value="">全部轮次</option>
              <option value="一面">一面</option>
              <option value="二面">二面</option>
              <option value="三面">三面</option>
              <option value="HR面">HR面</option>
              <option value="终面">终面</option>
              <option value="群面">群面</option>
              <option value="笔试">笔试</option>
            </select>
            {(bankFilter.company || bankFilter.category || bankFilter.round) && (
              <Button variant="ghost" size="sm" onClick={() => setBankFilter({ company: '', category: '', round: '' })}>清空</Button>
            )}
            <div className="ml-auto text-sm text-slate-500">共 {bankQuestions.length} 道题</div>
          </div>

          {bankLoading && <Card className="p-6 text-center text-slate-500 text-sm">⏳ 加载中…</Card>}

          {!bankLoading && bankQuestions.length === 0 && (
            <Card className="p-10 text-center text-slate-500">
              <div className="text-4xl mb-3">📝</div>
              <div className="text-sm">暂无面经题（公众号文章处理中…）</div>
              <div className="text-xs text-slate-400 mt-1">Cron 每 2 小时自动抓取，或在管理面板点「自动处理」加速</div>
            </Card>
          )}

          {!bankLoading && bankQuestions.length > 0 && (
            <Card>
              <div className="divide-y divide-slate-100">
                {bankQuestions.map(q => {
                  const points = (() => { try { return JSON.parse(q.thinking_points || '[]'); } catch { return []; } })();
                  const tags = (() => { try { return JSON.parse(q.tags || '[]'); } catch { return []; } })();
                  return (
                    <div key={q.id} className="px-5 py-4 hover:bg-slate-50 cursor-pointer" onClick={() => setSelectedQ(q)}>
                      <div className="flex items-start gap-4">
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center gap-2 flex-wrap mb-1">
                            {q.company && <Tag variant="indigo">{q.company}</Tag>}
                            {q.position && <Tag>{q.position}</Tag>}
                            {q.round && <Tag variant="amber">{q.round}</Tag>}
                            {q.category && <Tag variant="emerald">{q.category}</Tag>}
                            <span className="text-xs text-slate-400">难度 {q.difficulty}/5</span>
                          </div>
                          <div className="font-semibold text-slate-900">{q.question}</div>
                          {points.length > 0 && (
                            <div className="text-xs text-slate-500 mt-1.5 line-clamp-1">
                              💡 思考要点：{points.slice(0, 3).join(' / ')}{points.length > 3 ? '…' : ''}
                            </div>
                          )}
                        </div>
                        <div className="text-xs text-indigo-600 whitespace-nowrap">查看 →</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </Card>
          )}

          {/* 题目详情弹窗 */}
          <Modal open={!!selectedQ} onClose={() => setSelectedQ(null)}
            title={selectedQ ? `${selectedQ.company || '大厂'} · ${selectedQ.position || '面试题'}` : ''} size="lg"
            footer={<>
              {selectedQ?.source_url && (
                <Button variant="secondary" onClick={() => window.open(selectedQ.source_url, '_blank')}>
                  📖 查看原文
                </Button>
              )}
              <Button onClick={() => { practiceFromBank(selectedQ); setSelectedQ(null); }}>
                💪 用这道题练习
              </Button>
            </>}>
            {selectedQ && (
              <div className="space-y-4">
                <div className="flex items-center gap-2 flex-wrap">
                  {selectedQ.round && <Tag variant="amber">{selectedQ.round}</Tag>}
                  {selectedQ.category && <Tag variant="emerald">{selectedQ.category}</Tag>}
                  <span className="text-xs text-slate-500">难度 {selectedQ.difficulty}/5</span>
                </div>
                <div className="p-4 bg-slate-50 rounded-lg border border-slate-100">
                  <div className="text-xs font-semibold text-slate-600 mb-1.5">🎯 题目</div>
                  <div className="text-slate-900 leading-relaxed whitespace-pre-wrap">{selectedQ.question}</div>
                </div>
                {selectedQ.context && (
                  <div className="text-xs text-slate-500">背景：{selectedQ.context}</div>
                )}
                {(() => {
                  const points = (() => { try { return JSON.parse(selectedQ.thinking_points || '[]'); } catch { return []; } })();
                  if (!points.length) return null;
                  return (
                    <div className="p-4 bg-indigo-50 border border-indigo-100 rounded-lg">
                      <div className="text-xs font-semibold text-indigo-700 mb-2">💡 思考要点（只是大纲，不是答案）</div>
                      <ul className="space-y-1.5 text-sm text-indigo-900">
                        {points.map((p, i) => <li key={i} className="flex gap-2"><span>{i + 1}.</span><span>{p}</span></li>)}
                      </ul>
                      <div className="text-xs text-indigo-600 mt-3 italic">👉 点右下角"用这道题练习"，自己作答后 AI 会给批改反馈</div>
                    </div>
                  );
                })()}
              </div>
            )}
          </Modal>
        </>
      )}

      {/* AI 陪练 */}
      {mode === 'trainer' && !current && (
        <Card className="p-8 text-center">
          <div className="text-5xl mb-4">💪</div>
          <div className="text-xl font-semibold mb-2">今天来几道面试题？</div>
          <p className="text-sm text-slate-500 mb-6">AI 会针对你的目标岗位出题，回答后即时批改打分</p>
          <Button onClick={generateQuestion} disabled={loading || !hasAI} size="lg">
            {loading ? '出题中…' : '🎯 来一道题'}
          </Button>
          {state.interview.history.length > 0 && (
            <div className="mt-8 text-left">
              <div className="text-sm font-semibold text-slate-600 mb-2">最近做过的题</div>
              <div className="space-y-1.5">
                {state.interview.history.slice(-5).reverse().map(q => (
                  <div key={q.id} className="text-sm p-2 bg-slate-50 rounded flex items-center justify-between">
                    <span className="truncate">{q.title}</span>
                    {q.grade && (
                      <span className={`text-xs font-bold ${q.grade.score >= 8 ? 'text-emerald-600' : q.grade.score >= 6 ? 'text-indigo-600' : 'text-rose-600'}`}>
                        {q.grade.score}/10
                      </span>
                    )}
                  </div>
                ))}
              </div>
            </div>
          )}
        </Card>
      )}

      {mode === 'trainer' && current && (

                <Button onClick={gradeAnswer} disabled={grading || !answer.trim()}>

            </>
          ) : (
            <div className="space-y-4">
              <div className="flex items-center gap-3">
                <div className={`text-3xl font-bold ${current.grade.score >= 8 ? 'text-emerald-600' : current.grade.score >= 6 ? 'text-indigo-600' : 'text-rose-600'}`}>

                </div>

              </div>
              <div className="p-4 bg-slate-50 rounded-lg">
                <div className="text-xs font-semibold text-slate-600 mb-1">你的回答</div>
                <div className="text-sm text-slate-700 whitespace-pre-wrap">{current.answer}</div>
              </div>
              <div className="p-4 bg-emerald-50 border border-emerald-100 rounded-lg">
                <div className="text-xs font-semibold text-emerald-700 mb-1">✅ 答得好的点</div>
                <div className="text-sm text-emerald-900 whitespace-pre-wrap">{current.grade.pros}</div>
              </div>
              <div className="p-4 bg-amber-50 border border-amber-100 rounded-lg">
                <div className="text-xs font-semibold text-amber-700 mb-1">⚠️ 可改进的点</div>
                <div className="text-sm text-amber-900 whitespace-pre-wrap">{current.grade.cons}</div>
              </div>
              <div className="p-4 bg-indigo-50 border border-indigo-100 rounded-lg">
                <div className="text-xs font-semibold text-indigo-700 mb-1">💡 参考思路</div>
                <div className="text-sm text-indigo-900 whitespace-pre-wrap">{current.grade.reference}</div>
              </div>
              <div className="flex justify-end gap-2 pt-2">
                <Button variant="secondary" onClick={() => { setCurrent(null); setAnswer(''); }}>完成</Button>
                <Button onClick={() => { setCurrent(null); setAnswer(''); generateQuestion(); }}>下一题 →</Button>
              </div>
            </div>
          )}
        </Card>
      )}

      <Modal open={showMistakes} onClose={() => setShowMistakes(false)} title="错题本" size="lg">
        {state.interview.mistakes.length === 0 ? (
          <div className="text-center py-10 text-slate-500">
            <div className="text-4xl mb-3">🎉</div>
            <div>暂无错题，继续加油！</div>
          </div>
        ) : (
          <div className="space-y-3">
            {state.interview.mistakes.map(m => (
              <div key={m.id} className="p-4 bg-slate-50 rounded-lg border border-slate-100">
                <div className="flex items-center justify-between mb-2">
                  <div>
                    <Tag variant="rose">得分 {m.grade.score}/10</Tag>
                    <span className="ml-2 font-semibold text-sm">{m.title}</span>

                  <button onClick={() => {
                    setState({ ...state, interview: { ...state.interview, mistakes: state.interview.mistakes.filter(x => x.id !== m.id) } });
                  }} className="text-xs text-slate-400 hover:text-red-500">移出错题本</button>
                </div>
                <div className="text-sm text-slate-700 mb-2">{m.question}</div>
                <details className="text-xs">
                  <summary className="cursor-pointer text-indigo-600 hover:text-indigo-700">查看回答和点评</summary>
                  <div className="mt-2 space-y-2 text-slate-600">
                    <div><b>你的回答：</b>{m.answer}</div>
                    <div><b>改进建议：</b>{m.grade.cons}</div>
                    <div><b>参考思路：</b>{m.grade.reference}</div>
                  </div>
                </details>
              </div>
            ))}
          </div>
        )}
      </Modal>
    </div>
  );
}

function WeightedList({ items, onChange, placeholder, variant = 'default' }) {
  const [input, setInput] = useState('');
  const add = () => {
    const t = input.trim();
    if (!t) return;
    if (items.find(i => i.text === t)) { setInput(''); return; }
    const n = items.length + 1;
    const weight = Math.round(100 / n);
    onChange([...items, { text: t, weight }]);
    setInput('');
  };
  const remove = (text) => onChange(items.filter(i => i.text !== text));
  const updateWeight = (text, w) => onChange(items.map(i => i.text === text ? { ...i, weight: Math.max(0, Math.min(100, parseInt(w) || 0)) } : i));

  return (
    <div className="space-y-2">
      <div className="flex gap-2">
        <input value={input} onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && (e.preventDefault(), add())}
          placeholder={placeholder}
          className="flex-1 px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        <Button variant="secondary" size="sm" onClick={add}>添加</Button>
      </div>
      <div className="space-y-1.5">
        {items.map(item => (
          <div key={item.text} className="flex items-center gap-2 px-3 py-1.5 bg-slate-50 rounded-lg">
            <span className="flex-1 text-sm">{item.text}</span>
            <input type="number" min="0" max="100" value={item.weight}
              onChange={e => updateWeight(item.text, e.target.value)}
              className="w-16 px-2 py-1 border border-slate-200 rounded text-xs text-right focus:outline-none focus:ring-1 focus:ring-indigo-500" />
            <span className="text-xs text-slate-400">%</span>
            <button onClick={() => remove(item.text)} className="p-1 text-slate-400 hover:text-red-500">
              <Icon name="x" className="w-3.5 h-3.5" />
            </button>
          </div>
        ))}
      </div>
    </div>
  );
}

function SimpleList({ items, onChange, placeholder }) {
  const [input, setInput] = useState('');
  const add = () => {
    const t = input.trim();
    if (!t || items.includes(t)) { setInput(''); return; }
    onChange([...items, t]);
    setInput('');
  };
  return (
    <div className="space-y-2">
      <div className="flex gap-2">
        <input value={input} onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && (e.preventDefault(), add())}
          placeholder={placeholder}
          className="flex-1 px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        <Button variant="secondary" size="sm" onClick={add}>添加</Button>
      </div>
      <div className="flex flex-wrap gap-1.5">
        {items.map(t => (
          <Tag key={t} onRemove={() => onChange(items.filter(x => x !== t))}>{t}</Tag>
        ))}
      </div>
    </div>
  );
}

function ConfigPage({ state, setState, toast }) {

    for (let i = 0; i < parts.length - 1; i++) cur = cur[parts[i]];
    cur[parts[parts.length - 1]] = value;
    setState(next);
  };

  const exportData = () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `job_hunt_backup_${formatDate()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast('已导出备份', 'success');
  };

  const importData = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();

      try {
        const data = JSON.parse(reader.result);
        if (!data.target || !data.ai) throw new Error('文件格式不正确');
        if (!confirm('导入会覆盖当前所有数据，确定继续？')) return;
        setState(data);
        toast('导入成功', 'success');

                <option value="summary">AI 摘要</option>
              </select>

          </div>
        </Card>

        {/* 数据管理 */}
        <Card className="p-5">
          <div className="font-semibold mb-4">💾 数据管理</div>
          <div className="flex items-center gap-2 flex-wrap">
            <Button variant="secondary" size="sm" onClick={exportData}>
              <span className="flex items-center gap-1"><Icon name="download" className="w-4 h-4" />导出备份</span>
            </Button>
            <label className="inline-flex">
              <input type="file" accept="application/json" onChange={importData} className="hidden" />
              <span className="cursor-pointer px-3 py-1.5 text-sm font-medium bg-white border border-slate-200 rounded-lg text-slate-700 hover:bg-slate-50 flex items-center gap-1">

        </Card>
      </div>
    </div>
  );
}

  const [quota, setQuota] = useState(null);
  const [showGuide, setShowGuide] = useState(false);

  const update = (path, value) => {
    const parts = path.split('.');
    const next = JSON.parse(JSON.stringify(state));
    let cur = next;
    for (let i = 0; i < parts.length - 1; i++) cur = cur[parts[i]];
    cur[parts[parts.length - 1]] = value;
    setState(next);
  };

  // 初始加载免费额度
  useEffect(() => {
    fetchQuota().then(setQuota);
  }, []);

  // 测试免费额度

  return (

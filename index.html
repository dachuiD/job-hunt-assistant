  tailwind.config = {
    theme: {
      extend: {
        colors: {
          brand: {
            50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6',
            600: '#2563eb', 700: '#1d4ed8',
          },

            500: '#10b981', 600: '#059669',
          },
        },

          sans: ['-apple-system', 'BlinkMacSystemFont', '"SF Pro Text"', '"Segoe UI"', 'PingFang SC', '"Microsoft YaHei"', 'sans-serif'],
        },

<style>
  /* 自定义：苹果感交互 —— 克制的过渡、subtle 的反馈 */
  * { -webkit-tap-highlight-color: transparent; }
  html, body { scroll-behavior: smooth; }
  body {
    background: #f7f8fa;
    color: #111827;
    font-feature-settings: "cv02", "cv03", "cv04", "cv11";
  }

  /* 按钮：默认过渡 200ms cubic-bezier，hover 轻抬升，active 微缩 */
  .btn-apple {
    transition: transform 180ms cubic-bezier(0.16, 1, 0.3, 1),
                box-shadow 180ms cubic-bezier(0.16, 1, 0.3, 1),
                background-color 140ms;
    will-change: transform;
  }
  .btn-apple:hover { transform: translateY(-1px); }
  .btn-apple:active { transform: translateY(0) scale(0.98); transition-duration: 80ms; }

  /* 卡片：hover 抬升，clickable 才加 cursor */
  .card-apple {
    transition: transform 220ms cubic-bezier(0.16, 1, 0.3, 1),
                box-shadow 220ms cubic-bezier(0.16, 1, 0.3, 1),
                border-color 180ms;
  }
  .card-apple.clickable:hover {
    transform: translateY(-2px);
  }

  /* 滚动条极简风 */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* 输入框聚焦：柔和蓝光 */
  input:focus, textarea:focus, select:focus {
    outline: none;
    box-shadow: 0 0 0 3px rgb(37 99 235 / 0.12);
    border-color: #2563eb !important;
  }

  /* 禁止 textarea resize 成丑形状，弹窗内不设最小高度 */
  textarea { resize: vertical; min-height: 120px; }
  .modal-card textarea { min-height: auto; }

  /* 移动端侧边栏 overlay */
  @media (max-width: 767px) {
    .sidebar-mobile-overlay { display: block !important; }
  }

  /* ===== v3.2 高级动效系统（仅 CSS transform/opacity，GPU 加速，60fps） ===== */

  /* 页面入场：淡入 + 上移 */
  @keyframes pageEnter {
    0% { opacity: 0; transform: translateY(12px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .animate-page-enter {
    animation: pageEnter 0.45s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  /* 卡片交错浮现：子元素依次入场 */
  .stagger-cards > * {
    opacity: 0;
    animation: cardReveal 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  @keyframes cardReveal {
    0% { opacity: 0; transform: translateY(16px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .stagger-cards > *:nth-child(1) { animation-delay: 0.05s; }
  .stagger-cards > *:nth-child(2) { animation-delay: 0.1s; }
  .stagger-cards > *:nth-child(3) { animation-delay: 0.15s; }
  .stagger-cards > *:nth-child(4) { animation-delay: 0.2s; }
  .stagger-cards > *:nth-child(5) { animation-delay: 0.25s; }
  .stagger-cards > *:nth-child(6) { animation-delay: 0.3s; }
  .stagger-cards > *:nth-child(7) { animation-delay: 0.35s; }
  .stagger-cards > *:nth-child(8) { animation-delay: 0.4s; }

  /* 骨架屏加载：脉冲呼吸 */
  @keyframes skeletonPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .skeleton {
    background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
    background-size: 200% 100%;
    animation: skeletonPulse 1.5s ease-in-out infinite;
    border-radius: 6px;
  }

  /* 数字跳动：配额计数器 */
  @keyframes countUp {
    0% { opacity: 0; transform: translateY(8px) scale(0.9); }
    60% { transform: translateY(-1px) scale(1.02); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  .animate-count {
    animation: countUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  /* 卡片 hover 增强：3D 微抬 + 光晕 */
  .card-apple {
    transition: transform 280ms cubic-bezier(0.16, 1, 0.3, 1),
                box-shadow 280ms cubic-bezier(0.16, 1, 0.3, 1),
                border-color 200ms;
  }
  .card-apple.clickable:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px -6px rgb(0 0 0 / 0.12), 0 2px 6px -2px rgb(0 0 0 / 0.06);
  }
  .card-apple.clickable:active {
    transform: translateY(-1px);
    transition-duration: 100ms;
  }

  /* 标签入场：缩放弹出 */
  @keyframes tagPop {
    0% { opacity: 0; transform: scale(0.85); }
    70% { transform: scale(1.05); }
    100% { opacity: 1; transform: scale(1); }
  }
  .animate-tag-pop {
    animation: tagPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  /* 圆圈波纹：通知未读数 */
  @keyframes notifPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgb(244 63 94 / 0.4); }
    50% { box-shadow: 0 0 0 6px rgb(244 63 94 / 0); }
  }
  .badge-pulse {
    animation: notifPulse 2s ease-in-out infinite;
  }

  /* 输入框聚焦增强 */
  input:focus, textarea:focus, select:focus {
    outline: none;
    box-shadow: 0 0 0 3px rgb(37 99 235 / 0.15), 0 2px 8px rgb(37 99 235 / 0.08);
    border-color: #2563eb !important;
    transition: box-shadow 250ms cubic-bezier(0.16, 1, 0.3, 1),
                border-color 200ms;
  }

  /* Toast 通知滑入增强 */
  @keyframes toastSlideIn {
    0% { opacity: 0; transform: translateX(24px) translateY(-8px); }
    100% { opacity: 1; transform: translateX(0) translateY(0); }
  }
  .animate-toast-in {
    animation: toastSlideIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  /* ===== Modal 弹窗系统（纯 CSS + Portal 挂载到 body） ===== */

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
    animation: overlayIn 0.28s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  @supports (backdrop-filter: blur(1px)) {
    .modal-overlay { backdrop-filter: blur(2px); }
  }

  .modal-card {
    background: #fff;
    width: 100%;
    max-height: 60vh;
    overflow-y: auto;
    overscroll-behavior: contain;
    border-radius: 16px;
    box-shadow: 0 0 0 0 rgb(0 0 0 / 0);
    animation: cardSpringIn 0.42s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
    background: #fff;
    border-bottom: 1px solid #f3f4f6;
    padding: 12px 16px;
    font-weight: 600;
    font-size: 14px;
    color: #111827;
  }
  .modal-header h3 { margin: 0; font-size: 14px; }
  .modal-body { padding: 16px; }

  @media (max-width: 639px) {
    .modal-overlay {
      align-items: flex-end;
      padding: 0;
      background: rgba(0, 0, 0, 0);
    }
    .modal-card {
      max-height: 70vh;
      border-radius: 16px 16px 0 0;
      animation: sheetSpringUp 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .modal-header { padding: 10px 14px; }
    .modal-body { padding: 14px; }
  }

  /* —— 动效关键帧 —— */

  /* 遮罩渐入 + 模糊 */
  @keyframes overlayIn {
    0%   { opacity: 0; background: rgba(0, 0, 0, 0); }
    100% { opacity: 1; background: rgba(0, 0, 0, 0.35); }
  }

  /* 桌面弹窗：弹性缩放入场（轻微 overshoot 回弹） */
  @keyframes cardSpringIn {
    0%   { opacity: 0; transform: scale(0.92) translateY(16px); box-shadow: 0 0 0 0 rgb(0 0 0 / 0); }
    60%  { opacity: 1; transform: scale(1.015) translateY(-2px); box-shadow: 0 8px 24px -4px rgb(0 0 0 / 0.08); }
    100% { opacity: 1; transform: scale(1) translateY(0);     box-shadow: 0 12px 28px -6px rgb(0 0 0 / 0.12), 0 4px 8px -2px rgb(0 0 0 / 0.06); }
  }

  /* 移动端底部抽屉：弹升入场 */
  @keyframes sheetSpringUp {
    0%   { opacity: 0; transform: translateY(70px); }
    65%  { opacity: 1; transform: translateY(-4px); }
    100% { opacity: 1; transform: translateY(0); }
  }
</style>

<script type="text/babel" data-presets="react">

const { useState, useEffect, useRef, useMemo, createContext, useContext, useCallback } = React;

// ==================== API Client ====================
const API_BASE = '';  // 同源，走 /api/*

async function apiCall(path, options = {}) {
  const token = localStorage.getItem('token');
  const headers = {
    'Content-Type': 'application/json',
    ...(token ? { 'Authorization': 'Bearer ' + token } : {}),
    ...(options.headers || {}),
  };
  const resp = await fetch(API_BASE + path, { ...options, headers });
  const data = await resp.json().catch(() => ({}));
  if (!resp.ok) {
    const err = new Error(data.error || data.message || ('HTTP ' + resp.status));
    err.status = resp.status;
    err.data = data;
    throw err;
  }
  return data;
}

// ==================== Indicator（指南针 Logo） ====================

      <circle cx="16" cy="16" r="1.5" fill="#1a1a1a" />
    </svg>
  );
}

// ==================== 小图标（内联 SVG，避免引入图标库） ====================
const Icon = {
  Home: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /><polyline points="9 22 9 12 15 12 15 22" /></svg>,

  JD: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><rect x="2" y="7" width="20" height="14" rx="2" /><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" /></svg>,
  Board: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><rect x="3" y="3" width="7" height="9" /><rect x="14" y="3" width="7" height="5" /><rect x="14" y="12" width="7" height="9" /><rect x="3" y="16" width="7" height="5" /></svg>,
  Profile: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="10" /><path d="M12 6v6l4 2" /></svg>,
  Practice: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 20h9" /><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" /></svg>,
  Suggestion: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M9 18h6" /><path d="M10 22h4" /><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5A4.61 4.61 0 0 1 8.91 14" /></svg>,
  Bell: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" /><path d="M13.73 21a2 2 0 0 1-3.46 0" /></svg>,
  Settings: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" /></svg>,
  Admin: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /></svg>,

  X: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>,
  Plus: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></svg>,
  ArrowRight: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="5" y1="12" x2="19" y2="12" /><polyline points="12 5 19 12 12 19" /></svg>,
  Info: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="10" /><line x1="12" y1="16" x2="12" y2="12" /><line x1="12" y1="8" x2="12.01" y2="8" /></svg>,
};

// ==================== 全局应用上下文 ====================
const AppContext = createContext(null);
const useApp = () => useContext(AppContext);

function AppProvider({ children }) {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [toasts, setToasts] = useState([]);
  const [unreadCount, setUnreadCount] = useState(0);
  const [route, setRoute] = useState(() => {
    return window.location.hash.slice(1) || 'home';
  });

  // 路由变化监听
  useEffect(() => {
    const handler = () => setRoute(window.location.hash.slice(1) || 'home');
    window.addEventListener('hashchange', handler);
    return () => window.removeEventListener('hashchange', handler);
  }, []);

  const navigate = useCallback((path) => {
    window.location.hash = path;
  }, []);

  // Toast 系统
  const toast = useCallback((message, type = 'info', duration = 3000) => {
    const id = Date.now() + Math.random();
    setToasts(ts => [...ts, { id, message, type }]);
    if (duration > 0) {
      setTimeout(() => {
        setToasts(ts => ts.filter(t => t.id !== id));
      }, duration);
    }
    return id;
  }, []);

  const dismissToast = useCallback((id) => {
    setToasts(ts => ts.filter(t => t.id !== id));
  }, []);

  // 初始化：注册/登录指纹账号
  useEffect(() => {
    const safeSet = (k, v) => { try { localStorage.setItem(k, v); } catch {} };
    const safeGet = (k) => { try { return localStorage.getItem(k); } catch { return null; } };
    const safeDel = (k) => { try { localStorage.removeItem(k); } catch {} };

    async function init() {
      try {
        let fp = safeGet('fingerprint');
        if (!fp) {
          fp = 'fp_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
          safeSet('fingerprint', fp);
        }

        let token = safeGet('token');
        if (token) {
          // 尝试用老 token 拿 user
          try {
            const r = await apiCall('/api/auth/me');
            setUser(r.user);
            setLoading(false);
            return;
          } catch {
            // token 失效，走注册
            safeDel('token');
          }
        }

        // 指纹注册/登录
        const r = await apiCall('/api/auth/anon', {
          method: 'POST',
          body: JSON.stringify({ fingerprint: fp }),
        });
        safeSet('token', r.token);
        safeSet('user_id', r.user.id);
        setUser(r.user);
      } catch (e) {
        toast('连接失败：' + e.message, 'error', 5000);
      }
      setLoading(false);
    }
    init();
  }, []);

  // 拉通知未读数（每 60s 一次）
  useEffect(() => {
    if (!user) return;
    let timer;
    async function fetchUnread() {
      try {
        const r = await apiCall('/api/notifications?unread=1&limit=1');
        setUnreadCount(r.unread_count || 0);
      } catch {}
    }
    fetchUnread();
    timer = setInterval(fetchUnread, 60000);
    return () => clearInterval(timer);
  }, [user]);

  const refreshUser = useCallback(async () => {
    try {
      const r = await apiCall('/api/auth/me');
      setUser(r.user);
    } catch {}
  }, []);

  const value = {
    user, setUser, loading, toast, dismissToast, toasts,
    route, navigate, unreadCount, refreshUser,
  };

  return <AppContext.Provider value={value}>{children}</AppContext.Provider>;
}

// ==================== Toast 组件 ====================
function ToastStack() {
  const { toasts, dismissToast } = useApp();
  return (
    <div className="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none">
      {toasts.map(t => (
        <div key={t.id}
          className={
            'pointer-events-auto animate-toast-in px-4 py-3 rounded-xl shadow-lifted text-sm font-medium min-w-[260px] max-w-[360px] flex items-start gap-2 ' +
            (t.type === 'error' ? 'bg-rose-50 text-rose-900 border border-rose-200' :
             t.type === 'success' ? 'bg-emerald-50 text-emerald-900 border border-emerald-200' :
             'bg-white text-gray-900 border border-gray-200')
          }>
          <div className="flex-1">{t.message}</div>
          <button onClick={() => dismissToast(t.id)} className="opacity-50 hover:opacity-100 transition">
            <Icon.X className="w-4 h-4" />
          </button>
        </div>
      ))}
    </div>
  );
}

// ==================== 换设备提醒小弹窗 ====================
function DeviceNoticeBubble() {
  const [show, setShow] = useState(() => {
    return !localStorage.getItem('device_notice_dismissed');
  });

  if (!show) return null;

  const handleDismiss = () => {
    localStorage.setItem('device_notice_dismissed', '1');
    setShow(false);
  };

  return (
    <div className="fixed top-20 right-4 z-40 w-[320px] animate-slide-up">
      <div className="bg-white rounded-xl shadow-float border border-amber-200 p-4">
        <div className="flex items-start gap-3">
          <div className="mt-0.5 w-8 h-8 rounded-full bg-amber-50 flex items-center justify-center flex-shrink-0">
            <Icon.Info className="w-4 h-4 text-amber-600" />
          </div>
          <div className="flex-1 min-w-0">
            <div className="text-sm font-semibold text-gray-900">关于换设备</div>
            <div className="mt-1 text-xs text-gray-600 leading-relaxed">
              目前换设备登录会创建新账号，数据不互通。邮箱绑定恢复功能正在开发中，建议长期使用同一设备。
            </div>
          </div>
          <button onClick={handleDismiss} className="flex-shrink-0 text-gray-400 hover:text-gray-700 transition">
            <Icon.X className="w-4 h-4" />
          </button>
        </div>
      </div>
    </div>
  );
}

// ==================== Layout: 顶部栏 + 左侧边栏 ====================

  const [sidebarOpen, setSidebarOpen] = useState(false); // 移动端

  const menu = [
    { key: 'home', label: '总览', icon: Icon.Home },
    { key: 'resumes', label: '简历', icon: Icon.Resume },
    { key: 'jds', label: 'JD 库', icon: Icon.JD },
    { key: 'positions', label: '岗位看板', icon: Icon.Board },
    { key: 'profile', label: '我的画像', icon: Icon.Profile },

    menu.push({ key: 'admin', label: '管理面板', icon: Icon.Admin });

    <div className="min-h-screen flex flex-col">

        <div className="flex items-center h-14 px-4">
          <button
            onClick={() => setSidebarOpen(true)}
            className="md:hidden p-2 -ml-2 text-gray-600 hover:text-gray-900 transition">

          </button>
          <div className="flex items-center gap-2.5 cursor-pointer" onClick={() => navigate('home')}>

            <div className="hidden sm:block">
              <div className="text-[15px] font-semibold text-gray-900 leading-tight">求职小助</div>
              <div className="text-[10px] text-gray-500 leading-tight">AI 陪跑管家</div>
            </div>
          </div>

          <div className="flex-1" />

          {user && (
            <div className="flex items-center gap-3">
              <button
                onClick={() => navigate('notifications')}
                className="relative p-2 rounded-lg text-gray-600 hover:text-gray-900 hover:bg-gray-100 btn-apple">
                <Icon.Bell className="w-5 h-5" />
                {unreadCount > 0 && (
                  <span className="absolute top-1 right-1 w-4 h-4 rounded-full bg-rose-500 text-white text-[10px] font-bold flex items-center justify-center animate-scale-in badge-pulse">
                    {unreadCount > 9 ? '9+' : unreadCount}

              <div className="hidden sm:flex items-center gap-2 text-sm">
                <div className="w-7 h-7 rounded-full bg-gradient-to-br from-brand-500 to-accent-500 flex items-center justify-center text-white text-xs font-semibold">

              </div>
            </div>
          )}
        </div>
      </header>

      <div className="flex-1 flex">
        {/* 侧边栏（桌面常驻 + 移动端抽屉） */}
        {sidebarOpen && (
          <div className="fixed inset-0 bg-black/40 z-40 md:hidden animate-fade-in"
               onClick={() => setSidebarOpen(false)} />
        )}
        <aside className={
          'bg-white border-r border-gray-200 w-[220px] flex-shrink-0 z-40 flex flex-col ' +
          'md:sticky md:top-14 md:self-start md:h-[calc(100vh-3.5rem)] ' +
          'fixed top-14 bottom-0 left-0 transition-transform duration-300 ' +
          (sidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0')
        }>
          <nav className="p-3 flex flex-col gap-0.5 flex-1">
            {menu.map(item => {
              const IconComp = item.icon;
              const active = currentRoot === item.key;
              return (
                <button
                  key={item.key}
                  onClick={() => { navigate(item.key); setSidebarOpen(false); }}
                  className={
                    'group flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium btn-apple ' +
                    (active
                      ? 'bg-brand-50 text-brand-700'
                      : 'text-gray-700 hover:bg-gray-100')
                  }>
                  <IconComp className={'w-[18px] h-[18px] ' + (active ? 'text-brand-600' : 'text-gray-500 group-hover:text-gray-700')} />
                  <span className="flex-1 text-left">{item.label}</span>
                  {item.badge > 0 && (
                    <span className="min-w-[18px] h-[18px] px-1 rounded-full bg-rose-500 text-white text-[10px] font-bold flex items-center justify-center">
                      {item.badge > 9 ? '9+' : item.badge}
                    </span>
                  )}
                </button>
              );
            })}
          </nav>
          {/* 署名 */}
          <div className="px-4 py-3 border-t border-gray-100 text-[11px] text-gray-400 leading-tight">
            by dxh 同学
            <span className="mx-1.5 text-gray-300">·</span>
            v3.1
          </div>
        </aside>

        {/* 主内容 */}
        <main className="flex-1 min-w-0">
          <div className="max-w-6xl mx-auto px-4 md:px-8 py-6 md:py-8 animate-page-enter">
            {children}
          </div>
        </main>
      </div>
    </div>
  );
}

// ==================== 引导卡牌 Onboarding v3.2 ====================
function OnboardingFlow({ onDone }) {
  const { toast, refreshUser } = useApp();
  const [step, setStep] = useState(0);
  const [leaving, setLeaving] = useState(false);
  const [form, setForm] = useState({
    name: '', target_track: '', school: '', graduation_year: '',
  });
  const [submitting, setSubmitting] = useState(false);

  const skip = () => {
    setLeaving(true);
    localStorage.setItem('onboarding_dismissed', '1');
    setTimeout(onDone, 250);
  };

  const submit = async () => {
    setSubmitting(true);
    try {
      await apiCall('/api/auth/onboard', {
        method: 'POST',
        body: JSON.stringify({
          name: form.name || null,
          target_track: form.target_track || null,
          school: form.school || null,
          graduation_year: form.graduation_year ? Number(form.graduation_year) : null,
        }),
      });
      await refreshUser();
      toast('设置完成，开始使用吧', 'success');
      setLeaving(true);
      setTimeout(onDone, 250);
    } catch (e) {
      toast('保存失败：' + e.message, 'error');

    setSubmitting(false);

  const cards = [
    {
      icon: '🧭',

            把 JD 粘贴进来 → AI 自动拆解岗位要求 → 对比你的简历 → 告诉你<strong>哪里匹配、哪里差口气</strong>。
          </div>
        </div>
      ),
    },
    {
      icon: '📊',
      title: '不只是打分的 JD 分析',
      body: (
        <div className="text-sm text-gray-700 leading-relaxed space-y-3">
          <p>AI 会给每个 JD 打出<strong className="text-brand-700">6 档匹配评分</strong>，更关键的是——</p>
          <div className="bg-amber-50 rounded-lg p-3 text-xs text-amber-800 border border-amber-100">
            <strong>匹配度 78%（中等偏上）</strong><br/>
            ✅ 你的「用户调研」经历是加分项<br/>
            ⚠️ 「数据分析」是简历缺失的关键词<br/>

      ),

      title: '面试后的 AI 复盘',
      body: (
        <div className="text-sm text-gray-700 leading-relaxed space-y-3">
          <p>面完腾讯二面，把你能记起来的<strong className="text-brand-700">问答对话粘贴进来</strong>——</p>
          <div className="bg-purple-50 rounded-lg p-3 text-xs text-purple-800 border border-purple-100">
            <strong>AI 复盘结论示例：</strong><br/>
            ✅ 「项目经历」讲得扎实，有数据有逻辑<br/>
            ⚠️ 「为什么选产品方向」回答太泛，缺乏个人故事<br/>

                <span className="inline-block px-1.5 py-0.5 rounded bg-emerald-100 text-emerald-700 text-[10px]">竞品分析</span>{' '}

    },
    {
      icon: '🚀',
      title: '准备好了吗？',

          <div className="relative">
            <div className="absolute inset-0 flex items-center"><div className="w-full border-t border-gray-200" /></div>

          </div>
          <div className="space-y-2.5">
            <input className="w-full px-3 py-2.5 rounded-lg border border-gray-200 text-sm" placeholder="你的名字" value={form.name} onChange={e => setForm({...form, name: e.target.value})} />

              <option value="">求职方向（选填）</option>
              <option value="tech">技术/研发</option><option value="product">产品</option><option value="operation">运营</option><option value="market">市场/BD</option><option value="design">设计</option><option value="data">数据/分析</option><option value="other">其他</option>

          {cards.map((_, i) => (
            <div key={i} className={'h-1 rounded-full flex-1 transition-all duration-400 ' + (i <= step ? 'bg-brand-600' : 'bg-gray-200')} />
          ))}
        </div>

        {/* 跳过按钮 - 始终可见 */}
        {step < cards.length - 1 && (
          <button onClick={skip} className="absolute top-4 right-4 text-xs text-gray-400 hover:text-gray-600 transition">跳过 →</button>
        )}

        <div className="flex items-center gap-3 mb-3">
          <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-brand-50 to-brand-100 flex items-center justify-center text-lg">{current.icon}</div>

        <div className="mb-6">{current.body}</div>

        {step < cards.length - 1 && (
          <div className="flex gap-3">
            {step > 0 && (
              <button onClick={() => setStep(step - 1)} className="px-4 py-2 rounded-lg border border-gray-300 text-sm font-medium text-gray-700 hover:bg-gray-50 btn-apple">上一步</button>
            )}
            <div className="flex-1" />

          </div>
        )}
      </div>
    </div>
  );
}

// ==================== 页面：Home / Dashboard ====================
function HomePage() {
  const { user, navigate } = useApp();
  const [stats, setStats] = useState(null);
  const [quota, setQuota] = useState(null);
  const [positions, setPositions] = useState([]);
  const [suggestions, setSuggestions] = useState([]);
  const [recentReviews, setRecentReviews] = useState([]);

  useEffect(() => {
    (async () => {
      try {
        const [q, pos, sug, rv] = await Promise.all([
          apiCall('/api/me/quota'),
          apiCall('/api/positions'),
          apiCall('/api/suggestions?new=1'),
          apiCall('/api/reviews'),
        ]);
        setQuota(q);
        setPositions(pos.positions || []);
        setSuggestions(sug.suggestions || []);
        setRecentReviews(rv.reviews || []);
      } catch {}
    })();
  }, []);

  // 岗位按状态分组
  const positionsByStatus = useMemo(() => {
    const groups = {
      active: [], // 投递中、笔试、面试
      won: [],    // offer、入职
      closed: [], // 拒绝、放弃
    };
    for (const p of positions) {
      if (['offer', 'onboard'].includes(p.status)) groups.won.push(p);
      else if (['rejected', 'withdrawn'].includes(p.status)) groups.closed.push(p);
      else groups.active.push(p);
    }
    return groups;
  }, [positions]);

  const hello = (() => {
    const h = new Date().getHours();
    if (h < 6) return '深夜好';
    if (h < 12) return '早上好';
    if (h < 18) return '下午好';
    return '晚上好';
  })();

  return (
    <div className="space-y-6 animate-page-enter">
      {/* 欢迎 + 配额 */}
      <div className="flex flex-col md:flex-row md:items-end md:justify-between gap-4">
        <div>
          <h1 className="text-2xl md:text-3xl font-semibold text-gray-900">
            {hello}，{user?.name || '你'} 👋
          </h1>
          <p className="text-sm text-gray-600 mt-1">AI 随你使用越深入，越能给出精准建议。</p>
        </div>
        {quota && (
          <div className="bg-white rounded-xl border border-gray-200 shadow-soft px-4 py-3 flex gap-5 text-sm">
            <div>
              <div className="text-xs text-gray-500">今日快速 AI</div>
              <div className="font-semibold text-gray-900 animate-count">{quota.flash.used} / {quota.flash.limit}</div>
            </div>
            <div className="w-px bg-gray-200" />
            <div>
              <div className="text-xs text-gray-500">今日深度 AI</div>
              <div className="font-semibold text-gray-900 animate-count">{quota.pro.used} / {quota.pro.limit}</div>
            </div>
          </div>
        )}
      </div>

      {/* 空状态引导 */}
      {positions.length === 0 && recentReviews.length === 0 && (
        <div className="bg-gradient-to-br from-brand-50 to-accent-50 rounded-2xl p-6 md:p-8 border border-brand-100">
          <h2 className="text-lg font-semibold text-gray-900 mb-1">从这三步开始</h2>
          <p className="text-sm text-gray-600 mb-5">粘贴一次，AI 开始工作。</p>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
            <QuickAction
              num="1"
              title="粘贴主简历"
              desc="让 AI 了解你的背景和能力"
              onClick={() => navigate('resumes')}
            />
            <QuickAction
              num="2"
              title="粘贴目标 JD"
              desc="自动给出匹配分析和色块提示"
              onClick={() => navigate('jds')}
            />
            <QuickAction
              num="3"
              title="记录面试和复盘"
              desc="AI 跨次追踪成长轨迹"
              onClick={() => navigate('positions')}
            />
          </div>
        </div>
      )}

      {/* 岗位泳道 */}
      {positions.length > 0 && (
        <section>
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-lg font-semibold text-gray-900">岗位看板</h2>
            <button onClick={() => navigate('positions')}
              className="text-sm text-brand-600 hover:text-brand-700 font-medium btn-apple">
              查看全部 →
            </button>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
            <LaneCard label="进行中" count={positionsByStatus.active.length} color="brand"
                      items={positionsByStatus.active.slice(0, 3)} />
            <LaneCard label="Offer/入职" count={positionsByStatus.won.length} color="accent"
                      items={positionsByStatus.won.slice(0, 3)} />
            <LaneCard label="已结束" count={positionsByStatus.closed.length} color="gray"
                      items={positionsByStatus.closed.slice(0, 3)} />
          </div>
        </section>
      )}

      {/* AI 建议 */}
      {suggestions.length > 0 && (
        <section>
          <h2 className="text-lg font-semibold text-gray-900 mb-3">💡 AI 建议 · {suggestions.length} 条待查看</h2>
          <div className="space-y-2">
            {suggestions.slice(0, 2).map(s => (
              <div key={s.id}
                onClick={() => navigate('suggestions')}
                className="card-apple clickable bg-white border border-gray-200 rounded-xl p-4 shadow-soft hover:shadow-lifted cursor-pointer">
                <div className="text-sm font-medium text-gray-900">{s.title}</div>
                <div className="text-xs text-gray-600 mt-1 line-clamp-2">{s.content}</div>
              </div>
            ))}
          </div>
        </section>
      )}

      {/* 最近复盘 */}
      {recentReviews.length > 0 && (
        <section>
          <h2 className="text-lg font-semibold text-gray-900 mb-3">📝 最近复盘</h2>
          <div className="space-y-2">
            {recentReviews.slice(0, 3).map(r => (
              <div key={r.id}
                className="card-apple bg-white border border-gray-200 rounded-xl p-4 shadow-soft">

// ==================== 通用组件 ====================

function Card({ children, className = '', onClick, clickable }) {
  return (
    <div onClick={onClick}

function Button({ children, onClick, variant = 'primary', size = 'md', disabled, className = '', type = 'button' }) {
  const base = 'btn-apple inline-flex items-center justify-center font-medium rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed ';
  const sizes = { sm: 'px-3 py-1.5 text-xs', md: 'px-4 py-2 text-sm', lg: 'px-5 py-2.5 text-sm' };
  const variants = {
    primary: 'bg-brand-600 text-white hover:bg-brand-700 shadow-soft',
    secondary: 'bg-white border border-gray-300 text-gray-800 hover:bg-gray-50',
    ghost: 'text-gray-700 hover:bg-gray-100',
    danger: 'bg-rose-600 text-white hover:bg-rose-700',
    accent: 'bg-accent-500 text-white hover:bg-accent-600',
  };
  return (
    <button type={type} onClick={onClick} disabled={disabled}
      className={base + sizes[size] + ' ' + variants[variant] + ' ' + className}>{children}</button>
  );
}

function EmptyState({ icon = '📄', title, desc, action }) {
  return (
    <div className="text-center py-12 px-4">
      <div className="text-5xl mb-3 opacity-40">{icon}</div>
      <div className="text-sm font-semibold text-gray-800">{title}</div>
      {desc && <div className="text-xs text-gray-500 mt-1 max-w-sm mx-auto">{desc}</div>}
      {action && <div className="mt-4">{action}</div>}
    </div>
  );
}

function Modal({ open, onClose, title, children, maxWidth = 'max-w-lg' }) {
  useEffect(() => {
    if (!open) return;
    const handler = (e) => e.key === 'Escape' && onClose();
    document.addEventListener('keydown', handler);
    document.body.style.overflow = 'hidden';
    return () => { document.removeEventListener('keydown', handler); document.body.style.overflow = ''; };
  }, [open, onClose]);
  if (!open) return null;
  return ReactDOM.createPortal(
    <div className="modal-overlay" onClick={onClose}>
      <div className={'modal-card ' + maxWidth} onClick={e => e.stopPropagation()}>
        {title && (
          <div className="modal-header">
            <h3>{title}</h3>
            <button onClick={onClose} className="w-8 h-8 rounded-full flex items-center justify-center text-gray-400 hover:text-gray-700 hover:bg-gray-100 transition -mr-1">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-[18px] h-[18px]"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>
            </button>
          </div>
        )}
        <div className="modal-body">{children}</div>
      </div>
    </div>,
    document.body
  );
}

function PageHeader({ title, desc, action }) {
  return (
    <div className="flex flex-col md:flex-row md:items-end md:justify-between gap-4 mb-6">
      <div>
        <h1 className="text-2xl md:text-3xl font-semibold text-gray-900">{title}</h1>
        {desc && <p className="text-sm text-gray-600 mt-1">{desc}</p>}
      </div>
      {action}
    </div>
  );
}

// 6 档色块
const BAND_CONFIG = {
  excellent: { color: 'bg-emerald-600', label: '极高匹配', text: 'text-emerald-700' },
  great:     { color: 'bg-emerald-500', label: '高匹配',   text: 'text-emerald-600' },
  good:      { color: 'bg-emerald-300', label: '中高匹配', text: 'text-emerald-600' },
  fair:      { color: 'bg-amber-200',   label: '中等',     text: 'text-amber-700' },
  low:       { color: 'bg-slate-300',   label: '偏低',     text: 'text-slate-600' },
  poor:      { color: 'bg-slate-200',   label: '不匹配',   text: 'text-slate-500' },
  unknown:   { color: 'bg-gray-100',    label: '未评估',   text: 'text-gray-400' },
};
function MatchBand({ score, band, size = 'sm', showLabel = false, showScore = false }) {
  const cfg = BAND_CONFIG[band] || BAND_CONFIG.unknown;
  const w = size === 'sm' ? 'w-1' : size === 'md' ? 'w-1.5' : 'w-2';
  const h = size === 'sm' ? 'h-6' : size === 'md' ? 'h-8' : 'h-10';
  return (
    <div className="inline-flex items-center gap-2" title={cfg.label + (score != null ? ' · ' + score : '')}>
      <span className={'rounded-full ' + cfg.color + ' ' + w + ' ' + h} />
      {showScore && score != null && <span className="text-sm font-semibold text-gray-800">{score}</span>}
      {showLabel && <span className={'text-xs font-medium ' + cfg.text}>{cfg.label}</span>}
    </div>
  );
}

// 分数转 band（前端本地计算，和后端 scoreToBand 保持一致）
function scoreToBand(score) {
  if (score == null) return 'unknown';
  if (score >= 88) return 'excellent';
  if (score >= 78) return 'great';
  if (score >= 68) return 'good';
  if (score >= 55) return 'fair';
  if (score >= 40) return 'low';
  return 'poor';
}

const STATUS_LABELS = {
  pending: '待投递', applied: '已投递', written_test: '笔试中',
  interview_1: '一面', interview_2: '二面', interview_3plus: '三面+',
  offer: 'Offer', onboard: '已入职', rejected: '已拒绝', withdrawn: '主动放弃',
};
const STATUS_COLORS = {
  pending: 'bg-gray-100 text-gray-700 border-gray-200',
  applied: 'bg-brand-50 text-brand-700 border-brand-200',
  written_test: 'bg-indigo-50 text-indigo-700 border-indigo-200',
  interview_1: 'bg-purple-50 text-purple-700 border-purple-200',
  interview_2: 'bg-purple-50 text-purple-700 border-purple-200',
  interview_3plus: 'bg-purple-50 text-purple-700 border-purple-200',
  offer: 'bg-emerald-50 text-emerald-700 border-emerald-200',
  onboard: 'bg-emerald-100 text-emerald-800 border-emerald-300',
  rejected: 'bg-slate-100 text-slate-600 border-slate-200',
  withdrawn: 'bg-slate-100 text-slate-500 border-slate-200',
};
function StatusBadge({ status }) {
  const color = STATUS_COLORS[status] || STATUS_COLORS.pending;
  return (
    <span className={'inline-flex items-center px-2 py-0.5 rounded-md text-xs font-medium border ' + color}>
      {STATUS_LABELS[status] || status}
    </span>
  );
}

function relTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return '刚刚';
  if (diff < 3600) return Math.floor(diff / 60) + ' 分钟前';
  if (diff < 86400) return Math.floor(diff / 3600) + ' 小时前';
  if (diff < 86400 * 30) return Math.floor(diff / 86400) + ' 天前';
  return d.toLocaleDateString('zh-CN');
}

function handleApiError(err, toast, onQuotaExceeded) {
  if (err.status === 429 && err.data?.error === 'quota_exceeded') {
    if (onQuotaExceeded) onQuotaExceeded(err.data);
    else toast(err.data.message || '今日 AI 额度已用完', 'error', 5000);
    return;
  }
  toast(err.message || '操作失败', 'error');
}

function Section({ title, children }) {
  return (
    <div>
      <div className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">{title}</div>
      {children}
    </div>
  );
}

// ==================== 页面：简历管理 ====================
function ResumesPage() {
  const { toast } = useApp();
  const [list, setList] = useState([]);
  const [loading, setLoading] = useState(true);
  const [editor, setEditor] = useState(null);
  const [viewing, setViewing] = useState(null);

  const load = async () => {
    setLoading(true);
    try {
      const r = await apiCall('/api/resumes');
      setList(r.resumes || []);
    } catch (e) { toast(e.message, 'error'); }
    setLoading(false);
  };
  useEffect(() => { load(); }, []);

  const del = async (id) => {
    if (!confirm('确定删除这份简历？')) return;
    try {
      await apiCall('/api/resumes/' + id, { method: 'DELETE' });
      toast('已删除', 'success'); load();
    } catch (e) { toast(e.message, 'error'); }
  };

  const setPrimary = async (id) => {
    try {
      await apiCall('/api/resumes/' + id, {
        method: 'PUT',
        body: JSON.stringify({ is_primary: true }),
      });
      toast('已设为主简历', 'success'); load();
    } catch (e) { toast(e.message, 'error'); }
  };

  return (
    <div className="animate-slide-up">
      <PageHeader
        title="简历管理"
        desc={"最多 " + list.length + "/5 份 · 粘贴文本，AI 自动结构化解析"}
        action={
          <Button variant="primary" onClick={() => setEditor({ mode: 'new' })} disabled={list.length >= 5}>
            <Icon.Plus className="w-4 h-4 mr-1" /> 粘贴新简历
          </Button>
        }
      />
      {loading ? (
        <Card className="p-8 text-center text-gray-400 text-sm">加载中...</Card>
      ) : list.length === 0 ? (
        <Card className="p-0">
          <EmptyState
            icon="📄" title="还没有简历"
            desc="粘贴你的简历文本，AI 会自动提取结构化信息"
            action={<Button variant="primary" onClick={() => setEditor({ mode: 'new' })}>粘贴第一份简历</Button>}
          />
        </Card>
      ) : (
        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
          {list.map(r => (
            <Card key={r.id} className="p-4">
              <div className="flex items-center gap-2 mb-2 flex-wrap">
                <span className="font-semibold text-gray-900 truncate">{r.title}</span>
                {r.is_primary === 1 && (
                  <span className="px-1.5 py-0.5 text-[10px] rounded bg-brand-50 text-brand-700 font-semibold border border-brand-200">主简历</span>
                )}
                {r.parse_status === 'processing' && <span className="text-[10px] text-gray-400">解析中...</span>}
                {r.parse_status === 'failed' && <span className="text-[10px] text-rose-500">解析失败</span>}
              </div>
              <div className="text-xs text-gray-500 mb-2">{relTime(r.updated_at)}</div>
              <div className="text-xs text-gray-600 line-clamp-3 leading-relaxed mb-3 min-h-[3rem]">{r.preview}</div>
              <div className="flex gap-1 flex-wrap">
                <Button size="sm" variant="ghost" onClick={() => setViewing(r)}>查看</Button>
                <Button size="sm" variant="ghost" onClick={() => setEditor({ mode: 'edit', data: r })}>编辑</Button>
                {r.is_primary !== 1 && <Button size="sm" variant="ghost" onClick={() => setPrimary(r.id)}>设主</Button>}
                <div className="flex-1" />
                <Button size="sm" variant="ghost" onClick={() => del(r.id)} className="text-rose-600 hover:bg-rose-50">删除</Button>
              </div>
            </Card>
          ))}
        </div>
      )}
      {editor && <ResumeEditor mode={editor.mode} data={editor.data} onClose={() => setEditor(null)} onSaved={() => { setEditor(null); load(); }} />}
      {viewing && <ResumeViewer resumeId={viewing.id} onClose={() => setViewing(null)} />}
    </div>
  );
}

function ResumeEditor({ mode, data, onClose, onSaved }) {
  const { toast } = useApp();
  const [title, setTitle] = useState(data?.title || '');
  const [rawText, setRawText] = useState('');
  const [isPrimary, setIsPrimary] = useState(data?.is_primary === 1);
  const [submitting, setSubmitting] = useState(false);

  useEffect(() => {
    if (mode === 'edit' && data?.id) {
      apiCall('/api/resumes/' + data.id).then(r => setRawText(r.resume.raw_text || '')).catch(() => {});
    }
  }, [mode, data?.id]);

  const submit = async () => {
    if (rawText.trim().length < 20) return toast('简历太短', 'error');
    setSubmitting(true);
    try {
      if (mode === 'new') {
        const r = await apiCall('/api/resumes', {
          method: 'POST',
          body: JSON.stringify({ title: title.trim() || '未命名简历', raw_text: rawText, is_primary: isPrimary }),
        });
        if (r.error) { toast(r.error || '解析失败', 'error'); }
        else { toast('保存并解析完成', 'success'); }
        onSaved();
      } else {
        const payload = { title: title.trim(), raw_text: rawText };
        if (isPrimary) payload.is_primary = true;
        await apiCall('/api/resumes/' + data.id, { method: 'PUT', body: JSON.stringify(payload) });
        toast('已更新', 'success'); onSaved();
      }
    } catch (e) { handleApiError(e, toast); }
    setSubmitting(false);
  };

  return (
    <Modal open onClose={onClose} title={mode === 'new' ? '粘贴新简历' : '编辑简历'} maxWidth="max-w-2xl">
      <div className="space-y-3">
        <div>
          <label className="text-xs font-medium text-gray-700 mb-1 block">简历标题</label>
          <input className="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm"
            placeholder="如：产品岗主简历" value={title} onChange={e => setTitle(e.target.value)} />
        </div>
        <div>
          <label className="text-xs font-medium text-gray-700 mb-1 block">简历内容（粘贴纯文本）</label>
          <textarea className="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm leading-relaxed" rows={8}
            placeholder="粘贴完整简历文本，AI 会自动识别并结构化..."
            value={rawText} onChange={e => setRawText(e.target.value)} />
          <div className="text-xs text-gray-400 mt-1">{rawText.length} 字</div>
        </div>
        <label className="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
          <input type="checkbox" checked={isPrimary} onChange={e => setIsPrimary(e.target.checked)} className="w-4 h-4 rounded accent-brand-600" />
          设为主简历（用于 JD 匹配默认简历）
        </label>
        <div className="flex gap-2 justify-end">
          <Button variant="secondary" onClick={onClose}>取消</Button>
          <Button variant="primary" onClick={submit} disabled={submitting}>
            {submitting ? (mode === 'new' ? 'AI 解析中...' : '保存中...') : (mode === 'new' ? '保存并解析' : '保存')}
          </Button>
        </div>
      </div>
    </Modal>
  );
}

function ResumeViewer({ resumeId, onClose }) {
  const [resume, setResume] = useState(null);
  const [error, setError] = useState(false);
  useEffect(() => { apiCall('/api/resumes/' + resumeId).then(r => setResume(r.resume)).catch(() => setError(true)); }, [resumeId]);

      ) : !resume ? (
        <div className="text-sm text-gray-400 py-4 text-center">加载中...</div>
      ) : !p ? (
        <div>
          <div className="text-xs text-gray-500 mb-2">AI 解析结果暂无，显示原文：</div>
          <pre className="text-xs bg-gray-50 rounded p-3 whitespace-pre-wrap leading-relaxed">{resume.raw_text}</pre>
        </div>
      ) : (
        <div className="space-y-5 text-sm">
          {p.basic && (

                {p.basic.email && <div><span className="text-gray-400">邮箱：</span>{p.basic.email}</div>}
                {p.basic.phone && <div><span className="text-gray-400">电话：</span>{p.basic.phone}</div>}
                {p.basic.city && <div><span className="text-gray-400">城市：</span>{p.basic.city}</div>}

          )}

            <Section title="教育经历">

                <div key={i} className="mb-2 text-xs">
                  <div className="font-medium text-gray-900">{e.school} · {e.major} · {e.degree}</div>

          )}
          {p.experiences?.length > 0 && (
            <Section title="工作/实习">
              {p.experiences.map((e, i) => (
                <div key={i} className="mb-3">
                  <div className="font-medium text-sm text-gray-900">{e.company} · {e.role}</div>
                  <div className="text-xs text-gray-500 mb-1">{e.period}</div>
                  {e.description && <div className="text-xs text-gray-700 mb-1">{e.description}</div>}
                  {e.achievements?.length > 0 && (
                    <ul className="text-xs text-gray-600 ml-4 list-disc">
                      {e.achievements.map((a, j) => <li key={j}>{a}</li>)}
                    </ul>
                  )}
                </div>
              ))}
            </Section>
          )}
          {p.projects?.length > 0 && (
            <Section title="项目">
              {p.projects.map((e, i) => (
                <div key={i} className="mb-2">
                  <div className="font-medium text-sm text-gray-900">{e.name}{e.role ? ' · ' + e.role : ''}</div>
                  <div className="text-xs text-gray-500">{e.period}</div>
                  {e.description && <div className="text-xs text-gray-700 mt-0.5">{e.description}</div>}
                  {e.tech_stack?.length > 0 && (
                    <div className="mt-1 flex gap-1 flex-wrap">
                      {e.tech_stack.map((t, j) => <span key={j} className="px-1.5 py-0.5 rounded bg-brand-50 text-brand-700 text-[10px]">{t}</span>)}
                    </div>
                  )}
                </div>
              ))}
            </Section>
          )}
          {p.skills?.length > 0 && (
            <Section title="技能">
              <div className="flex gap-1.5 flex-wrap">
                {p.skills.map((s, i) => <span key={i} className="px-2 py-0.5 rounded bg-gray-100 text-gray-700 text-xs">{s}</span>)}
              </div>
            </Section>
          )}
          {p.awards?.length > 0 && (
            <Section title="获奖/证书">
              <ul className="text-xs text-gray-700 ml-4 list-disc">
                {p.awards.map((a, i) => <li key={i}>{a}</li>)}
              </ul>
            </Section>
          )}
        </div>
      )}
    </Modal>
  );
}

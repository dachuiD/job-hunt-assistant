        </div>
      </div>
    </Modal>
  );
}

// ==================== AI 建议 ====================
function SuggestionsPage() {
  const { toast } = useApp();
  const [list, setList] = useState([]);
  const [loading, setLoading] = useState(true);
  const [generating, setGenerating] = useState(false);

  const load = async () => {
    try {
      const r = await apiCall('/api/suggestions');
      setList(r.suggestions || []);
    } catch (e) { toast(e.message, 'error'); }
    setLoading(false);
  };
  useEffect(() => { load(); }, []);

  const generate = async () => {
    if (!confirm('基于你的画像生成新的 AI 建议（消耗 1 次深度配额）？')) return;
    setGenerating(true);
    try {
      const r = await apiCall('/api/suggestions/generate', { method: 'POST' });
      toast(`已生成 ${r.count} 条建议`, 'success');
      load();
    } catch (e) { handleApiError(e, toast); }
    setGenerating(false);
  };

  const updateStatus = async (id, status) => {
    try {
      await apiCall('/api/suggestions/' + id, { method: 'PUT', body: JSON.stringify({ status }) });
      load();
    } catch (e) { toast(e.message, 'error'); }
  };

  const typeLabel = (t) => ({ direction: '🧭 方向', skill_gap: '🛠️ 能力补齐', next_action: '👉 下一步' }[t] || t);
  const statusBadge = (s) => ({
    new: 'bg-brand-50 text-brand-700 border-brand-200',
    viewed: 'bg-gray-50 text-gray-600 border-gray-200',
    adopted: 'bg-emerald-50 text-emerald-700 border-emerald-200',
    dismissed: 'bg-rose-50 text-rose-500 border-rose-200',
  }[s] || 'bg-gray-50 text-gray-600 border-gray-200');

  return (
    <div className="animate-slide-up">
      <PageHeader
        title="AI 建议"
        desc="基于画像池 + 近期岗位动态生成的个性化行动建议"
        action={
          <Button variant="primary" onClick={generate} disabled={generating}>
            {generating ? '生成中...' : '🔮 生成新建议'}
          </Button>
        }
      />

      {loading ? (
        <Card className="p-8 text-center text-gray-400 text-sm">加载中...</Card>
      ) : list.length === 0 ? (
        <Card className="p-0">
          <EmptyState
            icon="💡"
            title="还没有建议"
            desc="AI 需要你的画像有一定积累（至少 3 条标签）才能给出有价值的建议。先粘贴简历和几份 JD 吧。"
            action={<Button variant="primary" onClick={generate}>生成试试</Button>}
          />
        </Card>
      ) : (
        <div className="space-y-3">
          {list.map(s => {
            const basedOn = s.based_on ? (typeof s.based_on === 'string' ? JSON.parse(s.based_on) : s.based_on) : [];
            return (
              <Card key={s.id} className="p-5">
                <div className="flex items-start gap-3">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap mb-1">
                      <span className="text-xs font-semibold text-gray-700">{typeLabel(s.suggestion_type)}</span>
                      <span className={'text-[10px] px-1.5 py-0.5 rounded border ' + statusBadge(s.status)}>
                        {s.status === 'new' ? '未查看' : s.status === 'viewed' ? '已查看' : s.status === 'adopted' ? '已采纳' : '已忽略'}
                      </span>
                      <span className="text-[10px] text-gray-400">{relTime(s.created_at)}</span>
                    </div>
                    <h3 className="font-semibold text-gray-900 mb-1">{s.title}</h3>
                    <p className="text-sm text-gray-700 leading-relaxed">{s.content}</p>
                    {basedOn.length > 0 && (
                      <div className="mt-2 flex flex-wrap gap-1">
                        <span className="text-[10px] text-gray-400">依据：</span>
                        {basedOn.map((b, i) => (
                          <span key={i} className="text-[10px] px-1.5 py-0.5 rounded bg-gray-50 text-gray-600 border border-gray-200">{b}</span>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
                {s.status !== 'adopted' && s.status !== 'dismissed' && (
                  <div className="mt-3 pt-3 border-t border-gray-100 flex gap-1 justify-end">
                    <Button size="sm" variant="ghost" onClick={() => updateStatus(s.id, 'dismissed')} className="text-gray-500">忽略</Button>
                    <Button size="sm" variant="accent" onClick={() => updateStatus(s.id, 'adopted')}>✓ 采纳</Button>
                  </div>
                )}
              </Card>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ==================== 通知中心 ====================
function NotificationsPage() {
  const { toast } = useApp();
  const [list, setList] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showPref, setShowPref] = useState(false);

  const load = async () => {
    try {
      const r = await apiCall('/api/notifications');
      setList(r.notifications || []);
    } catch (e) { toast(e.message, 'error'); }
    setLoading(false);
  };
  useEffect(() => { load(); }, []);

  const markRead = async (id) => {
    try {
      await apiCall('/api/notifications/' + id + '/read', { method: 'POST' });
      load();
    } catch {}
  };
  const markAllRead = async () => {
    try {
      await apiCall('/api/notifications/read-all', { method: 'POST' });
      toast('已全部标记已读', 'success');
      load();
    } catch (e) { toast(e.message, 'error'); }
  };
  const del = async (id) => {
    try {
      await apiCall('/api/notifications/' + id, { method: 'DELETE' });
      load();
    } catch (e) { toast(e.message, 'error'); }
  };

  const typeLabel = (t) => ({
    status_change: '📊 状态变更',
    review_missing: '📝 待复盘',
    profile_insight: '🧠 画像洞察',
    suggestion: '💡 AI 建议',
    resume_stale: '📄 简历提醒',
  }[t] || t);

  const unread = list.filter(n => n.read === 0);

  return (
    <div className="animate-slide-up">
      <PageHeader
        title="通知中心"
        desc={unread.length + ' 条未读 · 共 ' + list.length + ' 条'}
        action={
          <div className="flex gap-2">
            <Button variant="secondary" onClick={() => setShowPref(true)}>偏好设置</Button>
            {unread.length > 0 && <Button variant="primary" onClick={markAllRead}>全部已读</Button>}
          </div>
        }
      />

      {loading ? (
        <Card className="p-8 text-center text-gray-400 text-sm">加载中...</Card>
      ) : list.length === 0 ? (
        <Card className="p-0">
          <EmptyState icon="🔔" title="暂无通知" desc="当有岗位状态变更、AI 洞察、或待复盘提醒时会出现在这里" />
        </Card>
      ) : (
        <div className="space-y-2">
          {list.map(n => (
            <Card key={n.id} className={'p-4 ' + (n.read === 0 ? 'border-brand-200 bg-brand-50/30' : '')}>
              <div className="flex items-start gap-3">
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 flex-wrap mb-1">
                    <span className="text-xs font-medium text-gray-600">{typeLabel(n.type)}</span>
                    {n.read === 0 && <span className="w-1.5 h-1.5 rounded-full bg-brand-500" />}
                    <span className="text-[10px] text-gray-400">{relTime(n.created_at)}</span>
                  </div>
                  <div className="text-sm font-semibold text-gray-900">{n.title}</div>
                  {n.content && <div className="text-xs text-gray-600 mt-1 whitespace-pre-wrap">{n.content}</div>}
                </div>
                <div className="flex gap-1">
                  {n.read === 0 && <Button size="sm" variant="ghost" onClick={() => markRead(n.id)}>已读</Button>}
                  <button onClick={() => del(n.id)} className="text-gray-400 hover:text-rose-600 p-1 transition">
                    <Icon.X className="w-3.5 h-3.5" />
                  </button>
                </div>
              </div>
            </Card>
          ))}
        </div>
      )}

      {showPref && <NotifPrefModal onClose={() => setShowPref(false)} />}
    </div>
  );
}

function NotifPrefModal({ onClose }) {
  const { toast } = useApp();
  const [pref, setPref] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    apiCall('/api/notifications/preferences').then(r => { setPref(r.preferences); setLoading(false); }).catch(() => setLoading(false));
  }, []);

  const toggle = async (key) => {
    const newPref = { ...pref, [key]: pref[key] ? 0 : 1 };
    setPref(newPref);
    try {
      await apiCall('/api/notifications/preferences', { method: 'POST', body: JSON.stringify(newPref) });
    } catch (e) { toast(e.message, 'error'); }
  };

  if (loading || !pref) return <Modal open onClose={onClose} title="通知偏好"><div className="text-sm text-gray-400 py-4 text-center">加载中...</div></Modal>;

  const items = [
    { key: 'status_change', label: '岗位状态变更' },
    { key: 'review_missing', label: '面试后未复盘提醒' },
    { key: 'profile_insight', label: '画像自审洞察' },
    { key: 'suggestion', label: 'AI 建议生成通知' },
    { key: 'resume_stale', label: '简历长期未更新（暂未启用）' },
  ];

  return (
    <Modal open onClose={onClose} title="通知偏好">
      <div className="space-y-2">
        {items.map(it => (
          <label key={it.key} className="flex items-center justify-between p-3 rounded-lg border border-gray-100 hover:bg-gray-50 transition cursor-pointer">
            <span className="text-sm text-gray-800">{it.label}</span>
            <input type="checkbox" checked={pref[it.key] === 1} onChange={() => toggle(it.key)} className="w-4 h-4 rounded accent-brand-600" />
          </label>
        ))}
      </div>
    </Modal>
  );
}

// ==================== 设置页 ====================
function SettingsPage() {
  const { user, toast, refreshUser } = useApp();
  const [quota, setQuota] = useState(null);
  const [byok, setByok] = useState('');
  const [saving, setSaving] = useState(false);
  const [emailModal, setEmailModal] = useState(false);
  const [resetModal, setResetModal] = useState(false);
  const [resetConfirmText, setResetConfirmText] = useState('');

  useEffect(() => {
    apiCall('/api/me/quota').then(r => setQuota(r)).catch(() => {});
  }, []);

  const saveByok = async () => {
    setSaving(true);
    try {
      const r = await apiCall('/api/me/byok', {
        method: 'POST',
        body: JSON.stringify({ api_key: byok.trim() }),
      });
      toast(r.has_key ? '已保存你的 API Key，今后调用不占免费配额' : '已清除', 'success');
      setByok('');
      refreshUser();
      apiCall('/api/me/quota').then(r => setQuota(r)).catch(() => {});
    } catch (e) { toast(e.message, 'error'); }
    setSaving(false);
  };

  return (
    <div className="animate-slide-up space-y-5">
      <PageHeader title="设置" desc="个人信息 · 配额 · 通知偏好 · 账号恢复" />

      {/* 账号基础 */}
      <Card className="p-5">
        <h3 className="font-semibold text-gray-900 mb-3">账号</h3>
        <div className="space-y-2 text-sm">
          <div className="flex justify-between">
            <span className="text-gray-500">用户 ID</span>
            <span className="text-gray-900 font-mono text-xs">{user?.id}</span>
          </div>
          <div className="flex justify-between">
            <span className="text-gray-500">姓名</span>
            <span className="text-gray-900">{user?.name || '未设置'}</span>
          </div>
          <div className="flex justify-between">
            <span className="text-gray-500">求职方向</span>
            <span className="text-gray-900">{user?.target_track || '未设置'}</span>
          </div>

            <span className="text-gray-500">绑定邮箱（跨设备恢复）</span>
            <Button size="sm" variant="secondary" onClick={() => setEmailModal(true)}>绑定邮箱</Button>
          </div>
          <div className="flex justify-between items-center pt-2 border-t border-gray-100">
            <span className="text-gray-500">重置账号</span>
            <Button size="sm" variant="danger" onClick={() => { setResetConfirmText(''); setResetModal(true); }}>重置账号</Button>
          </div>
        </div>
      </Card>

      {/* 配额 */}
      {quota && (
        <Card className="p-5">
          <h3 className="font-semibold text-gray-900 mb-3">今日 AI 配额</h3>
          <div className="space-y-3">
            <div>
              <div className="flex justify-between text-sm mb-1">
                <span className="text-gray-700">快速 AI（Flash）</span>
                <span className="text-gray-900 font-semibold">{quota.flash.used} / {quota.flash.limit}</span>
              </div>
              <div className="h-1.5 rounded-full bg-gray-100 overflow-hidden">
                <div className="h-full bg-brand-500 transition-all" style={{ width: Math.min(100, quota.flash.used / quota.flash.limit * 100) + '%' }} />
              </div>
            </div>
            <div>
              <div className="flex justify-between text-sm mb-1">
                <span className="text-gray-700">深度 AI（Pro）</span>
                <span className="text-gray-900 font-semibold">{quota.pro.used} / {quota.pro.limit}</span>
              </div>
              <div className="h-1.5 rounded-full bg-gray-100 overflow-hidden">
                <div className="h-full bg-accent-500 transition-all" style={{ width: Math.min(100, quota.pro.used / quota.pro.limit * 100) + '%' }} />
              </div>
            </div>
            {quota.using_own_key && (
              <div className="text-xs text-emerald-700 bg-emerald-50 rounded p-2 border border-emerald-200">
                ✓ 你正在使用自己的 DeepSeek API Key，今日调用不占免费配额
              </div>
            )}
          </div>
        </Card>
      )}

      {/* BYOK */}
      <Card className="p-5">
        <h3 className="font-semibold text-gray-900 mb-2">使用自己的 DeepSeek API Key（BYOK）</h3>
        <p className="text-xs text-gray-600 mb-3 leading-relaxed">
          配额用完还想继续用？填入你自己的 DeepSeek API Key，今后所有 AI 调用都走你的 Key（数据更私密 · 无配额限制）。
          <br />
          <a href="https://platform.deepseek.com" target="_blank" rel="noopener noreferrer" className="text-brand-600 hover:underline">👉 去 DeepSeek 获取 API Key</a>
        </p>
        <div className="flex gap-2">
          <input type="password" className="flex-1 px-3 py-2 rounded-lg border border-gray-300 text-sm font-mono"

        <Modal open onClose={() => setResetModal(false)} title="重置账号">

            <div className="p-4 rounded-lg bg-red-50 border border-red-200">
              <div className="text-sm font-medium text-red-900 mb-1">⚠️ 此操作不可撤销</div>

              </div>
            </div>
            <div>
              <label className="block text-sm text-gray-700 mb-1">
                请输入 <span className="font-mono font-semibold text-red-600">确认重置</span> 以继续
              </label>
              <input
                className="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm font-mono"
                placeholder="确认重置"
                value={resetConfirmText}
                onChange={e => setResetConfirmText(e.target.value)}
              />
            </div>
            <div className="flex justify-end gap-2">
              <Button variant="secondary" onClick={() => setResetModal(false)}>取消</Button>
              <Button
                variant="danger"
                disabled={resetConfirmText !== '确认重置'}
                onClick={async () => {
                  try {
                    await apiCall('/api/me/reset', { method: 'POST' });
                    localStorage.removeItem('onboarding_dismissed');
                    setResetModal(false);
                    toast('账号已重置，正在重新加载…', 'success');
                    setTimeout(() => location.reload(), 800);
                  } catch (e) {
                    toast(e.message, 'error');
                  }
                }}

            </div>
          </div>
        </Modal>
      )}

      {emailModal && <EmailBindPlaceholderModal onClose={() => setEmailModal(false)} />}
    </div>
  );
}

function EmailBindPlaceholderModal({ onClose }) {

          <div className="text-sm font-medium text-amber-900 mb-1">该功能还没实装</div>
          <div className="text-xs text-amber-700 leading-relaxed">

      </div>

  );
}

        <LLMUsageTable title="本周" rows={stats.llm.week} />

      </Card>
      <Card className="p-5">
        <h3 className="font-semibold text-gray-900 mb-3">今日配额消耗</h3>
        <div className="grid grid-cols-2 gap-3 text-sm">
          <div className="flex justify-between p-3 rounded bg-brand-50">
            <span>Flash（全局）</span>
            <span className="font-semibold text-brand-700">{stats.quota_today.flash_used_total}</span>
          </div>
          <div className="flex justify-between p-3 rounded bg-accent-500/10">
            <span>Pro（全局）</span>
            <span className="font-semibold text-accent-600">{stats.quota_today.pro_used_total}</span>
          </div>
        </div>
      </Card>
    </div>
  );
}

function StatCard({ label, value }) {
  return (
    <Card className="p-4">
      <div className="text-xs text-gray-500">{label}</div>
      <div className="text-2xl font-bold text-gray-900 mt-1">{value}</div>
    </Card>
  );
}

function LLMUsageTable({ title, rows }) {
  if (!rows || rows.length === 0) return <div className="text-xs text-gray-400 py-2">{title}：无调用</div>;
  return (
    <div className="mb-3">
      <div className="text-xs font-semibold text-gray-700 mb-1">{title}</div>
      <div className="space-y-1">
        {rows.map((r, i) => (
          <div key={i} className="flex justify-between text-xs p-2 rounded bg-gray-50">
            <span className="text-gray-700 font-mono">{r.model}</span>
            <span className="text-gray-600">{r.calls} 次 · {r.tokens || 0} tokens</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function AdminUsers() {
  const { toast } = useApp();
  const [list, setList] = useState([]);
  const [loading, setLoading] = useState(true);
  const [detail, setDetail] = useState(null);

  useEffect(() => {
    apiCall('/api/admin/users').then(r => { setList(r.users || []); setLoading(false); }).catch(e => toast(e.message, 'error'));
  }, []);

  if (loading) return <Card className="p-8 text-center text-gray-400 text-sm">加载中...</Card>;
  return (
    <Card className="p-0 overflow-x-auto">
      <table className="w-full text-sm">
        <thead className="bg-gray-50 text-xs text-gray-500 uppercase">
          <tr>
            <th className="px-4 py-3 text-left">用户</th>
            <th className="px-4 py-3 text-left">方向</th>
            <th className="px-4 py-3 text-right">简历</th>
            <th className="px-4 py-3 text-right">JD</th>
            <th className="px-4 py-3 text-right">岗位</th>
            <th className="px-4 py-3 text-right">复盘</th>
            <th className="px-4 py-3 text-right">今日配额</th>
            <th className="px-4 py-3 text-right">操作</th>
          </tr>
        </thead>
        <tbody className="divide-y divide-gray-100">
          {list.map(u => (
            <tr key={u.id} className="hover:bg-gray-50">
              <td className="px-4 py-3">
                <div className="font-medium text-gray-900">
                  {u.name || '未命名'}
                  {u.is_admin === 1 && <span className="ml-1 text-[10px] text-brand-700">[管理员]</span>}
                </div>
                <div className="text-xs text-gray-500">{u.email || '匿名'}</div>
              </td>
              <td className="px-4 py-3 text-gray-600 text-xs">{u.target_track || '—'}</td>
              <td className="px-4 py-3 text-right text-gray-700">{u.resumes_count}</td>
              <td className="px-4 py-3 text-right text-gray-700">{u.jds_count}</td>
              <td className="px-4 py-3 text-right text-gray-700">{u.positions_count}</td>
              <td className="px-4 py-3 text-right text-gray-700">{u.reviews_count}</td>
              <td className="px-4 py-3 text-right text-xs">
                <span className="text-brand-700">{u.flash_today}F</span> / <span className="text-accent-600">{u.pro_today}P</span>
                {u.has_own_key === 1 && <span className="ml-1 text-[10px] text-emerald-600">🔑</span>}
              </td>
              <td className="px-4 py-3 text-right">
                <Button size="sm" variant="ghost" onClick={() => setDetail(u.id)}>详情</Button>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
      {detail && <AdminUserDetailModal uid={detail} onClose={() => setDetail(null)} />}
    </Card>
  );
}

function AdminUserDetailModal({ uid, onClose }) {
  const [data, setData] = useState(null);
  useEffect(() => { apiCall('/api/admin/users/' + uid).then(setData); }, [uid]);

  return (
    <Modal open onClose={onClose} title="用户详情" maxWidth="max-w-3xl">
      {!data ? (
        <div className="text-sm text-gray-400 py-4 text-center">加载中...</div>
      ) : (
        <div className="space-y-4 text-sm">
          <div className="p-3 rounded bg-gray-50 text-xs">
            <div>ID: <span className="font-mono">{data.user.id}</span></div>
            <div>指纹: <span className="font-mono text-gray-600">{data.user.fingerprint?.slice(0, 20)}...</span></div>
            <div>邮箱: {data.user.email || '—'}</div>
            <div>最后活跃: {data.user.last_active_at ? new Date(data.user.last_active_at).toLocaleString('zh-CN') : '—'}</div>
            {data.user.own_api_key_masked && <div>BYOK Key: <span className="font-mono">{data.user.own_api_key_masked}</span></div>}
          </div>
          <div className="grid grid-cols-4 gap-2 text-xs">
            <div className="p-2 rounded bg-brand-50 text-center"><div className="font-semibold">{data.resumes?.length || 0}</div><div className="text-gray-500">简历</div></div>
            <div className="p-2 rounded bg-brand-50 text-center"><div className="font-semibold">{data.jds?.length || 0}</div><div className="text-gray-500">JD</div></div>
            <div className="p-2 rounded bg-brand-50 text-center"><div className="font-semibold">{data.positions?.length || 0}</div><div className="text-gray-500">岗位</div></div>
            <div className="p-2 rounded bg-brand-50 text-center"><div className="font-semibold">{data.reviews?.length || 0}</div><div className="text-gray-500">复盘</div></div>
          </div>
          {data.quota_history?.length > 0 && (
            <div>
              <div className="text-xs font-semibold text-gray-700 mb-2">近 14 天配额</div>
              <div className="space-y-1 text-xs">
                {data.quota_history.map((q, i) => (
                  <div key={i} className="flex justify-between p-1.5 rounded hover:bg-gray-50">
                    <span>{q.date}</span>
                    <span className="text-gray-600">
                      F {q.flash_used} / P {q.pro_used}
                      {q.using_own_key === 1 && ' 🔑'}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}
    </Modal>
  );
}

function AdminLogs() {
  const { toast } = useApp();
  const [logs, setLogs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState({ status: '', purpose: '' });

  const load = async () => {
    setLoading(true);
    try {
      const qs = new URLSearchParams({ limit: '100', ...Object.fromEntries(Object.entries(filter).filter(([, v]) => v)) });
      const r = await apiCall('/api/admin/llm-logs?' + qs);
      setLogs(r.logs || []);
    } catch (e) { toast(e.message, 'error'); }
    setLoading(false);
  };
  useEffect(() => { load(); }, [filter]);

  return (
    <Card className="p-4">
      <div className="flex gap-2 mb-3 flex-wrap">
        <select className="px-2 py-1 rounded border border-gray-300 text-xs bg-white"
          value={filter.status} onChange={e => setFilter({...filter, status: e.target.value})}>
          <option value="">所有状态</option>
          <option value="success">成功</option>
          <option value="failed">失败</option>
          <option value="fallback">降级</option>
        </select>
        <select className="px-2 py-1 rounded border border-gray-300 text-xs bg-white"
          value={filter.purpose} onChange={e => setFilter({...filter, purpose: e.target.value})}>
          <option value="">所有用途</option>
          <option value="parse_resume">简历解析</option>
          <option value="parse_jd">JD 解析</option>
          <option value="parse_match_combined">JD合并</option>
          <option value="match_quick">粗匹配</option>
          <option value="match_deep">深度匹配</option>
          <option value="review_analyze">复盘分析</option>
          <option value="profile_from_resume">画像-简历</option>
          <option value="profile_from_jd">画像-JD</option>
          <option value="profile_audit">画像自审</option>
          <option value="practice_generate">陪练生成</option>
          <option value="suggestion_generate">建议生成</option>
        </select>
      </div>
      {loading ? (
        <div className="text-sm text-gray-400 py-4 text-center">加载中...</div>
      ) : (
        <div className="overflow-x-auto">
          <table className="w-full text-xs">
            <thead className="text-gray-500">
              <tr>
                <th className="text-left p-2">时间</th>
                <th className="text-left p-2">用户</th>
                <th className="text-left p-2">模型</th>
                <th className="text-left p-2">用途</th>
                <th className="text-right p-2">Tokens</th>
                <th className="text-right p-2">耗时</th>
                <th className="text-left p-2">状态</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-gray-100">
              {logs.map(l => (
                <tr key={l.id} className="hover:bg-gray-50">
                  <td className="p-2 font-mono text-gray-600">{new Date(l.created_at).toLocaleTimeString('zh-CN')}</td>
                  <td className="p-2 text-gray-700">{l.name || l.email || l.user_id?.slice(0, 10) || '—'}</td>
                  <td className="p-2 font-mono text-[10px] text-gray-500">{l.model?.replace('deepseek-', '') || '—'}</td>
                  <td className="p-2 text-gray-700">{l.purpose}</td>
                  <td className="p-2 text-right text-gray-600">{(l.input_tokens || 0) + (l.output_tokens || 0)}</td>
                  <td className="p-2 text-right text-gray-600">{l.duration_ms}ms</td>
                  <td className="p-2">
                    <span className={
                      'px-1.5 py-0.5 rounded text-[10px] ' +
                      (l.status === 'success' ? 'bg-emerald-50 text-emerald-700' :
                       l.status === 'fallback' ? 'bg-amber-50 text-amber-700' :
                       'bg-rose-50 text-rose-700')
                    }>{l.status}</span>
                  </td>
                </tr>
              ))}
              {logs.length === 0 && <tr><td colSpan="7" className="text-center py-4 text-gray-400">无数据</td></tr>}
            </tbody>
          </table>
        </div>
      )}
    </Card>
  );
}

function AdminCron() {
  const { toast } = useApp();
  const [running, setRunning] = useState(false);
  const [result, setResult] = useState(null);

  const run = async () => {
    if (!confirm('手动触发每日任务？会检查所有用户的未复盘提醒 + 对符合条件的画像自审（可能消耗多次 Pro 配额）')) return;
    setRunning(true);
    try {
      const r = await apiCall('/api/admin/cron/run-daily', { method: 'POST' });
      setResult(r.summary);
      toast('执行完成', 'success');
    } catch (e) { toast(e.message, 'error'); }
    setRunning(false);
  };

  return (
    <Card className="p-5">
      <h3 className="font-semibold text-gray-900 mb-2">每日 Cron 任务</h3>
      <p className="text-sm text-gray-600 mb-4">
        Cloudflare Cron 定时在北京时间 09:00 自动跑。也可以手动触发用于测试。
      </p>
      <Button variant="primary" onClick={run} disabled={running}>
        {running ? '执行中...' : '▶️ 立即执行'}
      </Button>
      {result && (
        <div className="mt-4 p-3 rounded bg-gray-50 text-xs font-mono">
          <div>面试未复盘提醒：推送 {result.review_reminder?.reminded_users || 0} 个用户（共 {result.review_reminder?.pending_reviews || 0} 场面试）</div>
          <div>画像自审：处理 {result.profile_audit?.processed || 0} 个用户 · 失败 {result.profile_audit?.failed || 0}</div>
          <div className="text-gray-400 mt-1">耗时：{result.started_at} → {result.finished_at}</div>
        </div>
      )}
    </Card>
  );
}

function AdminConfig() {
  const { toast } = useApp();
  const [config, setConfig] = useState(null);
  const [flashQuota, setFlashQuota] = useState(50);
  const [proQuota, setProQuota] = useState(5);
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    apiCall('/api/admin/config').then(r => {
      setConfig(r);
      setFlashQuota(r.quota.FAST);
      setProQuota(r.quota.PRO);
    }).catch(() => {});
  }, []);

  const save = async () => {
    setSaving(true);
    try {
      await apiCall('/api/admin/config', {
        method: 'POST',
        body: JSON.stringify({ flash_quota: flashQuota, pro_quota: proQuota }),
      });
      toast('已保存（运行时生效，Worker 重启后恢复默认）', 'success');
    } catch (e) { toast(e.message, 'error'); }
    setSaving(false);
  };

  if (!config) return <Card className="p-8 text-center text-gray-400 text-sm">加载中...</Card>;

  return (
    <Card className="p-5 space-y-4">
      <h3 className="font-semibold text-gray-900">全局配置</h3>

      <div className="space-y-2 text-sm">
        <div className="flex justify-between"><span className="text-gray-500">版本</span><span>{config.version}</span></div>
        <div className="flex justify-between"><span className="text-gray-500">邮件发件人</span><span className="font-mono text-xs">{config.email_from}</span></div>
        <div className="flex justify-between"><span className="text-gray-500">Flash 模型</span><span className="font-mono text-xs">{config.models.FAST}</span></div>
        <div className="flex justify-between"><span className="text-gray-500">Pro 模型</span><span className="font-mono text-xs">{config.models.PRO}</span></div>
      </div>

      <div className="pt-3 border-t border-gray-100">
        <h4 className="font-medium text-gray-900 text-sm mb-2">每日配额</h4>
        <div className="grid grid-cols-2 gap-3">
          <div>
            <label className="text-xs text-gray-600 mb-1 block">Flash / 天</label>
            <input type="number" min="1" max="500" className="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm"
              value={flashQuota} onChange={e => setFlashQuota(Number(e.target.value))} />
          </div>
          <div>
            <label className="text-xs text-gray-600 mb-1 block">Pro / 天</label>
            <input type="number" min="1" max="100" className="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm"
              value={proQuota} onChange={e => setProQuota(Number(e.target.value))} />
          </div>
        </div>
        <div className="mt-3">
          <Button variant="primary" onClick={save} disabled={saving}>{saving ? '保存中...' : '保存'}</Button>
          <span className="ml-3 text-xs text-gray-400">⚠️ 运行时生效，Worker 重启后会恢复默认</span>
        </div>
      </div>
    </Card>
  );
}

// ==================== 占位页面（后续轮次填充）====================
function PlaceholderPage({ title, desc }) {
  return (
    <div className="animate-slide-up">
      <h1 className="text-2xl font-semibold text-gray-900 mb-2">{title}</h1>
      <p className="text-sm text-gray-600 mb-6">{desc}</p>
      <div className="bg-white rounded-xl border border-gray-200 p-8 shadow-soft text-center">
        <div className="text-gray-400 text-sm">该页面将在下一轮开发中上线</div>
      </div>
    </div>
  );
}

// ==================== 路由分发 ====================
function Router() {
  const { route } = useApp();
  const parts = route.split('/');
  const root = parts[0] || 'home';
  const hasId = parts.length > 1 && parts[1];

  switch (root) {
    case 'home': return <HomePage />;
    case 'resumes': return <ResumesPage />;
    case 'jds': return hasId ? <JDDetailPage /> : <JDsPage />;
    case 'positions': return hasId ? <PositionDetailPage /> : <PositionsPage />;
    case 'profile': return <ProfilePage />;
    case 'practice': return <PracticePage />;
    case 'suggestions': return <SuggestionsPage />;
    case 'notifications': return <NotificationsPage />;
    case 'settings': return <SettingsPage />;
    case 'admin': return <AdminPage />;
    default: return <HomePage />;
  }
}

// ==================== 加载 & 根组件 ====================
function LoadingScreen() {
  return (
    <div className="fixed inset-0 bg-white flex flex-col items-center justify-center z-50">
      <Logo size={48} className="animate-bounce-subtle" />
      <div className="mt-4 text-sm text-gray-500">正在初始化...</div>
    </div>
  );
}

function AppRoot() {
  const { user, loading } = useApp();
  const [showOnboarding, setShowOnboarding] = useState(() => {
    if (!user) return false;
    // v3.2: onboarding 不再强制，跳过就记 localStorage
    if (localStorage.getItem('onboarding_dismissed')) return false;
    return true;
  });

  // user 加载完成后判断
  useEffect(() => {
    if (user && !user.onboarded && !localStorage.getItem('onboarding_dismissed')) {
      setShowOnboarding(true);
    }
  }, [user]);

  if (loading) return <LoadingScreen />;
  if (!user) return (
    <div className="fixed inset-0 bg-white flex items-center justify-center">
      <div className="text-center">
        <Logo size={48} className="mx-auto" />
        <div className="mt-4 text-sm text-gray-600">连接失败，请刷新重试</div>
      </div>
    </div>
  );

  return (
    <>
      <Layout>
        <Router />
      </Layout>
      <DeviceNoticeBubble />
      {showOnboarding && <OnboardingFlow onDone={() => setShowOnboarding(false)} />}
    </>
  );
}

function App() {
  return (
    <AppProvider>
      <AppRoot />
      <ToastStack />
    </AppProvider>
  );
}

// ==================== 挂载 ====================
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
</body>
</html>

      <div className="mb-6">
        <h1 className="text-3xl font-bold mb-1">AI 设置</h1>
        <p className="text-slate-500">默认使用免费额度，用完后可配自己的 API Key 继续使用</p>
      </div>

      <div className="space-y-5">
        {/* 免费额度状态 */}
        <Card className="p-5 bg-gradient-to-r from-emerald-50 to-indigo-50 border-emerald-200">
          <div className="flex items-center justify-between mb-3">
            <div>
              <div className="font-semibold text-emerald-900">🎁 每日免费 AI 额度</div>
              <div className="text-xs text-slate-600 mt-0.5">匹配打分 / JD 解析 / 面试批改通用</div>
            </div>
            <Button variant="secondary" size="sm" onClick={testFree} disabled={testing}>
              {testing ? '测试中…' : '🔬 测试'}
            </Button>
          </div>
          {quota && (
            <div>
              <div className="flex items-center justify-between text-sm mb-1.5">
                <span className="text-slate-700">今日剩余</span>
                <span className="font-bold text-emerald-700">{quota.remaining} / {quota.limit}</span>
              </div>
              <div className="w-full bg-white rounded-full h-2 overflow-hidden">
                <div className="bg-gradient-to-r from-emerald-500 to-indigo-500 h-full transition-all"
                  style={{ width: `${(quota.remaining / quota.limit) * 100}%` }} />
              </div>
              {quota.remaining === 0 && (
                <div className="text-xs text-amber-700 mt-2">⚠️ 今日免费额度已用完，请在下方配置自己的 API Key 继续使用（每天 0 点刷新）</div>
              )}
            </div>
          )}
        </Card>

        {/* 自配 API（OpenAI 兼容） */}
        <Card className="p-5">
          <div className="flex items-center justify-between mb-4">
            <div>
              <div className="font-semibold">🔑 自配 API（可选）</div>
              <div className="text-xs text-slate-500 mt-0.5">支持任何 OpenAI 兼容的大模型 API（DeepSeek / OpenAI / Kimi / 通义千问 / 自部署模型）</div>
            </div>
            <Button variant="secondary" size="sm" onClick={() => setShowGuide(true)}>📖 DeepSeek Key 指南</Button>
          </div>
          <div className="space-y-4">
            <div>
              <label className="text-xs text-slate-500">API Endpoint</label>
              <input value={state.ai.endpoint || ''} onChange={e => update('ai.endpoint', e.target.value)}
                placeholder="https://api.deepseek.com/chat/completions"
                className="w-full mt-1 px-3 py-2 border border-slate-200 rounded-lg text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500" />
              <div className="text-xs text-slate-400 mt-1">常见：
                <button onClick={() => update('ai.endpoint', 'https://api.deepseek.com/chat/completions')} className="text-indigo-600 hover:underline ml-1">DeepSeek</button>
                <span className="mx-1">·</span>
                <button onClick={() => update('ai.endpoint', 'https://api.openai.com/v1/chat/completions')} className="text-indigo-600 hover:underline">OpenAI</button>
                <span className="mx-1">·</span>
                <button onClick={() => update('ai.endpoint', 'https://api.moonshot.cn/v1/chat/completions')} className="text-indigo-600 hover:underline">Kimi</button>
                <span className="mx-1">·</span>
                <button onClick={() => update('ai.endpoint', 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions')} className="text-indigo-600 hover:underline">通义千问</button>
              </div>
            </div>
            <div>
              <label className="text-xs text-slate-500">API Key</label>
              <input type="password" value={state.ai.apiKey || ''}
                onChange={e => update('ai.apiKey', e.target.value)}
                placeholder="粘贴你的 API Key，如 sk-xxxxx"
                className="w-full mt-1 px-3 py-2 border border-slate-200 rounded-lg text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500" />
              <div className="text-xs text-slate-400 mt-1">🔒 Key 仅保存在你的浏览器本地，永不上传</div>
            </div>
            <div>
              <label className="text-xs text-slate-500">模型名称</label>
              <input value={state.ai.model || ''} onChange={e => update('ai.model', e.target.value)}
                placeholder="deepseek-chat"
                className="w-full mt-1 px-3 py-2 border border-slate-200 rounded-lg text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500" />
              <div className="text-xs text-slate-400 mt-1">常见：deepseek-chat / gpt-4o-mini / moonshot-v1-8k / qwen-plus</div>
            </div>
            <label className="flex items-center gap-2 text-sm pt-2">
              <input type="checkbox" checked={!!state.ai.preferCustom}
                onChange={e => update('ai.preferCustom', e.target.checked)} />
              <span>优先使用自配 API（不消耗免费额度）</span>
            </label>
            <div className="pt-2">
              <Button onClick={testCustom} disabled={testing || !state.ai.apiKey}>
                {testing ? '测试中…' : '🔬 测试自配 API'}
              </Button>
            </div>
          </div>
        </Card>
      </div>

      <Modal open={showGuide} onClose={() => setShowGuide(false)} title="获取 DeepSeek API Key" size="md"
        footer={<Button variant="secondary" onClick={() => setShowGuide(false)}>关闭</Button>}>
        <div className="space-y-4">
          <div className="text-sm text-slate-700">DeepSeek 是国内最便宜的大模型 API，约 ¥0.001/千 token，充 1 元能用一个月。</div>
          <ol className="space-y-2 list-decimal list-inside text-sm text-slate-700">
            <li>打开 <a href="https://platform.deepseek.com" target="_blank" rel="noopener" className="text-indigo-600 hover:underline">platform.deepseek.com</a> 注册账号（可用手机号）</li>
            <li>左侧菜单「充值」充 1~5 元（非常耐用）</li>
            <li>左侧菜单「API Keys」→ 创建新密钥 → 复制 sk-xxxxx</li>
            <li>粘贴到上方的「API Key」输入框</li>
            <li>Endpoint 和模型用默认的 DeepSeek 值即可</li>
          </ol>
          <a href="https://platform.deepseek.com/api_keys" target="_blank" rel="noopener"
            className="inline-flex items-center gap-1 text-sm text-indigo-600 hover:underline">
            <Icon name="external" className="w-4 h-4" />去 DeepSeek 获取 Key
          </a>
        </div>
      </Modal>
    </div>
  );
}

// =============== 管理员面板 ===============
function AdminPage({ state, setState, toast }) {
  const [token, setToken] = useState(() => localStorage.getItem('admin_token') || '');
  const [stats, setStats] = useState(null);
  const [log, setLog] = useState([]);
  const [running, setRunning] = useState(false);
  const [autoRunning, setAutoRunning] = useState(false);
  const autoRef = useRef(false);

  const addLog = (msg, type = 'info') => {
    setLog(prev => [{ ts: new Date().toLocaleTimeString(), msg, type }, ...prev.slice(0, 49)]);
  };

  const saveToken = (t) => {
    setToken(t);
    localStorage.setItem('admin_token', t);
  };

  const refreshStats = useCallback(async () => {
    try {
      const s = await fetchBackendStats();
      setStats(s);
    } catch (e) { addLog(`刷新失败: ${e.message}`, 'error'); }
  }, []);

  useEffect(() => { refreshStats(); }, [refreshStats]);

  // 调用 admin 接口
  const adminCall = async (path, body = {}) => {
    if (!token) throw new Error('请先填 ADMIN_TOKEN');
    const res = await fetch(`/api${path}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const t = await res.text();
      throw new Error(`${res.status}: ${t.slice(0, 100)}`);
    }
    return res.json();
  };

  // 处理下一批
  const processNextBatch = async () => {
    if (running) return;
    setRunning(true);
    try {
      addLog('⏳ 正在处理下一批（batchSize=3）…');
      const r = await adminCall('/admin/crawl-stage2', { batchSize: 3 });
      addLog(`✅ 本批处理 ${r.processed} 篇，抽出 ${r.jobsExtracted} 个岗位`, 'success');
      await refreshStats();
      return r;
    } catch (e) {
      addLog(`❌ 失败: ${e.message}`, 'error');
      throw e;
    } finally {
      setRunning(false);
    }
  };

  // 自动循环处理直到完成（每批间隔 2 秒避免触发 Cloudflare 限流）
  const autoProcess = async () => {
    if (autoRef.current) {
      autoRef.current = false;
      setAutoRunning(false);
      addLog('⏸ 已停止自动处理');
      return;
    }
    autoRef.current = true;
    setAutoRunning(true);
    addLog('▶️ 开始自动循环处理…');
    let batchCount = 0;
    try {
      while (autoRef.current) {
        batchCount++;
        const r = await adminCall('/admin/crawl-stage2', { batchSize: 3 });
        addLog(`  批 #${batchCount}：${r.processed} 篇 → ${r.jobsExtracted} 个岗位`, 'success');
        await refreshStats();
        if (r.processed === 0) {
          addLog('🎉 所有文章已处理完成！', 'success');
          break;
        }
        await new Promise(r => setTimeout(r, 2000));
      }
    } catch (e) {
      addLog(`❌ 自动处理中断: ${e.message}`, 'error');
    } finally {
      autoRef.current = false;
      setAutoRunning(false);
    }
  };

  // 手动触发 stage1 爬取
  const triggerCrawl = async () => {
    if (running) return;
    setRunning(true);
    try {
      addLog('⏳ 正在爬取搜狗微信（5 个关键词）…');
      const r = await adminCall('/admin/crawl-stage1', { offset: 0, batchSize: 5 });
      addLog(`✅ 爬取完成：找到 ${r.found} 篇，新增 ${r.added} 篇`, 'success');
      await refreshStats();
    } catch (e) {
      addLog(`❌ 失败: ${e.message}`, 'error');
    } finally {
      setRunning(false);
    }
  };

  // 清空 jobs 重新抽取
  const reprocess = async () => {
    if (!confirm('确定清空所有 jobs 并重新抽取吗？（会保留 articles，但 jobs 从 0 开始）')) return;
    setRunning(true);
    try {
      addLog('⏳ 清空 jobs 表 + 重置 articles 状态…');
      const r = await adminCall('/admin/reprocess', {});
      addLog(`✅ ${r.message}`, 'success');
      await refreshStats();
    } catch (e) {
      addLog(`❌ 失败: ${e.message}`, 'error');
    } finally {
      setRunning(false);
    }
  };

  const pending = stats?.pending_articles;
  const progress = stats ? Math.round(((stats.articles - (pending || 0)) / stats.articles) * 100) : 0;

  return (
    <div className="p-8 max-w-4xl mx-auto fade-in">
      <div className="mb-6">
        <h1 className="text-3xl font-bold mb-1">🔧 管理员面板</h1>
        <p className="text-slate-500">后端数据源的手动控制台，仅管理员使用</p>
      </div>

      {/* Token 配置 */}
      <Card className="p-5 mb-5">
        <div className="font-semibold mb-3">🔑 Admin Token</div>
        <div className="flex gap-2">
          <input type="password" value={token} onChange={e => saveToken(e.target.value)}
            placeholder="粘贴 Cloudflare Secrets Store 里的 ADMIN_TOKEN"
            className="flex-1 px-3 py-2 border border-slate-200 rounded-lg text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          <Button variant="secondary" size="sm" onClick={refreshStats}>🔄 刷新状态</Button>
        </div>
        <div className="text-xs text-slate-400 mt-1.5">保存在浏览器本地，不会上传</div>
      </Card>

      {/* 实时状态 */}
      {stats && (
        <Card className="p-5 mb-5">
          <div className="font-semibold mb-3">📊 数据库状态</div>
          <div className="grid grid-cols-4 gap-4 mb-4">
            <div><div className="text-xs text-slate-500">文章总数</div><div className="text-xl font-bold text-indigo-600">{stats.articles}</div></div>
            <div><div className="text-xs text-slate-500">已提取岗位</div><div className="text-xl font-bold text-emerald-600">{stats.jobs}</div></div>
            <div><div className="text-xs text-slate-500">待处理文章</div><div className="text-xl font-bold text-amber-600">{pending ?? '—'}</div></div>
            <div><div className="text-xs text-slate-500">处理进度</div><div className="text-xl font-bold text-slate-700">{progress}%</div></div>
          </div>
          <div className="w-full bg-slate-100 rounded-full h-2 overflow-hidden">
            <div className="bg-gradient-to-r from-emerald-500 to-indigo-500 h-full transition-all" style={{ width: `${progress}%` }} />
          </div>
        </Card>
      )}

      {/* 操作按钮 */}
      <Card className="p-5 mb-5">
        <div className="font-semibold mb-3">⚙️ 操作</div>
        <div className="space-y-3">
          <div>
            <div className="flex items-center gap-2">
              <Button onClick={autoProcess} disabled={running || !token} variant={autoRunning ? 'danger' : 'primary'}>
                {autoRunning ? '⏸ 停止自动处理' : '▶️ 自动处理所有待处理文章'}
              </Button>
              <Button variant="secondary" onClick={processNextBatch} disabled={running || autoRunning || !token}>
                {running ? '处理中…' : '🔄 手动处理下一批（3 篇）'}
              </Button>
            </div>
            <div className="text-xs text-slate-500 mt-1.5">
              每批 3 篇，每批之间间隔 2 秒。一次 AI 调用约 3-5 秒，73 篇文章预计 5-8 分钟跑完。
            </div>
          </div>
          <div className="pt-3 border-t border-slate-100">
            <div className="flex items-center gap-2">
              <Button variant="secondary" onClick={triggerCrawl} disabled={running || autoRunning || !token}>
                🕷 手动触发爬取（搜狗微信 5 个关键词）
              </Button>
              <Button variant="danger" onClick={reprocess} disabled={running || autoRunning || !token}>
                🗑 清空 jobs 重新抽取
              </Button>
            </div>
            <div className="text-xs text-slate-500 mt-1.5">
              爬取一般不需要手动触发（Cron 每 2 小时自动跑一次）。清空重跑适用于 prompt 改进后重新处理已抓文章。
            </div>
          </div>
        </div>
      </Card>

      {/* 操作日志 */}
      <Card className="p-5">
        <div className="flex items-center justify-between mb-3">
          <div className="font-semibold">📜 操作日志</div>
          {log.length > 0 && <Button variant="ghost" size="sm" onClick={() => setLog([])}>清空</Button>}
        </div>
        {log.length === 0 ? (
          <div className="text-sm text-slate-400 py-4 text-center">还没有操作</div>
        ) : (
          <div className="space-y-1 max-h-96 overflow-y-auto scrollbar-thin font-mono text-xs">
            {log.map((item, i) => (
              <div key={i} className={`flex gap-3 py-0.5 ${
                item.type === 'success' ? 'text-emerald-700' :
                item.type === 'error' ? 'text-rose-600' : 'text-slate-600'
              }`}>
                <span className="text-slate-400">{item.ts}</span>
                <span className="flex-1">{item.msg}</span>
              </div>
            ))}
          </div>
        )}
      </Card>
    </div>
  );
}

// =============== 主入口 ===============
function App() {
  const [state, setStateRaw] = useState(loadState);
  const [page, setPage] = useState('dashboard');
  const [toastMsg, setToastMsg] = useState({ message: '', type: 'info' });

  const setState = useCallback((next) => {
    setStateRaw(prev => {
      const n = typeof next === 'function' ? next(prev) : next;
      saveState(n);
      return n;
    });
  }, []);

  const toast = useCallback((message, type = 'info') => setToastMsg({ message, type }), []);

  if (!state.onboarded) {
    return <Onboarding state={state} setState={setState} onDone={() => {}} />;
  }

  const pages = {
    dashboard: <Dashboard state={state} setState={setState} toast={toast} onNav={setPage} />,
    search: <SearchPage state={state} setState={setState} toast={toast} />,
    jobs: <JobsPage state={state} setState={setState} toast={toast} />,
    tracker: <TrackerPage state={state} setState={setState} toast={toast} />,
    interview: <InterviewPage state={state} setState={setState} toast={toast} />,
    config: <ConfigPage state={state} setState={setState} toast={toast} />,
    'ai-settings': <AISettingsPage state={state} setState={setState} toast={toast} />,
    admin: <AdminPage state={state} setState={setState} toast={toast} />,
  };

  return (
    <div className="flex min-h-screen">
      <Sidebar current={page} onNav={setPage} state={state} />
      <main className="flex-1 overflow-x-hidden">{pages[page]}</main>
      <Toast message={toastMsg.message} type={toastMsg.type} onClose={() => setToastMsg({ message: '', type: 'info' })} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

<style>
  /* 自定义：苹果感交互 —— 克制的过渡、subtle 的反馈 */

  html, body { scroll-behavior: smooth; }
  body {
    background: #f7f8fa;
    color: #111827;
    font-feature-settings: "cv02", "cv03", "cv04", "cv11";

  /* 按钮：默认过渡 200ms cubic-bezier，hover 轻抬升，active 微缩 */

  /* 输入框聚焦：柔和蓝光 */

<body>

<div id="root"></div>

<script type="text/babel" data-presets="react">

const { useState, useEffect, useRef, useMemo, createContext, useContext, useCallback } = React;

// ==================== API Client ====================
const API_BASE = '';  // 同源，走 /api/*

async function apiCall(path, options = {}) {
  const token = localStorage.getItem('token');
  const headers = {
    'Content-Type': 'application/json',
    ...(token ? { 'Authorization': 'Bearer ' + token } : {}),
    ...(options.headers || {}),
  };
  const resp = await fetch(API_BASE + path, { ...options, headers });
  const data = await resp.json().catch(() => ({}));
  if (!resp.ok) {
    const err = new Error(data.error || data.message || ('HTTP ' + resp.status));
    err.status = resp.status;
    err.data = data;
    throw err;
  }
  return data;
}

// ==================== Indicator（指南针 Logo） ====================
function Logo({ size = 32, className = '' }) {
  return (
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width={size} height={size} className={className}>
      <circle cx="16" cy="16" r="13" fill="none" stroke="#2563eb" strokeWidth="2" />
      <path d="M16 7 L19 16 L16 25 L13 16 Z" fill="#10b981" />
      <circle cx="16" cy="16" r="1.5" fill="#1a1a1a" />
    </svg>
  );
}

// ==================== 小图标（内联 SVG，避免引入图标库） ====================
const Icon = {
  Home: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /><polyline points="9 22 9 12 15 12 15 22" /></svg>,
  Resume: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><polyline points="14 2 14 8 20 8" /><line x1="8" y1="13" x2="16" y2="13" /><line x1="8" y1="17" x2="14" y2="17" /></svg>,
  JD: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><rect x="2" y="7" width="20" height="14" rx="2" /><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" /></svg>,
  Board: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><rect x="3" y="3" width="7" height="9" /><rect x="14" y="3" width="7" height="5" /><rect x="14" y="12" width="7" height="9" /><rect x="3" y="16" width="7" height="5" /></svg>,
  Profile: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="10" /><path d="M12 6v6l4 2" /></svg>,
  Practice: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 20h9" /><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" /></svg>,
  Suggestion: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M9 18h6" /><path d="M10 22h4" /><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5A4.61 4.61 0 0 1 8.91 14" /></svg>,
  Bell: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" /><path d="M13.73 21a2 2 0 0 1-3.46 0" /></svg>,
  Settings: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" /></svg>,
  Admin: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /></svg>,
  Menu: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="3" y1="6" x2="21" y2="6" /><line x1="3" y1="12" x2="21" y2="12" /><line x1="3" y1="18" x2="21" y2="18" /></svg>,
  X: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>,
  Plus: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></svg>,
  ArrowRight: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="5" y1="12" x2="19" y2="12" /><polyline points="12 5 19 12 12 19" /></svg>,
  Info: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="10" /><line x1="12" y1="16" x2="12" y2="12" /><line x1="12" y1="8" x2="12.01" y2="8" /></svg>,
};

// ==================== 全局应用上下文 ====================
const AppContext = createContext(null);
const useApp = () => useContext(AppContext);

function AppProvider({ children }) {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [toasts, setToasts] = useState([]);
  const [unreadCount, setUnreadCount] = useState(0);
  const [route, setRoute] = useState(() => {
    return window.location.hash.slice(1) || 'home';
  });

  // 路由变化监听
  useEffect(() => {
    const handler = () => setRoute(window.location.hash.slice(1) || 'home');
    window.addEventListener('hashchange', handler);
    return () => window.removeEventListener('hashchange', handler);
  }, []);

  const navigate = useCallback((path) => {
    window.location.hash = path;
  }, []);

  // Toast 系统
  const toast = useCallback((message, type = 'info', duration = 3000) => {
    const id = Date.now() + Math.random();
    setToasts(ts => [...ts, { id, message, type }]);
    if (duration > 0) {
      setTimeout(() => {
        setToasts(ts => ts.filter(t => t.id !== id));
      }, duration);
    }
    return id;
  }, []);

  const dismissToast = useCallback((id) => {
    setToasts(ts => ts.filter(t => t.id !== id));
  }, []);

  // 初始化：注册/登录指纹账号
  useEffect(() => {
    async function init() {
      try {
        let fp = localStorage.getItem('fingerprint');
        if (!fp) {
          fp = 'fp_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
          localStorage.setItem('fingerprint', fp);
        }

        let token = localStorage.getItem('token');
        if (token) {
          // 尝试用老 token 拿 user
          try {
            const r = await apiCall('/api/auth/me');
            setUser(r.user);
            setLoading(false);
            return;
          } catch {
            // token 失效，走注册
            localStorage.removeItem('token');
          }
        }

        // 指纹注册/登录
        const r = await apiCall('/api/auth/anon', {
          method: 'POST',
          body: JSON.stringify({ fingerprint: fp }),
        });
        localStorage.setItem('token', r.token);
        localStorage.setItem('user_id', r.user.id);
        setUser(r.user);
      } catch (e) {
        toast('连接失败：' + e.message, 'error', 5000);
      }
      setLoading(false);
    }
    init();
  }, []);

  // 拉通知未读数（每 60s 一次）
  useEffect(() => {
    if (!user) return;
    let timer;
    async function fetchUnread() {
      try {
        const r = await apiCall('/api/notifications?unread=1&limit=1');
        setUnreadCount(r.unread_count || 0);
      } catch {}
    }
    fetchUnread();
    timer = setInterval(fetchUnread, 60000);
    return () => clearInterval(timer);
  }, [user]);

  const refreshUser = useCallback(async () => {
    try {
      const r = await apiCall('/api/auth/me');
      setUser(r.user);
    } catch {}
  }, []);

  const value = {
    user, setUser, loading, toast, dismissToast, toasts,
    route, navigate, unreadCount, refreshUser,
  };

  return <AppContext.Provider value={value}>{children}</AppContext.Provider>;
}

// ==================== Toast 组件 ====================
function ToastStack() {
  const { toasts, dismissToast } = useApp();
  return (
    <div className="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none">
      {toasts.map(t => (
        <div key={t.id}
          className={
            'pointer-events-auto animate-slide-up px-4 py-3 rounded-xl shadow-lifted text-sm font-medium min-w-[260px] max-w-[360px] flex items-start gap-2 ' +
            (t.type === 'error' ? 'bg-rose-50 text-rose-900 border border-rose-200' :
             t.type === 'success' ? 'bg-emerald-50 text-emerald-900 border border-emerald-200' :
             'bg-white text-gray-900 border border-gray-200')
          }>
          <div className="flex-1">{t.message}</div>
          <button onClick={() => dismissToast(t.id)} className="opacity-50 hover:opacity-100 transition">
            <Icon.X className="w-4 h-4" />
          </button>
        </div>
      ))}
    </div>
  );
}

// ==================== 换设备提醒小弹窗 ====================
function DeviceNoticeBubble() {
  const [show, setShow] = useState(() => {
    return !localStorage.getItem('device_notice_dismissed');
  });

  if (!show) return null;

  const handleDismiss = () => {
    localStorage.setItem('device_notice_dismissed', '1');
    setShow(false);
  };

  return (
    <div className="fixed top-20 right-4 z-40 w-[320px] animate-slide-up">
      <div className="bg-white rounded-xl shadow-float border border-amber-200 p-4">
        <div className="flex items-start gap-3">
          <div className="mt-0.5 w-8 h-8 rounded-full bg-amber-50 flex items-center justify-center flex-shrink-0">
            <Icon.Info className="w-4 h-4 text-amber-600" />
          </div>
          <div className="flex-1 min-w-0">
            <div className="text-sm font-semibold text-gray-900">关于换设备</div>
            <div className="mt-1 text-xs text-gray-600 leading-relaxed">
              目前换设备登录会创建新账号，数据不互通。邮箱绑定恢复功能正在开发中，建议长期使用同一设备。
            </div>
          </div>
          <button onClick={handleDismiss} className="flex-shrink-0 text-gray-400 hover:text-gray-700 transition">
            <Icon.X className="w-4 h-4" />
          </button>
        </div>
      </div>
    </div>
  );
}

// ==================== Layout: 顶部栏 + 左侧边栏 ====================
function Layout({ children }) {
  const { user, unreadCount, navigate, route } = useApp();
  const [sidebarOpen, setSidebarOpen] = useState(false); // 移动端

  const menu = [
    { key: 'home', label: '总览', icon: Icon.Home },
    { key: 'resumes', label: '简历', icon: Icon.Resume },
    { key: 'jds', label: 'JD 库', icon: Icon.JD },
    { key: 'positions', label: '岗位看板', icon: Icon.Board },
    { key: 'profile', label: '我的画像', icon: Icon.Profile },
    { key: 'practice', label: '陪练题', icon: Icon.Practice },
    { key: 'suggestions', label: 'AI 建议', icon: Icon.Suggestion },
    { key: 'notifications', label: '通知', icon: Icon.Bell, badge: unreadCount },
    { key: 'settings', label: '设置', icon: Icon.Settings },
  ];
  if (user?.is_admin) {
    menu.push({ key: 'admin', label: '管理面板', icon: Icon.Admin });
  }

  const currentRoot = (route.split('/')[0]) || 'home';

  return (
    <div className="min-h-screen flex flex-col">
      {/* 顶部栏 */}
      <header className="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-gray-200">
        <div className="flex items-center h-14 px-4">
          <button
            onClick={() => setSidebarOpen(true)}
            className="md:hidden p-2 -ml-2 text-gray-600 hover:text-gray-900 transition">
            <Icon.Menu className="w-5 h-5" />
          </button>
          <div className="flex items-center gap-2.5 cursor-pointer" onClick={() => navigate('home')}>
            <Logo size={28} />
            <div className="hidden sm:block">
              <div className="text-[15px] font-semibold text-gray-900 leading-tight">求职小助</div>
              <div className="text-[10px] text-gray-500 leading-tight">AI 陪跑管家</div>
            </div>
          </div>

          <div className="flex-1" />

          {user && (
            <div className="flex items-center gap-3">
              <button
                onClick={() => navigate('notifications')}
                className="relative p-2 rounded-lg text-gray-600 hover:text-gray-900 hover:bg-gray-100 btn-apple">
                <Icon.Bell className="w-5 h-5" />
                {unreadCount > 0 && (
                  <span className="absolute top-1 right-1 w-4 h-4 rounded-full bg-rose-500 text-white text-[10px] font-bold flex items-center justify-center animate-scale-in">
                    {unreadCount > 9 ? '9+' : unreadCount}
                  </span>
                )}
              </button>
              <div className="hidden sm:flex items-center gap-2 text-sm">
                <div className="w-7 h-7 rounded-full bg-gradient-to-br from-brand-500 to-accent-500 flex items-center justify-center text-white text-xs font-semibold">
                  {(user.name || 'U').slice(0, 1).toUpperCase()}
                </div>
                <span className="text-gray-700">{user.name || '未设置名字'}</span>
              </div>
            </div>
          )}
        </div>
      </header>

      <div className="flex-1 flex">
        {/* 侧边栏（桌面常驻 + 移动端抽屉） */}
        {sidebarOpen && (
          <div className="fixed inset-0 bg-black/40 z-40 md:hidden animate-fade-in"
               onClick={() => setSidebarOpen(false)} />
        )}
        <aside className={
          'bg-white border-r border-gray-200 w-[220px] flex-shrink-0 z-40 flex flex-col ' +
          'md:sticky md:top-14 md:self-start md:h-[calc(100vh-3.5rem)] ' +
          'fixed top-14 bottom-0 left-0 transition-transform duration-300 ' +
          (sidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0')
        }>
          <nav className="p-3 flex flex-col gap-0.5 flex-1">
            {menu.map(item => {
              const IconComp = item.icon;
              const active = currentRoot === item.key;
              return (
                <button
                  key={item.key}
                  onClick={() => { navigate(item.key); setSidebarOpen(false); }}
                  className={
                    'group flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium btn-apple ' +
                    (active
                      ? 'bg-brand-50 text-brand-700'
                      : 'text-gray-700 hover:bg-gray-100')
                  }>
                  <IconComp className={'w-[18px] h-[18px] ' + (active ? 'text-brand-600' : 'text-gray-500 group-hover:text-gray-700')} />
                  <span className="flex-1 text-left">{item.label}</span>
                  {item.badge > 0 && (
                    <span className="min-w-[18px] h-[18px] px-1 rounded-full bg-rose-500 text-white text-[10px] font-bold flex items-center justify-center">
                      {item.badge > 9 ? '9+' : item.badge}
                    </span>
                  )}
                </button>
              );
            })}
          </nav>
          {/* 署名 */}
          <div className="px-4 py-3 border-t border-gray-100 text-[11px] text-gray-400 leading-tight">
            by dxh 同学
            <span className="mx-1.5 text-gray-300">·</span>
            v3.1
          </div>
        </aside>

        {/* 主内容 */}
        <main className="flex-1 min-w-0">
          <div className="max-w-6xl mx-auto px-4 md:px-8 py-6 md:py-8">
            {children}
          </div>
        </main>
      </div>
    </div>
  );
}

// ==================== 引导卡牌 Onboarding ====================
function OnboardingFlow({ onDone }) {
  const { toast, refreshUser } = useApp();
  const [step, setStep] = useState(0);
  const [form, setForm] = useState({
    name: '', target_track: '', target_stage: '', school: '', major: '', graduation_year: '',
  });
  const [submitting, setSubmitting] = useState(false);

  const cards = [
    {
      title: '欢迎来到求职小助 👋',
      desc: '我是你的 AI 求职陪跑管家。会帮你：',
      body: (
        <ul className="space-y-2 text-sm text-gray-700">
          <li className="flex gap-2"><span className="text-accent-500">•</span>把简历、JD、面试复盘全流程串起来</li>
          <li className="flex gap-2"><span className="text-accent-500">•</span>用你粘贴的真实数据训练画像，越用越懂你</li>
          <li className="flex gap-2"><span className="text-accent-500">•</span>为每个岗位做客观匹配打分和针对性建议</li>
        </ul>
      ),
    },
    {
      title: '先认识一下',
      desc: '填一些基础信息让 AI 更懂你（可以随时修改）',
      form: true,
    },
    {
      title: '一切就绪',
      desc: '你现在可以开始粘贴简历和 JD 了。核心流程：',
      body: (
        <ol className="space-y-2 text-sm text-gray-700 list-decimal list-inside">
          <li>粘贴一份主简历 → AI 解析</li>
          <li>粘贴目标岗位 JD → 自动匹配打分</li>
          <li>面试后粘贴复盘文本 → AI 给出改进建议</li>
          <li>画像随使用深度越来越准确</li>
        </ol>
      ),
    },
  ];

  const submit = async () => {
    setSubmitting(true);
    try {
      await apiCall('/api/auth/onboard', {
        method: 'POST',
        body: JSON.stringify({
          ...form,
          graduation_year: form.graduation_year ? Number(form.graduation_year) : null,
        }),
      });
      await refreshUser();
      toast('设置完成，开始使用吧', 'success');
      onDone();
    } catch (e) {
      toast('保存失败：' + e.message, 'error');
    }
    setSubmitting(false);
  };

  const current = cards[step];

  return (
    <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in">
      <div className="bg-white rounded-2xl shadow-float max-w-md w-full p-6 animate-scale-in">
        {/* 步骤指示器 */}
        <div className="flex gap-1.5 mb-6">
          {cards.map((_, i) => (
            <div key={i} className={
              'h-1 rounded-full flex-1 transition-all duration-300 ' +
              (i <= step ? 'bg-brand-600' : 'bg-gray-200')
            } />
          ))}
        </div>

        <div className="flex items-center gap-3 mb-3">
          <Logo size={32} />
          <h2 className="text-xl font-semibold text-gray-900">{current.title}</h2>
        </div>
        <p className="text-sm text-gray-600 mb-5 leading-relaxed">{current.desc}</p>

        {current.body && <div className="mb-6">{current.body}</div>}

        {current.form && (
          <div className="space-y-3 mb-6">
            <div>
              <label className="text-xs text-gray-600 mb-1 block">姓名</label>
              <input
                className="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm"
                placeholder="你的名字"
                value={form.name}
                onChange={e => setForm({...form, name: e.target.value})}
              />
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="text-xs text-gray-600 mb-1 block">求职方向</label>
                <select
                  className="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm bg-white"
                  value={form.target_track}
                  onChange={e => setForm({...form, target_track: e.target.value})}
                >
                  <option value="">请选择</option>
                  <option value="tech">技术/研发</option>
                  <option value="product">产品</option>
                  <option value="operation">运营</option>
                  <option value="market">市场/BD</option>
                  <option value="design">设计</option>
                  <option value="data">数据/分析</option>
                  <option value="other">其他</option>
                </select>
              </div>
              <div>
                <label className="text-xs text-gray-600 mb-1 block">目标阶段</label>
                <select
                  className="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm bg-white"
                  value={form.target_stage}
                  onChange={e => setForm({...form, target_stage: e.target.value})}
                >
                  <option value="">请选择</option>
                  <option value="internship">实习</option>
                  <option value="campus">校招</option>
                  <option value="social">社招</option>
                </select>
              </div>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="text-xs text-gray-600 mb-1 block">学校（选填）</label>
                <input
                  className="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm"
                  placeholder="如：清华大学"
                  value={form.school}
                  onChange={e => setForm({...form, school: e.target.value})}
                />
              </div>
              <div>
                <label className="text-xs text-gray-600 mb-1 block">毕业年份</label>
                <input
                  type="number" min="2020" max="2035"
                  className="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm"
                  placeholder="如：2026"
                  value={form.graduation_year}
                  onChange={e => setForm({...form, graduation_year: e.target.value})}
                />
              </div>
            </div>
            <div>
              <label className="text-xs text-gray-600 mb-1 block">专业（选填）</label>
              <input
                className="w-full px-3 py-2 rounded-lg border border-gray-300 text-sm"
                placeholder="如：计算机科学与技术"
                value={form.major}
                onChange={e => setForm({...form, major: e.target.value})}
              />
            </div>
          </div>
        )}

        <div className="flex gap-3">
          {step > 0 && (
            <button
              onClick={() => setStep(step - 1)}
              className="px-4 py-2 rounded-lg border border-gray-300 text-sm font-medium text-gray-700 hover:bg-gray-50 btn-apple">
              上一步
            </button>
          )}
          <div className="flex-1" />
          {step < cards.length - 1 ? (
            <button
              onClick={() => setStep(step + 1)}
              className="px-5 py-2 rounded-lg bg-brand-600 text-white text-sm font-medium hover:bg-brand-700 btn-apple">
              继续 <Icon.ArrowRight className="inline w-4 h-4 ml-1" />
            </button>
          ) : (
            <button
              onClick={submit}
              disabled={submitting}
              className="px-5 py-2 rounded-lg bg-brand-600 text-white text-sm font-medium hover:bg-brand-700 btn-apple disabled:opacity-60">
              {submitting ? '保存中...' : '开始使用'}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

// ==================== 页面：Home / Dashboard ====================
function HomePage() {
  const { user, navigate } = useApp();
  const [stats, setStats] = useState(null);
  const [quota, setQuota] = useState(null);
  const [positions, setPositions] = useState([]);
  const [suggestions, setSuggestions] = useState([]);
  const [recentReviews, setRecentReviews] = useState([]);

  useEffect(() => {
    (async () => {
      try {
        const [q, pos, sug, rv] = await Promise.all([
          apiCall('/api/me/quota'),
          apiCall('/api/positions'),
          apiCall('/api/suggestions?new=1'),
          apiCall('/api/reviews'),
        ]);
        setQuota(q);
        setPositions(pos.positions || []);
        setSuggestions(sug.suggestions || []);
        setRecentReviews(rv.reviews || []);
      } catch {}
    })();
  }, []);

  // 岗位按状态分组
  const positionsByStatus = useMemo(() => {
    const groups = {
      active: [], // 投递中、笔试、面试
      won: [],    // offer、入职
      closed: [], // 拒绝、放弃
    };
    for (const p of positions) {
      if (['offer', 'onboard'].includes(p.status)) groups.won.push(p);
      else if (['rejected', 'withdrawn'].includes(p.status)) groups.closed.push(p);
      else groups.active.push(p);
    }
    return groups;
  }, [positions]);

  const hello = (() => {
    const h = new Date().getHours();
    if (h < 6) return '深夜好';
    if (h < 12) return '早上好';
    if (h < 18) return '下午好';
    return '晚上好';
  })();

  return (
    <div className="space-y-6 animate-slide-up">
      {/* 欢迎 + 配额 */}
      <div className="flex flex-col md:flex-row md:items-end md:justify-between gap-4">
        <div>
          <h1 className="text-2xl md:text-3xl font-semibold text-gray-900">
            {hello}，{user?.name || '你'} 👋
          </h1>
          <p className="text-sm text-gray-600 mt-1">AI 随你使用越深入，越能给出精准建议。</p>
        </div>
        {quota && (
          <div className="bg-white rounded-xl border border-gray-200 shadow-soft px-4 py-3 flex gap-5 text-sm">
            <div>
              <div className="text-xs text-gray-500">今日快速 AI</div>
              <div className="font-semibold text-gray-900">{quota.flash.used} / {quota.flash.limit}</div>
            </div>
            <div className="w-px bg-gray-200" />
            <div>
              <div className="text-xs text-gray-500">今日深度 AI</div>
              <div className="font-semibold text-gray-900">{quota.pro.used} / {quota.pro.limit}</div>
            </div>
          </div>
        )}
      </div>

      {/* 空状态引导 */}
      {positions.length === 0 && recentReviews.length === 0 && (
        <div className="bg-gradient-to-br from-brand-50 to-accent-50 rounded-2xl p-6 md:p-8 border border-brand-100">
          <h2 className="text-lg font-semibold text-gray-900 mb-1">从这三步开始</h2>
          <p className="text-sm text-gray-600 mb-5">粘贴一次，AI 开始工作。</p>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
            <QuickAction
              num="1"
              title="粘贴主简历"
              desc="让 AI 了解你的背景和能力"
              onClick={() => navigate('resumes')}
            />
            <QuickAction
              num="2"
              title="粘贴目标 JD"
              desc="自动给出匹配分析和色块提示"
              onClick={() => navigate('jds')}
            />
            <QuickAction
              num="3"
              title="记录面试和复盘"
              desc="AI 跨次追踪成长轨迹"
              onClick={() => navigate('positions')}
            />
          </div>
        </div>
      )}

      {/* 岗位泳道 */}
      {positions.length > 0 && (
        <section>
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-lg font-semibold text-gray-900">岗位看板</h2>
            <button onClick={() => navigate('positions')}
              className="text-sm text-brand-600 hover:text-brand-700 font-medium btn-apple">
              查看全部 →
            </button>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
            <LaneCard label="进行中" count={positionsByStatus.active.length} color="brand"
                      items={positionsByStatus.active.slice(0, 3)} />
            <LaneCard label="Offer/入职" count={positionsByStatus.won.length} color="accent"
                      items={positionsByStatus.won.slice(0, 3)} />
            <LaneCard label="已结束" count={positionsByStatus.closed.length} color="gray"
                      items={positionsByStatus.closed.slice(0, 3)} />
          </div>
        </section>
      )}

      {/* AI 建议 */}
      {suggestions.length > 0 && (
        <section>
          <h2 className="text-lg font-semibold text-gray-900 mb-3">💡 AI 建议 · {suggestions.length} 条待查看</h2>
          <div className="space-y-2">
            {suggestions.slice(0, 2).map(s => (
              <div key={s.id}
                onClick={() => navigate('suggestions')}
                className="card-apple clickable bg-white border border-gray-200 rounded-xl p-4 shadow-soft hover:shadow-lifted cursor-pointer">
                <div className="text-sm font-medium text-gray-900">{s.title}</div>
                <div className="text-xs text-gray-600 mt-1 line-clamp-2">{s.content}</div>
              </div>
            ))}
          </div>
        </section>
      )}

      {/* 最近复盘 */}
      {recentReviews.length > 0 && (
        <section>
          <h2 className="text-lg font-semibold text-gray-900 mb-3">📝 最近复盘</h2>
          <div className="space-y-2">
            {recentReviews.slice(0, 3).map(r => (
              <div key={r.id}
                className="card-apple bg-white border border-gray-200 rounded-xl p-4 shadow-soft">
                <div className="text-sm font-medium text-gray-900">
                  {r.company || '未关联岗位'} · {r.position_title || ''}

                <div className="text-xs text-gray-500 mt-0.5">
                  {new Date(r.created_at).toLocaleString('zh-CN')}

                <div className="text-xs text-gray-600 mt-2 line-clamp-2">{r.preview}</div>
              </div>
            ))}
          </div>
        </section>
      )}
    </div>
  );
}

function QuickAction({ num, title, desc, onClick }) {

    <button

      className="card-apple clickable text-left bg-white border border-gray-200 rounded-xl p-4 shadow-soft hover:shadow-lifted btn-apple">
      <div className="w-7 h-7 rounded-full bg-brand-600 text-white text-sm font-semibold flex items-center justify-center mb-2">

    </button>
  );
}

function LaneCard({ label, count, color, items }) {
  const { navigate } = useApp();
  const colorMap = {
    brand: 'bg-brand-50 text-brand-700 border-brand-200',
    accent: 'bg-emerald-50 text-emerald-700 border-emerald-200',
    gray: 'bg-gray-50 text-gray-600 border-gray-200',
  };
  return (
    <div className="bg-white rounded-xl border border-gray-200 p-4 shadow-soft">
      <div className="flex items-center justify-between mb-3">

        <div className="text-xs text-gray-400 py-3 text-center">暂无</div>

        <div className="space-y-1.5">

              <div className="font-medium truncate">{p.company}</div>
              <div className="text-xs text-gray-500 truncate">{p.position_title}</div>

// ==================== 通用组件 ====================

function Card({ children, className = '', onClick, clickable }) {
  return (
    <div onClick={onClick}
      className={'card-apple ' + (clickable ? 'clickable cursor-pointer ' : '') + 'bg-white rounded-xl border border-gray-200 shadow-soft ' + className}>
      {children}
    </div>
